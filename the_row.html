// ==== ôÏ2 RNG & UTILS ========================================================
function xmur3(str){ let h = 1779033703 ^ str.length; for (let i=0;i<str.length;i++){ h = Math.imul(h ^ str.charCodeAt(i), 3432918353); h = h<<13 | h>>>19; } return function(){ h = Math.imul(h ^ h>>>16, 2246822507); h = Math.imul(h ^ h>>>13, 3266489909); return (h ^= h>>>16) >>> 0; }; }
function mulberry32(a){ return function(){ a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a>>>15, 1 | a); t = t + Math.imul(t ^ t>>>7, 61 | t) ^ t; return ((t ^ t>>>14) >>> 0) / 4294967296; }; }
function makeStream(seedStr, label){ const g = xmur3(seedStr + '::' + label); return mulberry32(g()); }

const RNG = { world:null, hist:null, name:null, ambient:null, seedStr:'' };
function initRNG(seedStr){
  RNG.seedStr = seedStr;
  RNG.world = makeStream(seedStr, 'world');
  RNG.hist = makeStream(seedStr, 'hist');
  RNG.name = makeStream(seedStr, 'name');
  RNG.ambient = makeStream(seedStr, 'ambient');
}
function rw(){ return RNG.world(); }           // worldgen only
function rwr(a,b){ return a + (b-a)*RNG.world(); }
function rwi(a,b){ return a + Math.floor(RNG.world()*(b-a+1)); }
function rwPick(arr){ return arr[Math.floor(RNG.world()*arr.length)]; }
function rnPick(arr){ return arr[Math.floor(RNG.name()*arr.length)]; }

const clamp = (v,a,b)=> v<a?a:(v>b?b:v);
const lerp = (a,b,t)=> a+(b-a)*t;
const smoothstep = (a,b,x)=>{ const t = clamp((x-a)/(b-a),0,1); return t*t*(3-2*t); };
function dist2(ax,az,bx,bz){ const dx=ax-bx, dz=az-bz; return dx*dx+dz*dz; }
function lerpColor(c1,c2,t){
  const r1=(c1>>16)&255,g1=(c1>>8)&255,b1=c1&255, r2=(c2>>16)&255,g2=(c2>>8)&255,b2=c2&255;
  return ((r1+(r2-r1)*t)<<16) | (((g1+(g2-g1)*t)|0)<<8) | ((b1+(b2-b1)*t)|0);
}
function colVary(hex, amt, rand){ // slight per-instance color variation
  const r=(hex>>16)&255, g=(hex>>8)&255, b=hex&255;
  const m = 1 + (rand()*2-1)*amt;
  return (clamp(Math.round(r*m),0,255)<<16) | (clamp(Math.round(g*m),0,255)<<8) | clamp(Math.round(b*m),0,255);
}

// deterministic lattice noise for terrain detail (seeded once per world)
let NOISE_SEED = 1234;
function latticeHash(ix, iz){
  let h = Math.imul(ix, 374761393) + Math.imul(iz, 668265263) + Math.imul(NOISE_SEED, 2246822519);
  h = Math.imul(h ^ (h>>>13), 1274126177);
  return ((h ^ (h>>>16)) >>> 0) / 4294967296;
}
function valueNoise(x, z){
  const ix = Math.floor(x), iz = Math.floor(z), fx = x-ix, fz = z-iz;
  const a = latticeHash(ix,iz), b = latticeHash(ix+1,iz), c = latticeHash(ix,iz+1), d = latticeHash(ix+1,iz+1);
  const ux = fx*fx*(3-2*fx), uz = fz*fz*(3-2*fz);
  return lerp(lerp(a,b,ux), lerp(c,d,ux), uz);
}
function fbm(x, z, oct){
  let v=0, amp=0.5, f=1;
  for(let i=0;i<oct;i++){ v += amp * valueNoise(x*f, z*f); amp*=0.5; f*=2.03; }
  return v;
}

// ==== ôÏ4 CLOCK ==============================================================
// SIM.t is the master clock in integer ticks of 15 sim-minutes.
// Year starts Sept 1. 360-day year (12 x 30-day months) keeps the math honest.
const TICKS_PER_DAY = 96, DAYS_PER_YEAR = 360;
const MONTHS = ['September','October','November','December','January','February','March','April','May','June','July','August'];
const DOW = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const CLOCK = {
  t: 0, frac: 0,                    // integer ticks + fractional carry
  speed: 'documentary',
  paused: false,
  derive(){
    const dayAbs = Math.floor(this.t / TICKS_PER_DAY);
    const tickInDay = this.t - dayAbs*TICKS_PER_DAY;
    const minutes = tickInDay * 15;
    const year = Math.floor(dayAbs / DAYS_PER_YEAR);
    const dayInYear = dayAbs - year*DAYS_PER_YEAR;
    const month = Math.floor(dayInYear / 30);
    const dayInMonth = dayInYear - month*30 + 1;
    return {
      dayAbs, year, month, dayInMonth,
      dow: dayAbs % 7,                       // year starts on a Monday; sue us
      hour: minutes/60,
      hh: Math.floor(minutes/60), mm: minutes % 60,
    };
  },
  hourFloat(){ // smooth fractional hour for sun/sky (includes frac carry)
    const d = this.derive();
    return d.hour + this.frac * 0.25;
  },
};

// ==== ôÏ5b TERRAIN FUNCTIONS =================================================
function riverDistance(x, z){ // distance to river centerline polyline
  let best = 1e9;
  for (let i=0;i<RIVER_PTS.length-1;i++){
    const ax=RIVER_PTS[i][0], az=RIVER_PTS[i][1], bx=RIVER_PTS[i+1][0], bz=RIVER_PTS[i+1][1];
    const dx=bx-ax, dz=bz-az, len2=dx*dx+dz*dz;
    let t = ((x-ax)*dx + (z-az)*dz) / len2; t = clamp(t,0,1);
    const px=ax+dx*t, pz=az+dz*t;
    const d2 = dist2(x,z,px,pz);
    if (d2<best) best=d2;
  }
  return Math.sqrt(best);
}
function baseHeight(x, z){
  // northward gentle rise + hills + river carve + noise
  let h = 6 + 8 * clamp((-z+800)/1600, 0, 1);
  for (const [hx,hz,rx,rz,hh] of HILLS){
    const dx=(x-hx)/rx, dz=(z-hz)/rz;
    const d = Math.sqrt(dx*dx+dz*dz);
    if (d < 1.6) h += hh * (1 - smoothstep(0.55, 1.6, d));
  }
  const rd = riverDistance(x,z);
  if (rd < 160){
    const bankDrop = (1 - smoothstep(0, 160, rd));
    h = lerp(h, -1.5, bankDrop*bankDrop*0.92);       // valley funnels to the water
    if (rd < RIVER_HALF+10) h = Math.min(h, lerp(-3.4, 2.6, smoothstep(RIVER_HALF-8, RIVER_HALF+10, rd)));
  }
  h += (fbm(x*0.006+7, z*0.006+3, 3) - 0.5) * 5.5;
  h += (fbm(x*0.028+31, z*0.028+17, 2) - 0.5) * 1.2;
  return h;
}
function H(x, z){ // final height = base persuaded flat near pads
  let h = baseHeight(x, z);
  for (let i=0;i<PADS.length;i++){
    const p = PADS[i];
    const d = Math.sqrt(dist2(x,z,p.x,p.z));
    if (d < p.r*2.1) h = lerp(p.h, h, smoothstep(p.r*0.8, p.r*2.1, d));
  }
  return h;
}
function registerPads(){
  for (const lot of LOTS){
    const h = baseHeight(lot.x, lot.z);
    let padH = h;
    if (lot.kind==='POLE'){ padH = Math.max(h, CFG.WATER_Y+0.4); } // deck handles the rest
    if (lot.kind==='FIELD'){ padH = h; }
    PADS.push({ x:lot.x, z:lot.z, r:(lot.w||26)*0.9, h:padH });
  }
  // roads get gentle pads at their vertices to avoid cliff-edges
  for (const r of ROADS){
    if (r.kind==='walk') continue;
    const pts = r.pts;
    for (let i=0;i<pts.length-1;i++){
      const ax=pts[i][0], az=pts[i][1], bx=pts[i+1][0], bz=pts[i+1][1];
      const segLen = Math.sqrt(dist2(ax,az,bx,bz));
      const n = Math.max(2, Math.ceil(segLen/30));
      for (let j=0;j<=n;j++){
        const x=lerp(ax,bx,j/n), z=lerp(az,bz,j/n);
        PADS.push({ x, z, r:r.w*2.0, h: baseHeight(x,z) });
      }
    }
  }
}

// ==== ôÏ6 GEOMETRY ACCUMULATOR ==============================================
// Everything static gets merged into one vertex-colored soup ã very few draws.
function GeoAcc(){
  this.pos = []; this.col = []; this.nrm = [];
}
GeoAcc.prototype.tri = function(ax,ay,az, bx,by,bz, cx,cy,cz, color, shade){
  const r=((color>>16)&255)/255*shade, g=((color>>8)&255)/255*shade, b=(color&255)/255*shade;
  // flat normal
  const ux=bx-ax, uy=by-ay, uz=bz-az, vx=cx-ax, vy=cy-ay, vz=cz-az;
  let nx=uy*vz-uz*vy, ny=uz*vx-ux*vz, nz=ux*vy-uy*vx;
  const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1; nx/=l; ny/=l; nz/=l;
  this.pos.push(ax,ay,az, bx,by,bz, cx,cy,cz);
  for(let i=0;i<3;i++){ this.col.push(r,g,b); this.nrm.push(nx,ny,nz); }
};
GeoAcc.prototype.quad = function(a,b,c,d, color, shade){
  this.tri(a[0],a[1],a[2], b[0],b[1],b[2], c[0],c[1],c[2], color, shade);
  this.tri(a[0],a[1],a[2], c[0],c[1],c[2], d[0],d[1],d[2], color, shade);
};
function rotY(px, pz, cx, cz, s, c){ const dx=px-cx, dz=pz-cz; return [cx + dx*c + dz*s, cz - dx*s + dz*c]; }
// box centered (cx, cy, cz), size (sx, sy, sz), rotated ry about its center
GeoAcc.prototype.box = function(cx,cy,cz, sx,sy,sz, ry, color, opt){
  opt = opt||{};
  const s=Math.sin(ry||0), c=Math.cos(ry||0);
  const hx=sx/2, hy=sy/2, hz=sz/2;
  const corners=[];
  for (const [ux,uz] of [[-hx,-hz],[hx,-hz],[hx,hz],[-hx,hz]]){
    const [wx,wz] = rotY(cx+ux, cz+uz, cx, cz, s, c);
    corners.push([wx, wz]);
  }
  const y0=cy-hy, y1=cy+hy;
  const P=(i,y)=>[corners[i][0], y, corners[i][1]];
  const top = opt.topShade!==undefined?opt.topShade:1.0, bot=0.55;
  const sideShades = [0.96, 0.85, 0.91, 0.8]; // subtle facade variation
  for (let i=0;i<4;i++){
    const j=(i+1)%4;
    this.quad(P(i,y0), P(j,y0), P(j,y1), P(i,y1), color, sideShades[i]);
  }
  if (!opt.noTop) this.quad(P(3,y1), P(2,y1), P(1,y1), P(0,y1), opt.topColor!==undefined?opt.topColor:color, top);
  if (opt.bottom) this.quad(P(0,y0), P(1,y0), P(2,y0), P(3,y0), color, bot);
};
// gable roof: triangular prism, ridge along local x
GeoAcc.prototype.gable = function(cx,cy,cz, sx,sy,sz, ry, color, overhang){
  const s=Math.sin(ry||0), c=Math.cos(ry||0);
  const hx=sx/2 + (overhang||0), hz=sz/2 + (overhang||0);
  const T=(ux,uz)=>{ const [wx,wz]=rotY(cx+ux, cz+uz, cx, cz, s, c); return [wx,wz]; };
  const A=T(-hx,-hz), B=T(hx,-hz), C=T(hx,hz), D=T(-hx,hz), R1=T(-hx,0), R2=T(hx,0);
  const y0=cy, y1=cy+sy;
  this.quad([A[0],y0,A[1]],[B[0],y0,B[1]],[R2[0],y1,R2[1]],[R1[0],y1,R1[1]], color, 0.95); // north slope
  this.quad([R1[0],y1,R1[1]],[R2[0],y1,R2[1]],[C[0],y0,C[1]],[D[0],y0,D[1]], color, 0.78); // south slope
  this.tri(A[0],y0,A[1], R1[0],y1,R1[1], D[0],y0,D[1], color, 0.82);   // gable ends
  this.tri(B[0],y0,B[1], C[0],y0,C[1], R2[0],y1,R2[1], color, 0.82);
};
GeoAcc.prototype.cyl = function(cx,cy,cz, r, h, n, color, taper){
  const t = taper===undefined?1:taper;
  for (let i=0;i<n;i++){
    const a0=i/n*Math.PI*2, a1=(i+1)/n*Math.PI*2;
    const x0=Math.cos(a0), z0=Math.sin(a0), x1=Math.cos(a1), z1=Math.sin(a1);
    const sh = 0.75 + 0.25*Math.abs(Math.cos((a0+a1)/2));
    this.quad(
      [cx+x0*r, cy, cz+z0*r], [cx+x1*r, cy, cz+z1*r],
      [cx+x1*r*t, cy+h, cz+z1*r*t], [cx+x0*r*t, cy+h, cz+z0*r*t], color, sh);
  }
};
GeoAcc.prototype.pyramid = function(cx,cy,cz, sx,sz, h, ry, color){
  const s=Math.sin(ry||0), c=Math.cos(ry||0);
  const hx=sx/2, hz=sz/2;
  const T=(ux,uz)=>{ const [wx,wz]=rotY(cx+ux, cz+uz, cx, cz, s, c); return [wx,wz]; };
  const A=T(-hx,-hz), B=T(hx,-hz), C=T(hx,hz), D=T(-hx,hz);
  const shades=[0.95,0.8,0.85,0.72];
  const pts=[A,B,C,D];
  for(let i=0;i<4;i++){
    const j=(i+1)%4;
    this.tri(pts[i][0],cy,pts[i][1], pts[j][0],cy,pts[j][1], cx,cy+h,cz, color, shades[i]);
  }
};
GeoAcc.prototype.build = function(){
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(this.pos, 3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(this.col, 3));
  g.setAttribute('normal', new THREE.Float32BufferAttribute(this.nrm, 3));
  return g;
};

// window registry ã one global InstancedMesh, per-instance lit color at night
const WINDOWS = { items: [] };  // {x,y,z,ry,w,h, buildingKey}
function addWindow(x,y,z,ry,w,h,key){ WINDOWS.items.push({x,y,z,ry,w:w||1.1,h:h||1.5,key}); }
function windowRow(x, y, z, ry, count, spacing, w, h, key){
  // row centered on (x,z), extending along facade direction (perpendicular to ry normal)
  const s=Math.sin(ry), c=Math.cos(ry);
  // facade tangent
  const tx = c, tz = -s;
  const start = -(count-1)/2 * spacing;
  for (let i=0;i<count;i++){
    const off = start + i*spacing;
    addWindow(x + tx*off, y, z + tz*off, ry, w, h, key);
  }
}

// ==== ôÏ7 BUILDING KIT =======================================================
// Every structure is assembled from the accumulator primitives + window rows.
// Facade normal convention: ry is the direction the front faces (0 = +z/south).

function frontVec(ry){ return [Math.sin(ry), Math.cos(ry)]; }

function buildFratHouse(acc, lot, frat){
  const g = H(lot.x, lot.z);
  const ry = lot.ry, [fx,fz] = frontVec(ry);
  const W=16, D=11, storeys=2, SH=3.4;
  const bodyH = storeys*SH + 1.2;
  const brick = colVary(rwPick(PAL.brick), 0.05, RNG.world);
  // raised foundation
  acc.box(lot.x, g+0.5, lot.z, W+0.6, 1.2, D+0.6, ry, 0x8a8378);
  // brick body
  acc.box(lot.x, g+1.1+bodyH/2, lot.z, W, bodyH, D, ry, brick);
  // gable roof, ridge parallel to facade
  acc.gable(lot.x, g+1.1+bodyH, lot.z, W, 3.4, D, ry, rwPick(PAL.roofDark), 0.7);
  // chimneys
  acc.box(lot.x + fz*(W*0.3), g+1.1+bodyH+1.6, lot.z - fx*(W*0.3), 1.1, 3.4, 1.1, ry, PAL.brickDark);
  // full-width white porch: slab, columns, porch roof
  const pd = D/2 + 2.2; // porch center offset from house center
  acc.box(lot.x + fx*pd, g+1.35, lot.z + fz*pd, W, 0.5, 4.6, ry, PAL.white, {topShade:1.05});
  const colY = g+1.6, colH = 4.6;
  for (let i=0;i<5;i++){
    const off = -W/2 + 1.2 + i*(W-2.4)/4;
    const cx = lot.x + fx*(pd+1.6) + fz*off;
    const cz = lot.z + fz*(pd+1.6) - fx*off;
    acc.cyl(cx, colY, cz, 0.34, colH, 6, PAL.white);
  }
  acc.box(lot.x + fx*pd, g+1.6+colH+0.3, lot.z + fz*pd, W+0.8, 0.6, 5.2, ry, PAL.trim);
  // porch pediment with house-color field (the letters live here, painted later)
  acc.gable(lot.x + fx*pd, g+1.6+colH+0.9, lot.z + fz*pd, W+0.4, 1.6, 5.0, ry+Math.PI/2, PAL.white, 0);
  acc.box(lot.x + fx*(pd+2.55), g+1.6+colH+1.35, lot.z + fz*(pd+2.55), W*0.42, 1.15, 0.18, ry, frat?frat.color:0x666677);
  // door
  acc.box(lot.x + fx*(D/2+0.05), g+2.5, lot.z + fz*(D/2+0.05), 1.6, 2.6, 0.2, ry, PAL.woodDark);
  // windows: two floors front, sides
  const key = 'lot:'+lot.id;
  windowRow(lot.x + fx*(D/2+0.12), g+3.2, lot.z + fz*(D/2+0.12), ry, 4, 3.1, 1.1, 1.6, key);
  windowRow(lot.x + fx*(D/2+0.12), g+3.2+SH, lot.z + fz*(D/2+0.12), ry, 5, 2.9, 1.1, 1.5, key);
  windowRow(lot.x - fx*(D/2+0.12), g+3.2, lot.z - fz*(D/2+0.12), ry+Math.PI, 5, 2.9, 1.1, 1.5, key);
  windowRow(lot.x - fx*(D/2+0.12), g+3.2+SH, lot.z - fz*(D/2+0.12), ry+Math.PI, 5, 2.9, 1.1, 1.5, key);
  windowRow(lot.x + fz*(W/2+0.12), g+3.2, lot.z - fx*(W/2+0.12), ry+Math.PI/2, 3, 3.0, 1.0, 1.4, key);
  windowRow(lot.x - fz*(W/2+0.12), g+3.2+SH, lot.z + fx*(W/2+0.12), ry-Math.PI/2, 3, 3.0, 1.0, 1.4, key);
  // basement door on the side (the important door)
  acc.box(lot.x + fz*(W/2+0.05), g+1.0, lot.z - fx*(W/2+0.05), 1.5, 1.9, 0.18, ry+Math.PI/2, 0x3a3f4a);
  return { door:[lot.x + fx*(pd+4.5), lot.z + fz*(pd+4.5)], porch:[lot.x + fx*pd, lot.z + fz*pd] };
}

function buildSororityHouse(acc, lot, sor){
  const g = H(lot.x, lot.z);
  const ry = lot.ry, [fx,fz] = frontVec(ry);
  const W=14, D=10, bodyH=7.4;
  acc.box(lot.x, g+0.4, lot.z, W+0.5, 1.0, D+0.5, ry, 0x9a9288);
  acc.box(lot.x, g+0.9+bodyH/2, lot.z, W, bodyH, D, ry, PAL.white);
  acc.gable(lot.x, g+0.9+bodyH, lot.z, W, 3.0, D, ry, 0x4a5560, 0.6);
  // trim band in sorority color
  acc.box(lot.x + fx*(D/2+0.08), g+0.9+bodyH-0.5, lot.z + fz*(D/2+0.08), W*0.98, 0.5, 0.14, ry, sor?sor.color:0xcccccc);
  // small columned entry
  const pd=D/2+1.6;
  acc.box(lot.x + fx*pd, g+1.15, lot.z + fz*pd, 6, 0.4, 3.2, ry, PAL.white, {topShade:1.05});
  for (const off of [-2.2, 2.2]){
    acc.cyl(lot.x + fx*(pd+1.1) + fz*off, g+1.3, lot.z + fz*(pd+1.1) - fx*off, 0.26, 3.6, 6, PAL.white);
  }
  acc.gable(lot.x + fx*pd, g+4.9, lot.z + fz*pd, 6.4, 1.2, 3.6, ry+Math.PI/2, PAL.trim, 0);
  acc.box(lot.x + fx*(D/2+0.05), g+2.3, lot.z + fz*(D/2+0.05), 1.5, 2.4, 0.18, ry, sor? sor.color : PAL.woodDark);
  const key='lot:'+lot.id;
  windowRow(lot.x + fx*(D/2+0.1), g+2.9, lot.z + fz*(D/2+0.1), ry, 4, 2.9, 1.0, 1.5, key);
  windowRow(lot.x + fx*(D/2+0.1), g+5.9, lot.z + fz*(D/2+0.1), ry, 4, 2.9, 1.0, 1.4, key);
  windowRow(lot.x - fx*(D/2+0.1), g+2.9, lot.z - fz*(D/2+0.1), ry+Math.PI, 4, 2.9, 1.0, 1.4, key);
  return { door:[lot.x + fx*(pd+3.4), lot.z + fz*(pd+3.4)] };
}

function buildAcademic(acc, lot, opts){
  opts = opts||{};
  const g = H(lot.x, lot.z);
  const ry = lot.ry, [fx,fz] = frontVec(ry);
  const W = opts.w||26, D = opts.d||16, bodyH = opts.h||10;
  const cream = opts.color || PAL.white;
  // steps
  for (let i=0;i<3;i++){
    acc.box(lot.x + fx*(D/2+2.2 - i*0.7), g+0.25+i*0.45, lot.z + fz*(D/2+2.2 - i*0.7), W*0.5+2 - i*1.2, 0.5, 3.4, ry, 0xd8d2c2, {topShade:1.02});
  }
  acc.box(lot.x, g+0.6, lot.z, W+1, 1.4, D+1, ry, 0xcfc8b6);
  acc.box(lot.x, g+1.3+bodyH/2, lot.z, W, bodyH, D, ry, cream);
  // colonnade porch
  const nCol = opts.cols||6, pd = D/2+1.9;
  acc.box(lot.x + fx*pd, g+1.5, lot.z + fz*pd, W*0.62, 0.5, 4.2, ry, cream, {topShade:1.04});
  for (let i=0;i<nCol;i++){
    const off = -(nCol-1)/2*( (W*0.58)/(nCol-1) ) + i*( (W*0.58)/(nCol-1) );
    acc.cyl(lot.x + fx*(pd+0.9) + fz*off, g+1.7, lot.z + fz*(pd+0.9) - fx*off, 0.42, bodyH-1.4, 7, cream);
  }
  // entablature + pediment
  acc.box(lot.x + fx*pd, g+1.7+bodyH-1.2, lot.z + fz*pd, W*0.66, 1.0, 4.8, ry, cream);

function buildStoreRow(acc, lot, stores){

  let cursor = -total/2;
  const key='lot:'+lot.id;
  let si = 0;
  while (cursor < total/2 - 8){
    const w = Math.min(rwr(10,16), total/2 - cursor);
    const cx = lot.x + fz*(cursor + w/2), cz = lot.z - fx*(cursor + w/2);
    const hgt = rwPick([7.2, 8.4, 9.2]);
    const brick = colVary(rwPick(PAL.brick.concat([0x9a8a72, 0x777d84, 0xa89880])), 0.05, RNG.world);

    acc.box(cx, g+hgt+0.3, cz, w-0.1, 0.7, 12.4, ry, colVary(brick,0.12,RNG.world), {topShade:0.85}); // parapet
    // storefront glass + door
    addWindow(cx + fx*6.1 - fz*(w*0.15), g+1.7, cz + fz*6.1 + fx*(w*0.15), ry, 2.6, 2.2, key);
    addWindow(cx + fx*6.1 + fz*(w*0.22), g+1.7, cz + fz*6.1 - fx*(w*0.22), ry, 2.2, 2.2, key);

    acc.box(cx + fx*6.6, g+3.35, cz + fz*6.6, w*0.8, 0.28, 1.6, ry, awnCol, {topShade:1.05});

function buildPoleHouse(acc, lot){
  const bank = baseHeight(lot.x, lot.z);

  // stilts ã planted wherever the ground happens to be, that's the charm
  for (const [ox,oz] of [[-W/2+0.6,-D/2+0.6],[W/2-0.6,-D/2+0.6],[-W/2+0.6,D/2-0.6],[W/2-0.6,D/2-0.6],[0,-D/2+0.6],[0,D/2-0.6]]){

    const [px,pz]=rotY(lot.x+ox, lot.z+oz, lot.x, lot.z, s, c);
    const gnd = Math.min(baseHeight(px,pz), deckY-1);
    acc.box(px, (gnd+deckY)/2, pz, 0.35, deckY-gnd, 0.35, ry, PAL.woodDark);
  }
  // deck + cabin + railing
  acc.box(lot.x, deckY+0.15, lot.z, W+3.5, 0.3, D+3, ry, PAL.woodGray, {topShade:1.02});
  acc.box(lot.x - fx*0.8, deckY+0.3+1.6, lot.z - fz*0.8, W-1.5, 3.2, D-1.2, ry, colVary(PAL.wood, 0.12, RNG.world));
  acc.gable(lot.x - fx*0.8, deckY+3.5, lot.z - fz*0.8, W-1.5, 1.5, D-1.2, ry, PAL.roofMetal, 0.5);
  // railing posts
  for (let i=0;i<=6;i++){
    const off = -(W+3)/2 + i*(W+3)/6;
    const s=Math.sin(ry), c=Math.cos(ry);
    const [px,pz]=rotY(lot.x+off, lot.z+(D+2.6)/2, lot.x, lot.z, s, c);
    acc.box(px, deckY+0.75, pz, 0.14, 0.9, 0.14, ry, PAL.woodDark);

  const sx = lot.x - fz*(W/2+2.2), sz = lot.z + fx*(W/2+2.2);

// ==== ôÏ3b NAME POOLS (phase 1 slice: landlords) =============================
const LANDLORD_FIRST = ['Earl','Dale','Wanda','Roy','Carl','Betty','Hank','Dwayne','Loretta','Vern','Junior','Peg','Marvin','Doris'];
const LANDLORD_LAST  = ['Huffman','Ratliff','Coffey','Snider','Hostetter','Whitesell','Camden','Painter','Tolley','Burks','Slusser','Mays'];

// ==== ôÏ8 WORLD ASSEMBLY =====================================================
const WORLD = {
  seed: '', classYear: 4,
  bars: [], houses: [], sororities: [], rentals: [], lotsById: {},
  meshes: {}, windowsByKey: {},
  builtDoors: {},
};

function roadDistance(x, z){
  let best = 1e9;
  for (const r of ROADS){
    const pts = r.pts;
    for (let i=0;i<pts.length-1;i++){
      const ax=pts[i][0], az=pts[i][1], bx=pts[i+1][0], bz=pts[i+1][1];
      const dx=bx-ax, dz=bz-az, len2=dx*dx+dz*dz;
      let t = ((x-ax)*dx + (z-az)*dz) / len2; t = clamp(t,0,1);
      const d2 = dist2(x,z, ax+dx*t, az+dz*t);
      const d = Math.sqrt(d2) - r.w/2;
      if (d<best) best=d;
    }
  }
  return best;
}
function inRect(x,z, x0,z0,x1,z1){ return x>=x0 && x<=x1 && z>=z0 && z<=z1; }
const LAWNS = [ [-150,-160, 280,-50], [-400,20, -260,100] ]; // colonnade lawn, davidson green

function terrainColor(x, z, h){
  const rd = riverDistance(x,z);
  if (rd < RIVER_HALF+6) return lerpColor(PAL.sand[0], PAL.sand[1], fbm(x*0.02, z*0.02, 2));
  // continuous grass field: two greens blended by slow noise, golden dry patches
  const n1 = fbm(x*0.004+7, z*0.004+13, 3);
  let base = lerpColor(0x7c9e58, 0x91af66, n1);
  const dry = fbm(x*0.009+91, z*0.009+47, 2);
  if (dry > 0.6) base = lerpColor(base, 0xa9ab6a, clamp((dry-0.6)*1.8, 0, 0.55));
  const onLawn = LAWNS.some(r=>inRect(x,z,r[0],r[1],r[2],r[3]));
  const fieldD = Math.sqrt(dist2(x,z, -560,-190));
  if (onLawn || fieldD < 55) base = lerpColor(0x6f9e52, 0x7cab5c, n1);
  else if (h > 30) base = lerpColor(base, lerpColor(0x5f7f46, 0x8f8a80, clamp((h-30)/20,0,1)), 0.7);
  else if (z > 620 || Math.sqrt(dist2(x,z,-620,-420)) < 240) base = lerpColor(base, 0x557541, 0.45);
  const rdist = roadDistance(x,z);
  if (rdist < 2.5) base = lerpColor(base, PAL.gravel, 0.5*(1 - clamp(rdist/2.5,0,1)));
  return base;
}

function buildTerrain(){
  const N = CFG.TGRID, S = CFG.WORLD;
  const geo = new THREE.PlaneGeometry(S, S, N, N);
  geo.rotateX(-Math.PI/2);
  const pos = geo.attributes.position;
  const colors = new Float32Array(pos.count*3);
  for (let i=0;i<pos.count;i++){
    const x = pos.getX(i), z = pos.getZ(i);
    const h = H(x,z);
    pos.setY(i, h);
    const c = terrainColor(x,z,h);
    colors[i*3] = ((c>>16)&255)/255; colors[i*3+1] = ((c>>8)&255)/255; colors[i*3+2] = (c&255)/255;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.computeVertexNormals();
  const mat = new THREE.MeshLambertMaterial({ vertexColors:true });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.name = 'terrain';
  return mesh;
}

function buildWater(){
  // river ribbon with a hint of depth in the middle
  const posArr=[], colArr=[];
  const left=[], right=[];
  for (let i=0;i<RIVER_PTS.length;i++){
    const [x,z] = RIVER_PTS[i];
    const [px,pz] = RIVER_PTS[Math.max(0,i-1)], [nx,nz] = RIVER_PTS[Math.min(RIVER_PTS.length-1,i+1)];
    let dx=nx-px, dz=nz-pz; const l=Math.sqrt(dx*dx+dz*dz)||1; dx/=l; dz/=l;
    const ox=-dz, oz=dx, w=RIVER_HALF+8;
    left.push([x-ox*w, z-oz*w]); right.push([x+ox*w, z+oz*w]);
  }
  const deep = PAL.waterDeep, edge = PAL.water;
  function pushV(x,z,c){ posArr.push(x, CFG.WATER_Y, z); colArr.push(((c>>16)&255)/255, ((c>>8)&255)/255, (c&255)/255); }
  for (let i=0;i<RIVER_PTS.length-1;i++){
    const c=RIVER_PTS[i], cn=RIVER_PTS[i+1];
    // two-strip cross-section: left-center, center-right for a deep middle
    const quads = [ [left[i], c, cn, left[i+1], edge, deep], [c, right[i], right[i+1], cn, deep, edge] ];
    for (const [a,b,bn,an,ca,cb] of quads){
      pushV(a[0],a[1],ca); pushV(b[0],b[1],cb); pushV(bn[0],bn[1],cb);
      pushV(a[0],a[1],ca); pushV(bn[0],bn[1],cb); pushV(an[0],an[1],ca);
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(posArr,3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(colArr,3));
  g.computeVertexNormals();
  const m = new THREE.Mesh(g, new THREE.MeshLambertMaterial({ vertexColors:true, transparent:true, opacity:0.92 }));
  m.name='water';
  WORLD.meshes.water = m;
  return m;
}

function buildRoads(){
  const acc = new GeoAcc();
  for (const r of ROADS){
    const col = r.kind==='walk' ? PAL.brickWalk : r.kind==='gravel' ? PAL.gravel : PAL.asphalt;
    const pts=[];
    for (let i=0;i<r.pts.length-1;i++){
      const [ax,az]=r.pts[i], [bx,bz]=r.pts[i+1];
      const segLen=Math.sqrt(dist2(ax,az,bx,bz));
      const n=Math.max(1, Math.round(segLen/7));
      for (let j=(i===0?0:1); j<=n; j++) pts.push([lerp(ax,bx,j/n), lerp(az,bz,j/n)]);
    }
    for (let i=0;i<pts.length-1;i++){
      const [ax,az]=pts[i], [bx,bz]=pts[i+1];
      let dx=bx-ax, dz=bz-az; const l=Math.sqrt(dx*dx+dz*dz)||1; dx/=l; dz/=l;
      const ox=-dz*r.w/2, oz=dx*r.w/2;
      const shade = r.kind==='road' ? (0.95 + (i%2)*0.05) : 1.0;
      const lift = 0.3;
      acc.quad([ax-ox,H(ax-ox,az-oz)+lift,az-oz],[ax+ox,H(ax+ox,az+oz)+lift,az+oz],[bx+ox,H(bx+ox,bz+oz)+lift,bz+oz],[bx-ox,H(bx-ox,bz-oz)+lift,bz-oz], col, shade);
    }
  }
  const m = new THREE.Mesh(acc.build(), new THREE.MeshLambertMaterial({ vertexColors:true }));
  m.name='roads';
  return m;
}

function buildSurround(){

  const geo = new THREE.RingGeometry(700, 6200, 48, 4);

    pos.setY(i, (d<900 ? -2 : lerp(-2, 10, smoothstep(900, 6200, d)) + fbm(x*0.002, z*0.002, 2)*16));
    const c = lerpColor(0x74904f, 0x69825a, fbm(x*0.004+3, z*0.004+9, 2));
    colors[i*3]=((c>>16)&255)/255; colors[i*3+1]=((c>>8)&255)/255; colors[i*3+2]=(c&255)/255;

function buildRidge(){
  // the Blue Ridge: two smooth rolling ridgelines, hazier with distance
  const pos=[], col=[], nrm=[];
  function pushRing(radius, hBase, hVar, hexLow, hexHigh){
    const n = 140;
    const hs = [];
    for (let i=0;i<=n;i++){
      const ph = fbm(i*0.35 + radius*0.013, radius*0.007, 3);
      const ph2 = fbm(i*0.11 + radius*0.031, 8.8, 2);
      hs.push(hBase + ph*hVar*0.55 + ph2*hVar*0.45);
    }
    for (let i=0;i<n;i++){
      const a0=i/n*Math.PI*2, a1=(i+1)/n*Math.PI*2;
      const x0=Math.cos(a0)*radius, z0=Math.sin(a0)*radius;
      const x1=Math.cos(a1)*radius, z1=Math.sin(a1)*radius;
      const h0=hs[i], h1=hs[i+1];
      // base strip (dark low) to crest (light high) ã painted, not lit
      const cl = hexLow, ch = hexHigh;
      const verts = [ [x0,-80,z0,cl],[x1,-80,z1,cl],[x1,h1,z1,ch], [x0,-80,z0,cl],[x1,h1,z1,ch],[x0,h0,z0,ch] ];
      for (const [vx,vy,vz,vc] of verts){
        pos.push(vx,vy,vz);
        const t = clamp((vy+80)/(hBase+hVar+80), 0, 1);
        const c = lerpColor(vc, ch, t*0.5);
        col.push(((c>>16)&255)/255, ((c>>8)&255)/255, (c&255)/255);
        nrm.push(0,1,0);
      }
    }
  }
  pushRing(2500, 150, 130, 0x51648a, 0x66799e);
  pushRing(3600, 260, 200, 0x6d80a4, 0x8496b8);
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('color', new THREE.Float32BufferAttribute(col,3));
  g.setAttribute('normal', new THREE.Float32BufferAttribute(nrm,3));
  const m = new THREE.Mesh(g, new THREE.MeshBasicMaterial({ vertexColors:true, fog:false }));
  m.name='ridge';
  WORLD.meshes.ridge = m;
  return m;
}

function makeGlowTexture(inner, outer){
  const cv = document.createElement('canvas'); cv.width=cv.height=64;
  const ctx = cv.getContext('2d');
  const grd = ctx.createRadialGradient(32,32,2,32,32,30);
  grd.addColorStop(0, inner); grd.addColorStop(0.5, outer); grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd; ctx.fillRect(0,0,64,64);
  const tex = new THREE.CanvasTexture(cv);
  return tex;
}

function buildSky(){
  const geo = new THREE.SphereGeometry(4400, 20, 12);
  const mat = new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite:false, fog:false,
    uniforms: {
      topColor:     { value: new THREE.Color(0x7aa5d8) },
      horizonColor: { value: new THREE.Color(0xdfe8ef) },
      sunDir:       { value: new THREE.Vector3(0,1,0) },
      sunGlow:      { value: new THREE.Color(0xfff2c8) },
      glowAmt:      { value: 0.6 },
    },
    vertexShader: 'varying vec3 vDir; void main(){ vDir = normalize(position); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }',
    fragmentShader: [
      'uniform vec3 topColor; uniform vec3 horizonColor; uniform vec3 sunDir; uniform vec3 sunGlow; uniform float glowAmt;',
      'varying vec3 vDir;',
      'void main(){',
      '  float t = clamp(vDir.y*1.6, 0.0, 1.0);',
      '  vec3 col = mix(horizonColor, topColor, pow(t, 0.75));',
      '  float g = pow(max(dot(normalize(vDir), normalize(sunDir)), 0.0), 18.0);',
      '  col += sunGlow * g * glowAmt;',
      '  gl_FragColor = vec4(col, 1.0);',
      '}',
    ].join('\n'),
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.name='sky';
  return mesh;
}

function buildStars(){

    const r=4100*Math.sqrt(1-y*y);

  return pts;
}

// ---- occupancy assignment (the seed's real job) ----------------------------
function assignOccupants(){
  // frats: 5 hill lots + 3 green lots. Gentle archetype weighting, then shuffle.
  const hillLots = LOTS.filter(l=>l.kind==='FRAT_HILL');
  const greenLots = LOTS.filter(l=>l.kind==='FRAT_GREEN');
  const fratOrder = FRATS.slice();
  // seeded shuffle
  for (let i=fratOrder.length-1;i>0;i--){ const j=Math.floor(rw()*(i+1)); [fratOrder[i],fratOrder[j]]=[fratOrder[j],fratOrder[i]]; }
  // gentlemen gravitate to the hill; animals drift to the green edge
  // (precomputed keys: rng inside a sort comparator is engine-dependent)
  const weights = fratOrder.map(f => (f.key==='SS'?-1.5:0) + (f.key==='RD'?1.5:0) + rw()*2);
  const order = fratOrder.map((f,i)=>i).sort((a,b)=> weights[a]-weights[b] || a-b);
  const sorted = order.map(i=>fratOrder[i]);
  fratOrder.length = 0; fratOrder.push(...sorted);
  const lotsSeq = hillLots.concat(greenLots);
  WORLD.houses = fratOrder.map((frat, i)=>({
    frat, lotId: lotsSeq[i].id, lot: lotsSeq[i],
  }));
  const sorOrder = SORORITIES.slice();
  for (let i=sorOrder.length-1;i>0;i--){ const j=Math.floor(rw()*(i+1)); [sorOrder[i],sorOrder[j]]=[sorOrder[j],sorOrder[i]]; }
  const sorLots = LOTS.filter(l=>l.kind==='SORORITY');
  WORLD.sororities = sorOrder.map((sor,i)=>({ sor, lotId: sorLots[i].id, lot: sorLots[i] }));
  // rentals: guarantee the five downtown archetypes exist, fill the rest
  const rnLots = LOTS.filter(l=>l.kind==='RENTAL');
  const archPool = RENTAL_ARCHETYPES.slice();
  while (archPool.length < rnLots.length) archPool.push(rwPick(RENTAL_ARCHETYPES));
  for (let i=archPool.length-1;i>0;i--){ const j=Math.floor(rw()*(i+1)); [archPool[i],archPool[j]]=[archPool[j],archPool[i]]; }
  const mkLandlord = ()=> rnPick(LANDLORD_FIRST)+' '+rnPick(LANDLORD_LAST);
  WORLD.rentals = [];
  rnLots.forEach((lot,i)=>{
    WORLD.rentals.push({ lotId:lot.id, lot, arch:archPool[i], name:RENTAL_NAMES[archPool[i]],
      landlord: mkLandlord(), patience: rwi(55,95), rent: rwi(10,22) });
  });
  for (const lot of LOTS.filter(l=>l.kind==='POLE'))
    WORLD.rentals.push({ lotId:lot.id, lot, arch:'POLE', name:RENTAL_NAMES.POLE, landlord: mkLandlord(), patience: rwi(60,95), rent: rwi(14,20) });
  for (const lot of LOTS.filter(l=>l.kind==='HILLR'))
    WORLD.rentals.push({ lotId:lot.id, lot, arch:'HILL', name:RENTAL_NAMES.HILL, landlord: mkLandlord(), patience: rwi(60,95), rent: rwi(8,14) });
}

function buildStatics(){
  const acc = new GeoAcc();
  for (const lot of LOTS) WORLD.lotsById[lot.id]=lot;
  // institutions
  for (const lot of LOTS){
    switch(lot.kind){
      case 'ACADEMIC': WORLD.builtDoors[lot.id] = buildAcademic(acc, lot, { w:lot.w+2, cupola: lot.id==='AC2' }).door; break;
      case 'CHAPEL':   WORLD.builtDoors[lot.id] = buildChapel(acc, lot).door; break;
      case 'LIBRARY':  WORLD.builtDoors[lot.id] = buildAcademic(acc, lot, { w:34, d:20, h:11, cols:8, winf:7, color:0xe9e2d0, cupola:true }).door; break;
      case 'COMMONS':  WORLD.builtDoors[lot.id] = buildAcademic(acc, lot, { w:26, d:18, h:8, cols:4, winf:5, color:rwPick(PAL.brick), roof:0x50555e }).door; break;
      case 'DORM':     WORLD.builtDoors[lot.id] = buildDorm(acc, lot).door; break;
      case 'BARRACKS': buildBarracks(acc, lot); break;
      case 'PAVILION': WORLD.builtDoors[lot.id] = buildPavilion(acc, lot).door; break;
      case 'FIELD':    buildField(acc, lot); break;
    }
  }
  // greek houses per assignment
  for (const h of WORLD.houses){
    const r = buildFratHouse(acc, h.lot, h.frat);
    WORLD.builtDoors[h.lotId] = r.door; h.porch = r.porch;
  }
  for (const s of WORLD.sororities){
    const r = buildSororityHouse(acc, s.lot, s.sor);
    WORLD.builtDoors[s.lotId] = r.door;
  }
  const storeKinds = STORE_KINDS.slice();
  for (const lot of LOTS.filter(l=>l.kind==='STORE_ROW')){
    // rotate the kinds so bars land in different rows per seed
    storeKinds.push(storeKinds.shift());
    if (rw()<0.5) storeKinds.push(storeKinds.shift());
    buildStoreRow(acc, lot, storeKinds);
  }
  for (const r of WORLD.rentals){
    if (r.arch==='POLE') WORLD.builtDoors[r.lotId] = buildPoleHouse(acc, r.lot).door;
    else if (r.arch==='HILL') WORLD.builtDoors[r.lotId] = buildHillRental(acc, r.lot).door;
    else WORLD.builtDoors[r.lotId] = buildRental(acc, r.lot, r.arch).door;
  }
  buildStatue(acc, 52, -142);
  // lampposts along the civilized streets
  for (const [x0,z0,x1,z1] of [[-140,-146,260,-146],[-330,-56,510,-56],[-460,254,210,254]]){
    const len = Math.sqrt(dist2(x0,z0,x1,z1));
    const n = Math.floor(len/42);
    for (let i=0;i<=n;i++){
      const x=lerp(x0,x1,i/n), z=lerp(z0,z1,i/n);
      const g=H(x,z);
      acc.box(x, g+2.2, z, 0.16, 4.4, 0.16, 0, 0x2e3138);
      acc.box(x, g+4.5, z, 0.5, 0.5, 0.5, 0.4, 0xd8c37a);
    }
  }
  // benches on the lawn
  for (let i=0;i<10;i++){
    const x=rwr(-120,240), z=rwr(-140,-70);
    if (roadDistance(x,z)<3) continue;
    const g=H(x,z), ry=rwr(0,Math.PI*2);
    acc.box(x, g+0.45, z, 1.8, 0.12, 0.5, ry, PAL.woodDark);
    acc.box(x, g+0.25, z, 1.6, 0.4, 0.08, ry, PAL.woodDark);
  }
  const mesh = new THREE.Mesh(acc.build(), new THREE.MeshLambertMaterial({ vertexColors:true }));
  mesh.name='statics';
  return mesh;
}

function buildWindows(){
  const geo = new THREE.PlaneGeometry(1,1);
  const mat = new THREE.MeshBasicMaterial({ side:THREE.DoubleSide });
  const n = WINDOWS.items.length;
  const mesh = new THREE.InstancedMesh(geo, mat, n);
  const m4 = new THREE.Matrix4(), q = new THREE.Quaternion(), e = new THREE.Euler(), s = new THREE.Vector3(), p = new THREE.Vector3();
  const dayCol = new THREE.Color(PAL.glassDay);
  for (let i=0;i<n;i++){
    const w = WINDOWS.items[i];
    e.set(0, w.ry, 0); q.setFromEuler(e);
    p.set(w.x, w.y, w.z); s.set(w.w, w.h, 1);
    m4.compose(p, q, s);
    mesh.setMatrixAt(i, m4);
    mesh.setColorAt(i, dayCol);
    if (!WORLD.windowsByKey[w.key]) WORLD.windowsByKey[w.key] = [];
    WORLD.windowsByKey[w.key].push(i);
  }
  mesh.instanceMatrix.needsUpdate = true;
  mesh.name='windows';
  WINDOWS.mesh = mesh;
  return mesh;
}

function buildTrees(){
  const trunkGeo = new THREE.CylinderGeometry(0.28, 0.42, 1, 5); trunkGeo.translate(0, 0.5, 0);
  const canGeo = new THREE.IcosahedronGeometry(1, 0);
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x6d5340 });
  const canMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const N = CFG.TREES;
  const trunks = new THREE.InstancedMesh(trunkGeo, trunkMat, N);
  const cans = new THREE.InstancedMesh(canGeo, canMat, N);
  const m4=new THREE.Matrix4(), q=new THREE.Quaternion(), e=new THREE.Euler(), s=new THREE.Vector3(), p=new THREE.Vector3();
  const col=new THREE.Color();
  const canopyGreens = [0x41702f, 0x4c7a38, 0x568540, 0x486f33, 0x5f9048];
  let placed=0, guard=0;
  WORLD.treeData = [];
  while (placed<N && guard<N*40){
    guard++;
    const x=rwr(-790,790), z=rwr(-790,790);
    const rd=riverDistance(x,z);
    if (rd < 26) continue;
    if (roadDistance(x,z) < 6) continue;
    let ok=true;
    for (const lot of LOTS){ if (dist2(x,z,lot.x,lot.z) < (lot.w*1.05)*(lot.w*1.05)) { ok=false; break; } }
    if (!ok) continue;
    const onLawn = LAWNS.some(r=>inRect(x,z,r[0],r[1],r[2],r[3]));
    const h = H(x,z);
    // density by biome
    let accept = 0.28;
    if (Math.sqrt(dist2(x,z,-620,-420)) < 250) accept = 0.95;              // NW woods
    else if (Math.sqrt(dist2(x,z,620,-430)) < 230) accept = 0.8;           // NE ridge woods
    else if (z > 640) accept = 0.85;                                        // across the river
    else if (rd < 55) accept = 0.75;                                        // river sycamores
    else if (inRect(x,z,-470,180,230,400)) accept = 0.1;                    // downtown blocks
    if (onLawn) accept = 0.05;                                              // a few great lawn oaks
    if (rw() > accept) continue;
    const th = onLawn ? rwr(5.5,7.5) : rwr(3.4,6.2);
    const cr = onLawn ? rwr(4.2,5.6) : rwr(2.6,4.4);
    p.set(x, h, z); e.set(0, rw()*Math.PI*2, 0); q.setFromEuler(e); s.set(1, th, 1);
    m4.compose(p,q,s); trunks.setMatrixAt(placed, m4);
    p.set(x, h+th*0.92, z); s.set(cr, cr*rwr(0.9,1.25), cr);
    m4.compose(p,q,s); cans.setMatrixAt(placed, m4);
    const baseCol = canopyGreens[Math.floor(rw()*canopyGreens.length)];
    col.setHex(colVary(baseCol, 0.08, RNG.world));
    cans.setColorAt(placed, col);
    WORLD.treeData.push({ x, z, baseCol });
    placed++;
  }
  trunks.count = placed; cans.count = placed;
  trunks.instanceMatrix.needsUpdate = true; cans.instanceMatrix.needsUpdate = true;
  trunks.name='trunks'; cans.name='canopies';
  WORLD.meshes.canopies = cans;
  return [trunks, cans];
}

function buildCars(){
  // one merged little car: body + cabin
  const acc = new GeoAcc();
  acc.box(0, 0.55, 0, 4.4, 1.0, 1.9, 0, 0xffffff);
  acc.box(-0.3, 1.35, 0, 2.4, 0.75, 1.7, 0, 0xd8dde2);
  const geo = acc.build();
  const mat = new THREE.MeshLambertMaterial({ vertexColors:true });
  const N = CFG.CARS;
  const mesh = new THREE.InstancedMesh(geo, mat, N);
  const eraColors = [0x2e4a2e, 0x5c1f1f, 0x1f2a44, 0xb0a88f, 0xa8adb4, 0xe8e4da, 0x23252a, 0x7a4a2a, 0x8f2f2f];
  const m4=new THREE.Matrix4(), q=new THREE.Quaternion(), e=new THREE.Euler(), s=new THREE.Vector3(1,1,1), p=new THREE.Vector3();
  const col=new THREE.Color();
  const parkRoads = ROADS.filter(r=>r.kind==='road');
  let placed=0, guard=0;
  while (placed<N && guard<N*30){
    guard++;
    const r = parkRoads[Math.floor(rw()*parkRoads.length)];
    const i = Math.floor(rw()*(r.pts.length-1));
    const [ax,az]=r.pts[i], [bx,bz]=r.pts[i+1];
    const t=rw();
    let dx=bx-ax, dz=bz-az; const l=Math.sqrt(dx*dx+dz*dz)||1; dx/=l; dz/=l;
    const side = rw()<0.5?-1:1;
    const x = lerp(ax,bx,t) - dz*side*(r.w/2+1.4);
    const z = lerp(az,bz,t) + dx*side*(r.w/2+1.4);
    let ok = true;
    for (const lot of LOTS){ if (dist2(x,z,lot.x,lot.z) < 14*14) { ok=false; break; } }
    if (!ok) continue;
    p.set(x, H(x,z)+0.15, z);
    e.set(0, Math.atan2(dx, dz) + Math.PI/2 + (rw()<0.05? rwr(-0.3,0.3): 0), 0);
    q.setFromEuler(e);
    m4.compose(p,q,s);
    mesh.setMatrixAt(placed, m4);
    // big vehicles get truck-ish stretched? keep simple: color only
    col.setHex(colVary(eraColors[Math.floor(rw()*eraColors.length)], 0.06, RNG.world));
    mesh.setColorAt(placed, col);
    placed++;
  }
  mesh.count = placed;
  mesh.instanceMatrix.needsUpdate = true;
  mesh.name='cars';
  return mesh;
}

const R = { renderer:null, scene:null, camera:null, sun:null, moonlight:null, hemi:null,
  sky:null, stars:null, sunSprite:null, moonSprite:null,
  lastLitBucket:-1 };

// time-of-day palette stops: [hour, skyTop, horizon, sunColor, sunI, hemiI, starA]
const DAY_STOPS = [
  [0.0,  0x0b1230, 0x141d33, 0x9ab0dd, 0.16, 0.34, 0.95],
  [5.0,  0x0d1534, 0x1a2340, 0x9ab0dd, 0.16, 0.34, 0.9],
  [6.3,  0x3a5686, 0xe0995f, 0xffb36a, 0.5,  0.42, 0.25],
  [8.0,  0x6f9cd0, 0xdfe8ef, 0xfff2d8, 1.0,  0.62, 0.0],
  [13.0, 0x5f92cc, 0xd8e8f0, 0xfff8ea, 1.12, 0.66, 0.0],
  [17.2, 0x6d8cbe, 0xefcf96, 0xffd9a0, 0.95, 0.6,  0.0],
  [18.9, 0x3d4a78, 0xe08a52, 0xff9a58, 0.5,  0.42, 0.1],
  [20.2, 0x131b3c, 0x2a3352, 0x9ab0dd, 0.16, 0.3,  0.7],
  [24.0, 0x0b1230, 0x141d33, 0x9ab0dd, 0.16, 0.34, 0.95],
];
const _c1 = new THREE.Color(), _c2 = new THREE.Color();
function dayLerp(hour){
  let a = DAY_STOPS[0], b = DAY_STOPS[DAY_STOPS.length-1];
  for (let i=0;i<DAY_STOPS.length-1;i++){
    if (hour>=DAY_STOPS[i][0] && hour<=DAY_STOPS[i+1][0]){ a=DAY_STOPS[i]; b=DAY_STOPS[i+1]; break; }
  }
  const t = (hour-a[0])/Math.max(0.001,(b[0]-a[0]));
  return { t, a, b };
}
function mixHex(h1,h2,t){ _c1.setHex(h1); _c2.setHex(h2); return _c1.lerp(_c2,t); }

function litFraction(hour){
  if (hour>=6.5 && hour<17.5) return 0.02;
  if (hour>=17.5 && hour<19) return lerp(0.05,0.5,(hour-17.5)/1.5);
  if (hour>=19 && hour<23) return 0.62;
  if (hour>=23 || hour<1) return 0.4;
  if (hour>=1 && hour<3) return 0.16;
  return 0.05;
}
const WIN_LIT = new THREE.Color(0xffd98a), WIN_LIT2 = new THREE.Color(0xffc45e), WIN_DARK = new THREE.Color(0x151d2c), WIN_DAY = new THREE.Color(PAL.glassDay);
function updateWindowLights(hour){
  const f = litFraction(hour);
  const bucket = Math.round(f*24) + (hour>=6.5 && hour<17.5 ? 1000 : 0);
  if (bucket === R.lastLitBucket || !WINDOWS.mesh) return;
  R.lastLitBucket = bucket;
  const day = hour>=6.5 && hour<17.5;
  const ovr = (typeof DYN !== 'undefined') ? DYN.windowOverride : null;
  const darkKeys = WORLD.darkKeys;
  for (let i=0;i<WINDOWS.items.length;i++){
    const w = WINDOWS.items[i];
    if (darkKeys && darkKeys.has(w.key)) WINDOWS.mesh.setColorAt(i, WIN_DARK);
    else if (ovr && ovr.has(w.key)) WINDOWS.mesh.setColorAt(i, w.lr < 0.8 ? WIN_LIT : WIN_LIT2);
    else if (day) WINDOWS.mesh.setColorAt(i, WIN_DAY);
    else if (w.lr < f) WINDOWS.mesh.setColorAt(i, w.lr < f*0.5 ? WIN_LIT : WIN_LIT2);
    else WINDOWS.mesh.setColorAt(i, WIN_DARK);
  }
  WINDOWS.mesh.instanceColor.needsUpdate = true;
}

const CAM = {
  fx: 55, fz: -85, dist: 440, yaw: 0.12, pitchOff: -0.44,
  tfx: 55, tfz: -85, tdist: 440, tyaw: 0.12, tpitchOff: -0.44,
  dragging: 0, lastX:0, lastY:0, pinchD: 0,
};
function camPitch(){
  const t = smoothstep(Math.log(20), Math.log(2300), Math.log(CAM.dist));
  return clamp(lerp(0.3, 1.15, t) + CAM.pitchOff, 0.12, 1.5);
}
function updateCamera(dt){
  const k = 1 - Math.exp(-dt*5.5);
  CAM.fx += (CAM.tfx-CAM.fx)*k; CAM.fz += (CAM.tfz-CAM.fz)*k;
  CAM.dist += (CAM.tdist-CAM.dist)*k; CAM.yaw += (CAM.tyaw-CAM.yaw)*k;
  CAM.pitchOff += (CAM.tpitchOff-CAM.pitchOff)*k;
  const fy = H(CAM.fx, CAM.fz);
  const pitch = camPitch();
  const cx = CAM.fx + CAM.dist*Math.cos(pitch)*Math.sin(CAM.yaw);
  const cz = CAM.fz + CAM.dist*Math.cos(pitch)*Math.cos(CAM.yaw);
  let cy = fy + CAM.dist*Math.sin(pitch);
  const minY = H(cx,cz) + 4;
  if (cy < minY) cy = minY;
  R.camera.position.set(cx, cy, cz);
  R.camera.lookAt(CAM.fx, fy+6, CAM.fz);
}
function bindInput(dom){
  dom.addEventListener('contextmenu', e=>e.preventDefault());
  dom.addEventListener('pointerdown', e=>{
    CAM.dragging = (e.button===2 || e.shiftKey) ? 2 : 1;
    CAM.lastX = e.clientX; CAM.lastY = e.clientY;
    CAM.moved = 0;
    dom.setPointerCapture(e.pointerId);
  });
  dom.addEventListener('pointerup', e=>{
    CAM.dragging=0;
    if ((CAM.moved||0) < 7 && typeof clickWorld === 'function') clickWorld(e.clientX, e.clientY);
  });
  dom.addEventListener('pointermove', e=>{
    if (!CAM.dragging) return;
    const dx = e.clientX-CAM.lastX, dy = e.clientY-CAM.lastY;
    CAM.lastX=e.clientX; CAM.lastY=e.clientY;
    CAM.moved = (CAM.moved||0) + Math.abs(dx) + Math.abs(dy);
    if (CAM.moved > 6 && typeof dirSuspend === 'function') dirSuspend();
    if (CAM.dragging===1){
      CAM.tyaw -= dx*0.005;
      CAM.tpitchOff = clamp(CAM.tpitchOff - dy*0.0035, -0.6, 0.45);
    } else {
      const pitch = camPitch();
      const spd = CAM.dist*0.0016;
      const sy=Math.sin(CAM.yaw), cy=Math.cos(CAM.yaw);
      CAM.tfx += ( dx*cy + dy*(-sy) ) * spd * -1;
      CAM.tfz += ( -dx*sy + dy*(-cy) ) * spd * -1;
      CAM.tfx = clamp(CAM.tfx, -820, 820); CAM.tfz = clamp(CAM.tfz, -820, 820);
    }
  });
  dom.addEventListener('wheel', e=>{
    e.preventDefault();
    CAM.tdist = clamp(CAM.tdist*Math.exp(e.deltaY*0.0011), CFG.CAM_MIN, CFG.CAM_MAX);
    if (typeof dirSuspend === 'function') dirSuspend();
  }, { passive:false });
  // touch pinch
  const tp = {};
  dom.addEventListener('touchstart', e=>{ for (const t of e.changedTouches) tp[t.identifier]=[t.clientX,t.clientY]; });
  dom.addEventListener('touchend', e=>{ for (const t of e.changedTouches) delete tp[t.identifier]; CAM.pinchD=0; });
  dom.addEventListener('touchmove', e=>{
    const ids = Object.keys(tp);
    if (ids.length>=2){
      e.preventDefault();
      const t0 = e.touches[0], t1 = e.touches[1];
      const d = Math.hypot(t0.clientX-t1.clientX, t0.clientY-t1.clientY);
      if (CAM.pinchD>0) CAM.tdist = clamp(CAM.tdist*(CAM.pinchD/d), CFG.CAM_MIN, CFG.CAM_MAX);
      CAM.pinchD = d;
      for (const t of e.touches) tp[t.identifier]=[t.clientX,t.clientY];
    }
  }, { passive:false });
  window.addEventListener('keydown', e=>{
    if (e.code==='Space'){ CLOCK.paused=!CLOCK.paused; e.preventDefault(); }
    if (e.key==='1') CLOCK.speed='porch';
    if (e.key==='2') CLOCK.speed='weekend';
    if (e.key==='3') CLOCK.speed='semester';
    if (e.key==='4') CLOCK.speed='saga';
    if (e.key==='5' || e.key.toLowerCase()==='a') CLOCK.speed='documentary';
    if (e.key.toLowerCase()==='c') watchToggle();
    if (e.key.toLowerCase()==='d') DIR.on = !DIR.on;
    if (e.key==='Escape'){
      if (typeof ACTS!=='undefined'){ ACTS.pending=null; actHint(''); }
      if (typeof PICK!=='undefined' && PICK.el) PICK.el.style.display='none';
      const ov = document.getElementById('compositeov'); if (ov) ov.remove();
    }
    if (typeof hud2Refresh==='function') hud2Refresh();
  });
}

function updateAtmosphere(){
  const hour = CLOCK.hourFloat() % 24;
  const { t, a, b } = dayLerp(hour);
  const top = mixHex(a[1], b[1], t).clone();
  const hor = mixHex(a[2], b[2], t).clone();
  const sunC = mixHex(a[3], b[3], t).clone();
  const sunI = lerp(a[4], b[4], t), hemiI = lerp(a[5], b[5], t), starA = lerp(a[6], b[6], t);
  if (R.sky){
    R.sky.material.uniforms.topColor.value.copy(top);
    R.sky.material.uniforms.horizonColor.value.copy(hor);
  }
  const wx = (SIM.weather && SIM.weather.state) || 'clear';
  if (wx !== 'clear'){
    const grayC = _c2.setHex(0x9aa4ae);
    top.lerp(grayC, wx==='rain'?0.7:0.45);
    hor.lerp(grayC, wx==='rain'?0.6:0.35);
  }
  R.scene.fog.color.copy(hor).lerp(top, 0.35);
  R.scene.fog.near = wx==='rain' ? 550 : wx==='gray' ? 1000 : 1500;
  R.scene.fog.far  = wx==='rain' ? 2800 : 5000;
  // sun path: rises ~6, sets ~19; azimuth arcs south
  const dayT = clamp((hour-6)/13, 0, 1);
  const sunAlt = Math.sin(dayT*Math.PI) * 0.95;
  const sunAz = lerp(-2.2, 2.2, dayT) + Math.PI; // east ã west over the ridge
  const sx = Math.sin(sunAz)*Math.cos(sunAlt), sy = Math.max(Math.sin(sunAlt), -0.3), sz = Math.cos(sunAz)*Math.cos(sunAlt);
  R.sun.position.set(CAM.fx + sx*1200, sy*1400 + 80, CAM.fz + sz*1200);
  R.sun.target.position.set(CAM.fx, 0, CAM.fz);
  R.sun.color.copy(sunC);
  R.sun.intensity = sunI * (wx==='rain' ? 0.45 : wx==='gray' ? 0.72 : 1);
  R.hemi.intensity = hemiI;
  R.hemi.color.copy(top).lerp(_c2.setHex(0xffffff), 0.4);
  if (R.sky) {
    R.sky.material.uniforms.sunDir.value.set(sx, Math.sin(sunAlt), sz);
    R.sky.material.uniforms.glowAmt.value = hour>19.5||hour<5.5 ? 0.0 : 0.7;
  }
  if (R.stars) R.stars.material.opacity = starA;
  // sprites ride the sky dome
  R.sunSprite.position.set(R.camera.position.x + sx*4200, Math.sin(sunAlt)*4200, R.camera.position.z + sz*4200);
  R.sunSprite.material.opacity = clamp(Math.sin(sunAlt)*3+0.4, 0, 1);
  const moonT = clamp(((hour+12)%24-6)/13, 0, 1);
  const moonAlt = Math.sin(moonT*Math.PI)*0.8, moonAz = lerp(-2.0, 2.0, moonT);
  R.moonSprite.position.set(R.camera.position.x + Math.sin(moonAz)*4100, Math.sin(moonAlt)*4100, R.camera.position.z + Math.cos(moonAz)*4100);
  R.moonSprite.material.opacity = starA>0.2 ? 0.9 : 0;
  updateWindowLights(hour);
}

// ==== ôÏ6b NAV GRAPH & ROUTING ==============================================
const NAV = { nodes: [], adj: [], cache: {} };
function navBuild(){
  const nodes = NAV.nodes, adj = NAV.adj;
  function addNode(x,z){ nodes.push([x,z]); adj.push([]); return nodes.length-1; }
  function link(a,b){ if (a!==b && !adj[a].includes(b)){ adj[a].push(b); adj[b].push(a); } }
  for (const r of ROADS){
    let prevIdx = -1;
    for (let i=0;i<r.pts.length-1;i++){
      const [ax,az]=r.pts[i], [bx,bz]=r.pts[i+1];
      const segLen = Math.sqrt(dist2(ax,az,bx,bz));
      const n = Math.max(1, Math.round(segLen/18));
      for (let j=(i===0?0:1); j<=n; j++){
        const idx = addNode(lerp(ax,bx,j/n), lerp(az,bz,j/n));
        if (prevIdx>=0) link(prevIdx, idx);
        prevIdx = idx;
      }
    }
  }
  // fuse junctions
  for (let a=0;a<nodes.length;a++){
    for (let b=a+1;b<nodes.length;b++){
      if (dist2(nodes[a][0],nodes[a][1],nodes[b][0],nodes[b][1]) < 13*13) link(a,b);
    }
  }
}
function navNearest(x,z){
  let best=-1, bd=1e18;
  for (let i=0;i<NAV.nodes.length;i++){
    const d = dist2(x,z,NAV.nodes[i][0],NAV.nodes[i][1]);
    if (d<bd){ bd=d; best=i; }
  }
  return best;
}
function navRoute(ax,az,bx,bz){
  const s = navNearest(ax,az), e = navNearest(bx,bz);
  const key = s+'>'+e;
  let mid = NAV.cache[key];
  if (mid === undefined){
    // dijkstra
    const N = NAV.nodes.length;
    const distArr = new Float64Array(N).fill(Infinity);
    const prev = new Int32Array(N).fill(-1);
    const visited = new Uint8Array(N);
    distArr[s]=0;
    for(;;){
      let u=-1, ud=Infinity;
      for (let i=0;i<N;i++) if (!visited[i] && distArr[i]<ud){ ud=distArr[i]; u=i; }
      if (u<0 || u===e) break;
      visited[u]=1;
      for (const v of NAV.adj[u]){
        const w = Math.sqrt(dist2(NAV.nodes[u][0],NAV.nodes[u][1],NAV.nodes[v][0],NAV.nodes[v][1]));
        if (distArr[u]+w < distArr[v]){ distArr[v]=distArr[u]+w; prev[v]=u; }
      }
    }
    mid = [];
    let cur = e;
    while (cur>=0){ mid.push(cur); cur = prev[cur]; }
    mid.reverse();
    if (mid[0]!==s) mid = [s,e]; // disconnected fallback: beeline
    NAV.cache[key] = mid;
  }
  const path = [[ax,az]];
  for (const i of mid) path.push([NAV.nodes[i][0], NAV.nodes[i][1]]);
  path.push([bx,bz]);
  return path;
}

const PARTY_THEMES_LITE = ['bar night','band party','Das Klub night','DJ night','date function pregame','porch party','redneck party','toga party','decades party','graffiti party'];

function planWeekend(baseDay){
  const per = calPeriod(baseDay % DAYS_PER_YEAR);
  if (per.party <= 0.01) return;
  for (const h of WORLD.houses){
    if (h.dark || !h.stats) continue;
    for (const offset of [1,2]){
      const day = baseDay + offset;
      const prob = clamp(h.ai.partyHunger * per.party * (offset===2?1.05:0.9) * (h.stats.funding<80?0.3:1), 0, 0.95);
      if (rh() >= prob) continue;
      const dry = isDry(h, day);
      let offCampus = false, venueName = 'the '+h.frat.name+' house';
      let venueLot = h.lotId, porch = h.porch;
      const leased = h.leases.map(id=>WORLD.rentals.find(r=>r.lotId===id)).filter(Boolean);
      if (dry){
        if (!leased.length || rh()<0.15) continue;   // dry and nowhere to go ã a quiet weekend
        const r = leased[rhi(0,leased.length-1)];
        offCampus = true; venueName = r.name; venueLot = r.lotId;
        porch = WORLD.builtDoors[r.lotId] || [r.lot.x, r.lot.z];
      } else if (leased.length && rh() < 0.3){
        const r = leased[rhi(0,leased.length-1)];
        offCampus = true; venueName = r.name; venueLot = r.lotId;
        porch = WORLD.builtDoors[r.lotId] || [r.lot.x, r.lot.z];
      }
      const t0 = day*1440 + 21*60 + rhi(-3,4)*15;
      const peak = Math.round((26 + h.stats.social*0.55 + h.stats.prestige*0.35) * clamp(per.party,0.6,1.5) * rhr(0.75,1.15));
      SIM.parties.push({
        id: 'p'+day+'_'+h.frat.key, houseKey: h.frat.key, lotId: venueLot,
        porch, door: porch, offCampus, venueName,
        theme: PARTY_THEMES_LITE[rhi(0,PARTY_THEMES_LITE.length-1)],
        t0, state:'SCHEDULED', peak, crowd: 0, maxCrowd: 0, kegs: rhi(2,4),
        incidents: [], legendary: false, resolved: false, copsCame: false,
      });
    }
  }
}

function partyTargetCrowd(p, m){ // analytic crowd curve, m = sim-minutes now
  const dt = m - p.t0;
  const wm = (typeof weatherCrowdMult==='function') ? weatherCrowdMult() : 1;
  if (dt < 0) return 0;
  if (wm !== 1){
    if (dt < 90) return p.peak * (dt/90) * 0.85 * wm;
    if (dt < 240) return p.peak * (0.85 + 0.15*Math.sin((dt-90)/150*Math.PI)) * wm;
    if (dt < 360) return p.peak * Math.max(0, 1 - (dt-240)/120) * wm;
    return 0;
  }
  if (dt < 90) return p.peak * (dt/90) * 0.85;
  if (dt < 240) return p.peak * (0.85 + 0.15*Math.sin((dt-90)/150*Math.PI));
  if (dt < 360) return p.peak * Math.max(0, 1 - (dt-240)/120);
  return 0;
}
function partyState(p, m){
  const dt = m - p.t0;
  if (dt < -120) return 'SCHEDULED';
  if (dt < 0)    return 'SETUP';
  if (dt < 90)   return 'DOORS';
  if (dt < 240)  return 'PEAK';
  if (dt < 380)  return 'WINDDOWN';
  const morningEnd = (Math.floor(p.t0/1440)+1)*1440 + 13*60;
  if (m < morningEnd) return 'AFTERMATH';
  return 'DONE';
}

function partyTick(){
  const m = nowMin();
  for (const p of SIM.parties){
    const st = partyState(p, m);
    if (st !== p.state){
      if (st==='AFTERMATH' && !p.resolved){ p.resolved = true; resolveParty(p); }
      p.state = st;
    }
    if (st==='DOORS' || st==='PEAK' || st==='WINDDOWN'){
      const target = partyTargetCrowd(p, m) * (p.copsCame ? 0.55 : 1);
      const delta = target - p.crowd;
      p.crowd += delta * 0.12;
      if (p.crowd > (p.maxCrowd||0)) p.maxCrowd = p.crowd;
      if (st!=='WINDDOWN') partyIncidentTick(p, houseByKey(p.houseKey));
      if (SIM.effRate <= 200){
        if (delta > 4 && ra() < 0.35) spawnPartyGoer(p, true);
        if (delta < -4 && ra() < 0.3) spawnPartyGoer(p, false);
      }
    } else if (st==='AFTERMATH'){
      if (!p.resolved){ p.resolved = true; resolveParty(p); }
      if (p.crowd > 0) p.crowd = 0;
    }
  }
  if (SIM.parties.length > 60){
    const cutoff = m - 3*1440;
    SIM.parties = SIM.parties.filter(p => p.t0 > cutoff && p.state!=='DONE' || partyState(p, m)!=='DONE');
  }
}

// ---- ambient walkers -------------------------------------------------------
function walkerTargetCount(){
  const d = CLOCK.derive();
  const per = SIM.period || calPeriod(d.dayAbs % DAYS_PER_YEAR);
  const ph = dayPhase(d.hour);
  const wk = isWeekend(d.dow);
  let base;
  switch(ph){
    case 'DAWN': base = 12; break;
    case 'CLASS': base = 160; break;
    case 'AFTERNOON': base = 55; break;
    case 'EVENING': base = wk ? 90 : 45; break;
    case 'NIGHT': base = wk ? 150 : 22; break;
    default: base = wk ? 20 : 6;
  }
  if (SIM.weather && SIM.weather.state==='rain') base *= 0.55;
  return Math.round(base * per.campus);
}
function spawnWalker(from, to, opts){
  opts = opts || {};
  if (!from || !to) return;
  const path = navRoute(from[0], from[1], to[0], to[1]);
  const cum = [0];
  for (let i=1;i<path.length;i++) cum.push(cum[i-1] + Math.sqrt(dist2(path[i-1][0],path[i-1][1],path[i][0],path[i][1])));
  const ys = path.map(pt => H(pt[0], pt[1]) + 0.05);
  SIM.walkers.push({
    path, cum, ys, len: cum[cum.length-1],
    depart: nowMin() + (opts.delay||0),
    speed: opts.speed || rar(68, 92),         // meters per sim-minute ã a brisk college walk
    shirt: Math.floor(ra()*8),
    bob: ra()*Math.PI*2,
  });
}
function walkerPos(w, m){
  const d = (m - w.depart) * w.speed;
  if (d <= 0) return null;
  if (d >= w.len) return 'done';
  let i = 1;
  while (i < w.cum.length && w.cum[i] < d) i++;
  if (i >= w.path.length) return 'done';
  const t = (d - w.cum[i-1]) / Math.max(0.01, w.cum[i]-w.cum[i-1]);
  return [ lerp(w.path[i-1][0], w.path[i][0], t), lerp(w.ys[i-1], w.ys[i], t), lerp(w.path[i-1][1], w.path[i][1], t) ];
}
function pickSpawnPair(){
  const p = SIM.pois;
  const d = CLOCK.derive();
  const ph = dayPhase(d.hour), wk = isWeekend(d.dow);
  const dorm = ()=> raPick(p.dorms), acad = ()=> raPick(p.academics), bar = ()=> raPick(p.bars);
  const houseDoor = ()=> { const hs = WORLD.houses; return p.fratDoors[hs[Math.floor(ra()*hs.length)].frat.key]; };
  const livePorches = SIM.parties.filter(x=>x.state==='DOORS'||x.state==='PEAK').map(x=>x.porch);
  const party = ()=> livePorches.length ? raPick(livePorches) : bar();
  let from, to;
  if (ph==='CLASS'){ if (ra()<0.5){ from=dorm(); to=acad(); } else { from=acad(); to=ra()<0.3?raPick(p.commons.length?p.commons:p.academics):acad(); } }
  else if (ph==='AFTERNOON'){ const r=ra(); if (r<0.4){ from=acad(); to=dorm(); } else if (r<0.7){ from=dorm(); to=bar(); } else { from=dorm(); to=houseDoor(); } }
  else if (ph==='EVENING'){ const r=ra(); if (wk && livePorches.length && r<0.35){ from=dorm(); to=party(); } else if (r<0.6){ from=houseDoor(); to=bar(); } else { from=dorm(); to=bar(); } }
  else if (ph==='NIGHT'){ const r=ra(); if (livePorches.length && r<0.55){ from=ra()<0.5?party():bar(); to=party(); } else { from=bar(); to=houseDoor(); } }
  else if (ph==='LATE'){ from=livePorches.length? party() : bar(); to=ra()<0.6?dorm():houseDoor(); }
  else { from=dorm(); to=ra()<0.5?acad():raPick(p.commons.length?p.commons:p.academics); }
  return [from, to];
}
function spawnPartyGoer(p, arriving){
  const pois = SIM.pois;
  const r = ra();
  const other = pois.dorms.concat(pois.bars);
  const src = r<0.7 ? raPick(other) : (SIM.parties.filter(x=>x!==p && (x.state==='PEAK'||x.state==='DOORS')).map(x=>x.porch)[0] || raPick(other));
  if (arriving) spawnWalker(src, p.porch, {});
  else spawnWalker(p.porch, raPick(other), {});
}
function walkerTick(){
  if (SIM.effRate > 200) { if (SIM.walkers.length) SIM.walkers.length = 0; return; }
  const m = nowMin();
  SIM.walkers = SIM.walkers.filter(w => walkerPos(w, m) !== 'done' && (m - w.depart) < 90);
  const target = walkerTargetCount();
  const deficit = target - SIM.walkers.length;
  if (deficit > 0){
    const n = Math.min(5, Math.ceil(deficit*0.08));
    for (let i=0;i<n;i++){
      const [from,to] = pickSpawnPair();
      spawnWalker(from, to, { delay: rar(0,10) });
    }
  }
}

// ---- vehicles --------------------------------------------------------------
function vehicleRouteLoop(pts){
  let path = [];
  for (let i=0;i<pts.length;i++){
    const a = pts[i], b = pts[(i+1)%pts.length];
    const seg = navRoute(a[0],a[1],b[0],b[1]);
    if (i>0) seg.shift();
    path = path.concat(seg);
  }
  const cum=[0];
  for (let i=1;i<path.length;i++) cum.push(cum[i-1]+Math.sqrt(dist2(path[i-1][0],path[i-1][1],path[i][0],path[i][1])));
  const ys = path.map(pt=>H(pt[0],pt[1])+0.15);
  return { path, cum, ys, len: cum[cum.length-1] };
}
const VAN_STOPS = [[-60,-58],[300,-58],[300,258],[-60,258],[-260,258],[-340,-58]];
function vehicleTick(){
  const d = CLOCK.derive();
  const m = nowMin();
  const wk = isWeekend(d.dow);
  let van = SIM.vehicles.find(v=>v.kind==='van');
  const vanActive = SIM.effRate<=200 && ((wk && (d.hour>=21.5 || d.hour<3)) || (d.dow===6 && d.hour<3));
  if (vanActive && !van){
    const route = vehicleRouteLoop(VAN_STOPS);
    SIM.vehicles.push({ kind:'van', route, start:m, speed: 300 });
  } else if (!vanActive && van){
    SIM.vehicles = SIM.vehicles.filter(v=>v!==van);
  }
  let cop = SIM.vehicles.find(v=>v.kind==='cop');
  const copActive = SIM.effRate<=200 && wk && (d.hour>=22 || d.hour<2.5);
  if (copActive && !cop){
    const route = vehicleRouteLoop([[-420,258],[100,258],[100,-58],[520,-58],[100,-58],[-60,258]]);
    SIM.vehicles.push({ kind:'cop', route, start:m, speed: 420 });
  } else if (!copActive && cop){
    SIM.vehicles = SIM.vehicles.filter(v=>v!==cop);
  }
  if (SIM.effRate<=200){
    for (const p of SIM.parties){
      if (p.state==='SETUP' && !p.kegTruckSent){
        p.kegTruckSent = true;
        const from = [-140, 300];
        const path = navRoute(from[0], from[1], p.door[0], p.door[1]);
        const cum=[0];
        for (let i=1;i<path.length;i++) cum.push(cum[i-1]+Math.sqrt(dist2(path[i-1][0],path[i-1][1],path[i][0],path[i][1])));
        const ys = path.map(pt=>H(pt[0],pt[1])+0.15);
        SIM.vehicles.push({ kind:'keg', oneway:{path,cum,ys,len:cum[cum.length-1]}, start:m, speed: 350, dwell: 25 });
      }
    }
  }
  SIM.vehicles = SIM.vehicles.filter(v=>{
    if (!v.oneway) return true;
    const total = v.oneway.len/v.speed*2 + v.dwell;
    return (m - v.start) < total;
  });
}

function simTick(){
  const d = CLOCK.derive();
  SIM.period = calPeriod(d.dayAbs % DAYS_PER_YEAR);

  if (d.dayAbs !== SIM.lastDay && SIM.lastDay >= 0){ dailyTick(d); }

    SIM.lastWeekPlan = d.dayAbs;
    planWeekend(d.dayAbs);
    planMixers(d.dayAbs);

  partyTick();

  SIM.lastPhase = ph;

// documentary throttle: hang around when something is on, sprint when dead
function resolveEffRate(){
  if (CLOCK.speed !== 'documentary') return CFG.SPEEDS[CLOCK.speed] || 4;
  const d = CLOCK.derive();
  const per = SIM.period || calPeriod(d.dayAbs % DAYS_PER_YEAR);
  if (per.key==='BREAK' || per.key==='SUMMER') return 1440;
  const anyLive = SIM.parties.some(p=>p.state==='DOORS'||p.state==='PEAK');
  const ph = dayPhase(d.hour);
  if (anyLive) return 5;
  if (isWeekend(d.dow) && (ph==='EVENING'||ph==='NIGHT')) return 25;
  if (ph==='LATE' || ph==='DAWN') return 240;
  if (ph==='CLASS' || ph==='AFTERNOON' || ph==='EVENING') return 45;
  return 90;
}

function primeWeekend(){ // seed the current week so Friday night lights up on load
  const d = CLOCK.derive();
  const lastThu = d.dayAbs - ((d.dow - 3 + 7) % 7);
  SIM.lastWeekPlan = lastThu;
  planWeekend(lastThu);
  planMixers(lastThu);
}

function vehiclePose(v, m){
  let route = v.route || v.oneway, d;
  if (v.route){
    d = ((m - v.start) * v.speed) % route.len;
  } else {
    const out = (m - v.start) * v.speed;
    if (out < route.len) d = out;
    else if (out < route.len + v.dwell*v.speed) d = route.len - 0.01;
    else d = Math.max(0, route.len*2 + v.dwell*v.speed - out);
  }
  let i=1;
  while (i<route.cum.length && route.cum[i] < d) i++;
  if (i>=route.path.length) i = route.path.length-1;
  const t = (d - route.cum[i-1]) / Math.max(0.01, route.cum[i]-route.cum[i-1]);
  const x = lerp(route.path[i-1][0], route.path[i][0], t);
  const z = lerp(route.path[i-1][1], route.path[i][1], t);
  const y = lerp(route.ys[i-1], route.ys[i], t);
  const heading = Math.atan2(route.path[i][0]-route.path[i-1][0], route.path[i][1]-route.path[i-1][1]);
  return [x,y,z,heading];
}

function dynUpdate(dtReal, tReal){

      const dc = dist2(pos[0], pos[2], CAM.fx, CAM.fz);
      if (dc < 190*190 && nNear < 96){
        const bobY = Math.abs(Math.sin(tReal*7 + w.bob))*0.06;
        DYN.p.set(pos[0], pos[1]+bobY, pos[2]);
        DYN.e.set(0, Math.atan2(w.path[1][0]-w.path[0][0], w.path[1][1]-w.path[0][1]), 0);
        DYN.q.setFromEuler(DYN.e);
        DYN.m4.compose(DYN.p, DYN.q, DYN.s);
        DYN.near.setMatrixAt(nNear, DYN.m4);
        DYN.col.setHex(SHIRTS[w.shirt]);
        DYN.near.setColorAt(nNear, DYN.col);
        nNear++;
      } else if (nFar < 800){
        DYN.p.set(pos[0], pos[1], pos[2]);
        DYN.e.set(0,0,0); DYN.q.setFromEuler(DYN.e);
        DYN.m4.compose(DYN.p, DYN.q, DYN.s);
        DYN.far.setMatrixAt(nFar, DYN.m4);
        nFar++;
      }
    }
  }
  DYN.near.count = nNear; DYN.far.count = nFar;
  DYN.near.instanceMatrix.needsUpdate = true;
  if (DYN.near.instanceColor) DYN.near.instanceColor.needsUpdate = true;
  DYN.far.instanceMatrix.needsUpdate = true;
  // ---- party crowds, kegs, cups, glow, lights, window override
  let nCrowd=0, nKeg=0, nCup=0, gi=0;
  const liveSorted = [];
  const override = DYN.windowOverride; override.clear();
  for (const p of SIM.parties){
    const st = p.state;
    if (st==='SETUP'||st==='DOORS'||st==='PEAK'||st==='WINDDOWN'){
      if (st!=='SETUP') override.add('lot:'+p.lotId);
      // kegs on the porch
      if (!hide){
        for (let k=0;k<p.kegs && nKeg<64;k++){
          const kx = p.porch[0] + (hash01(p.t0+k*7)-0.5)*6;
          const kz = p.porch[1] + (hash01(p.t0+k*13)-0.5)*3;
          DYN.p.set(kx, H(kx,kz)+0.45, kz);
          DYN.e.set(0, hash01(k+p.t0)*6.28, 0); DYN.q.setFromEuler(DYN.e);
          DYN.m4.compose(DYN.p, DYN.q, DYN.s);
          DYN.kegs.setMatrixAt(nKeg++, DYN.m4);
        }
      }
    }
    if ((st==='DOORS'||st==='PEAK'||st==='WINDDOWN') && !hide){
      liveSorted.push(p);
      // milling crowd
      const n = Math.min(90, Math.round(p.crowd));
      const py = H(p.porch[0], p.porch[1]);
      for (let i=0;i<n && nCrowd<240;i++){
        const rr = 2.5 + 11*Math.sqrt(hash01(i*3+p.t0));
        const th = i*2.399963 + hash01(p.t0)*6.28;
        const jx = Math.sin(tReal*0.4 + i*1.7)*0.35;
        const jz = Math.cos(tReal*0.33 + i*2.3)*0.35;
        const cx2 = p.porch[0] + Math.cos(th)*rr + jx;
        const cz2 = p.porch[1] + Math.sin(th)*rr*0.72 + jz;
        DYN.p.set(cx2, py + Math.abs(Math.sin(tReal*2.2+i))*0.05, cz2);
        DYN.e.set(0, hash01(i+p.t0)*6.28 + Math.sin(tReal*0.2+i)*0.4, 0);
        DYN.q.setFromEuler(DYN.e);
        DYN.m4.compose(DYN.p, DYN.q, DYN.s);
        DYN.crowd.setMatrixAt(nCrowd, DYN.m4);
        DYN.col.setHex(SHIRTS[Math.floor(hash01(i*11+p.t0)*8)]);
        DYN.crowd.setColorAt(nCrowd, DYN.col);
        nCrowd++;
      }
      // glow
      if (gi < 8){
        const g = DYN.glows[gi++];
        g.visible = true;
        const pulse = 0.5 + 0.5*Math.sin(tReal*2*Math.PI*1.85 + p.t0);
        const inten = st==='PEAK' ? 1 : st==='DOORS' ? 0.7 : 0.4;
        g.position.set(p.porch[0], py+7.5, p.porch[1]);
        g.scale.set(22+pulse*5*inten, 20+pulse*5*inten, 1);
        g.material.opacity = 0.28*inten + 0.12*pulse*inten;
      }
    }
    if ((st==='WINDDOWN'||st==='AFTERMATH') && !hide){
      // the morning-after cup field
      const n = Math.min(120, Math.round(p.peak*1.1));
      const py = H(p.porch[0], p.porch[1]);
      for (let i=0;i<n && nCup<900;i++){
        const cx2 = p.porch[0] + (hash01(i*7+p.t0)-0.5)*26;
        const cz2 = p.porch[1] + (hash01(i*17+p.t0)-0.5)*16;
        DYN.p.set(cx2, H(cx2,cz2)+0.02, cz2);
        DYN.e.set(0, hash01(i)*6.28, 0); DYN.q.setFromEuler(DYN.e);
        DYN.m4.compose(DYN.p, DYN.q, DYN.s);
        DYN.cups.setMatrixAt(nCup++, DYN.m4);
      }
    }
  }
  DYN.crowd.count = nCrowd; DYN.crowd.instanceMatrix.needsUpdate = true;
  if (DYN.crowd.instanceColor) DYN.crowd.instanceColor.needsUpdate = true;
  DYN.kegs.count = nKeg; DYN.kegs.instanceMatrix.needsUpdate = true;
  DYN.cups.count = nCup; DYN.cups.instanceMatrix.needsUpdate = true;
  for (let i=gi;i<8;i++){ DYN.glows[i].visible=false; }
  // lights: 4 nearest live parties
  liveSorted.sort((a,b)=> dist2(a.porch[0],a.porch[1],CAM.fx,CAM.fz) - dist2(b.porch[0],b.porch[1],CAM.fx,CAM.fz));
  for (let i=0;i<4;i++){
    const li = DYN.lights[i];
    if (i < liveSorted.length && !hide){
      const p = liveSorted[i];
      const pulse = 0.5+0.5*Math.sin(tReal*2*Math.PI*1.85 + p.t0);
      li.visible = true;
      li.position.set(p.porch[0], H(p.porch[0],p.porch[1])+4.2, p.porch[1]);
      li.intensity = (p.state==='PEAK'?1.5:0.9) + pulse*0.3;
    } else li.visible = false;
  }
  // window override changed? force refresh
  const ok = Array.from(override).sort().join('|');
  if (ok !== DYN.lastOverrideKey){ DYN.lastOverrideKey = ok; R.lastLitBucket = -1; }
  // ---- vehicles
  for (const key of ['van','cop','keg','trip']) DYN.vans[key].visible = false;
  if (!hide){
    for (const v of SIM.vehicles){
      const mesh = DYN.vans[v.kind];
      if (!mesh) continue;
      const [x,y,z,heading] = vehiclePose(v, m);
      mesh.visible = true;
      mesh.position.set(x,y,z);
      mesh.rotation.y = heading + Math.PI/2;
    }
  }
  // ---- flood: the river remembers where it used to live
  if (WORLD.meshes.water){
    const d2n = CLOCK.derive();
    const targetY = (SIM.floodUntilDay && d2n.dayAbs <= SIM.floodUntilDay) ? 1.6 : 0;
    WORLD.meshes.water.position.y += (targetY - WORLD.meshes.water.position.y) * Math.min(1, dtReal*0.5);
  }
  // ---- cadets: dawn formation on the parade ground
  const parade = SIM.cadetParadeUntil && nowMin() < SIM.cadetParadeUntil;
  const cadetsOn = !hide && (parade || (d.hour>=6.4 && d.hour<7.4 && (SIM.period && SIM.period.campus>0.5)));
  if (cadetsOn){
    let px, pz, heading;
    if (parade){
      const tp = 1 - (SIM.cadetParadeUntil - nowMin())/90;
      px = lerp(520, -340, clamp(tp,0,1)); pz = -60;
      heading = Math.atan2(-1, 0);
    } else {
    const t = (d.hour-6.4)/1.0;
    const cx = 620, cz = -66, rx = 66, rz = 44;
    const ang = t*Math.PI*2*1.2;
    const hx = Math.cos(ang), hz = Math.sin(ang)*0.8;
    px = cx + hx*rx*0.5; pz = cz + hz*rz*0.5;
    heading = Math.atan2(-Math.sin(ang), Math.cos(ang)*0.5);
    }
    let n=0;
    for (let r=0;r<6;r++) for (let c=0;c<8;c++){
      const ox = (c-3.5)*1.4, oz = (r-2.5)*1.7;
      const s2=Math.sin(heading), c2=Math.cos(heading);
      const wx = px + ox*c2 + oz*s2, wz = pz - ox*s2 + oz*c2;
      const step = Math.abs(Math.sin(tReal*8 + c*0.5))*0.08;
      DYN.p.set(wx, H(wx,wz)+step, wz);
      DYN.e.set(0, heading, 0); DYN.q.setFromEuler(DYN.e);
      DYN.m4.compose(DYN.p, DYN.q, DYN.s);
      DYN.cadets.setMatrixAt(n++, DYN.m4);
    }
    DYN.cadets.count = n;
    DYN.cadets.instanceMatrix.needsUpdate = true;
  } else DYN.cadets.count = 0;
}

function initHouseLedgers(){
  for (const h of WORLD.houses){
    const a = ARCH_INIT[h.frat.key];
    h.stats = { prestige:a[0], brotherhood:a[1], gpa:a[2], funding:a[3], social:a[4], scrutiny: 12 };
    h.ai = { riskTol:a[5], partyHunger:a[6] };
    h.strikes = [];        // {day, reason, expiresDay}
    h.dryUntilDay = 0;
    h.dark = false; h.darkSinceDay = 0; h.everDark = false;
    h.roster = [];
    h.memory = { partiesThisTerm: 0, legendary: 0, lastResultDay: 0 };
    h.leases = [];
    // founding roster: ~7 per class year
    for (let cy=1; cy<=4; cy++){
      const n = rwi(6,9);
      for (let i=0;i<n;i++) h.roster.push(newPerson('BROTHER', h.frat.key, cy).pid);
    }
    assignNotables(h);
  }
  for (const s of WORLD.sororities){
    s.roster = [];
    for (let cy=1; cy<=4; cy++){
      const n = rwi(7,10);
      for (let i=0;i<n;i++) s.roster.push(newPerson('SOROR', s.sor.key, cy).pid);
    }
  }
  WORLD.rel = { ss: new Float32Array(5*8) };
  for (let i=0;i<WORLD.rel.ss.length;i++) WORLD.rel.ss[i] = rwr(5, 30);
  // starting leases: the party-forward houses hold the party real estate
  const wanting = WORLD.houses.slice().sort((a,b)=> ARCH_INIT[b.frat.key][6]-ARCH_INIT[a.frat.key][6]);
  const pool = WORLD.rentals.slice();
  for (let i=0;i<3 && pool.length;i++){
    const h = wanting[i];
    const idx = Math.floor(rw()*pool.length);

    h.leases.push(r.lotId);
  }
}
function assignNotables(h){
  const bros = h.roster.map(pid=>PEOPLE[pid]).filter(p=>p.alive && p.standing==='GOOD');
  const seniors = bros.filter(p=>p.classYear>=4);
  const pick = (arr, key)=> arr.length ? arr.reduce((a,b)=> (b[key]>a[key]?b:a)) : null;
  h.notables = {
    pres: pick(seniors.length?seniors:bros, 'social'),
    social: pick(bros.filter(p=>p!==h.notables?.pres), 'charm') || pick(bros,'charm'),
    liability: bros.find(p=>p.traits.includes('liability')) || pick(bros,'wealth'),
  };
}

function prestigeRank(h){
  const sorted = WORLD.houses.filter(x=>!x.dark).slice().sort((a,b)=>b.stats.prestige-a.stats.prestige);

}
function activeStrikes(h, dayAbs){ return h.strikes.filter(s=>s.expiresDay > dayAbs).length; }
function isDry(h, dayAbs){ return h.dryUntilDay > dayAbs; }

function partyIncidentTick(p, h){

  if (doy === 197){ greekWeekResult(); }

SIM.hash = function(){
  let h = 2166136261 >>> 0;

function dirShotFor(e){

      return { dist: 480, push: 260, hold: 17, pitch: -0.2 };

  DIR.pushTarget = 0;
  DIR.orbit = (Math.random()<0.5?-1:1) * (0.012 + Math.random()*0.015);
  CAM.tfx = spot[0]; CAM.tfz = spot[1];
  CAM.tdist = 260 + Math.random()*280;
  CAM.tpitchOff = -0.25 - Math.random()*0.2;
  beatCardIdle();
}
function dirUpdate(rt, dt){
  if (!DIR.on || rt < DIR.suspendUntil) return;
  // hunt for the best unseen beat
  let best = null;
  for (const e of EV.queue){
    if (e._seen || e.pri < 2) continue;
    if (CLOCK.t - e.t > 8) { e._seen = true; continue; }      // stale (>2 sim-hours)
    if (DIR.cooldowns[e.type] && rt < DIR.cooldowns[e.type]) { e._seen = true; continue; }
    if (!best || e.pri > best.pri) best = e;
  }
  if (best && (best.pri > DIR.currentPri + 0.5 || rt > DIR.holdUntil)){
    best._seen = true;
    dirTakeShot(best, rt);
    return;
  }
  if (rt > DIR.holdUntil) { dirIdle(rt); return; }
  // in-shot motion: slow orbit + push-in
  CAM.tyaw += DIR.orbit * dt;
  if (DIR.pushTarget > 0 && CAM.tdist > DIR.pushTarget){
    CAM.tdist = Math.max(DIR.pushTarget, CAM.tdist * (1 - 0.25*dt));
  }
}
function dirSuspend(){ DIR.suspendUntil = performance.now()/1000 + 45; }

function drawFace(ctx, cx, cy, rx, ry, p){
  const g = (n)=> hash01(p.pid*17.13 + n*7.7);
  const skins = ['#e8c49a','#dfb98f','#d9a97c','#c98f62','#8a5a3a','#f0d0aa'];
  const hairs = ['#2a2018','#4a3520','#6a4a28','#8a6a3a','#b89b62','#1a1a1a','#5a3a2a'];
  const skin = skins[Math.floor(g(1)*skins.length)];
  const hair = hairs[Math.floor(g(2)*hairs.length)];
  // oval vignette
  ctx.save();
  ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2); ctx.clip();
  ctx.fillStyle = '#d8d2c2'; ctx.fillRect(cx-rx, cy-ry, rx*2, ry*2);
  // shoulders + blazer
  ctx.fillStyle = g(3)<0.75 ? '#22293a' : '#4a3a30';
  ctx.beginPath(); ctx.ellipse(cx, cy+ry*0.95, rx*0.85, ry*0.5, 0, Math.PI, 0); ctx.fill();
  // shirt + tie
  ctx.fillStyle = '#f0ece0'; ctx.fillRect(cx-rx*0.13, cy+ry*0.44, rx*0.26, ry*0.5);
  ctx.fillStyle = ['#7a2c22','#27406b','#1f5c38','#c9a227'][Math.floor(g(4)*4)];
  ctx.fillRect(cx-rx*0.05, cy+ry*0.46, rx*0.1, ry*0.44);
  // head
  const hw = rx*0.52, hh = ry*0.46, hy = cy-ry*0.18;
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.ellipse(cx, hy, hw, hh, 0, 0, Math.PI*2); ctx.fill();
  // hair styles: 0 side part, 1 buzz, 2 mop, 3 swoop, 4 curly
  const style = Math.floor(g(5)*5);
  ctx.fillStyle = hair;
  if (style===0){ ctx.beginPath(); ctx.ellipse(cx, hy-hh*0.62, hw*1.0, hh*0.42, 0, Math.PI, 0); ctx.fill();
    ctx.fillRect(cx-hw, hy-hh*0.72, hw*0.7, hh*0.34); }
  else if (style===1){ ctx.beginPath(); ctx.ellipse(cx, hy-hh*0.55, hw*0.95, hh*0.36, 0, Math.PI, 0); ctx.fill(); }
  else if (style===2){ ctx.beginPath(); ctx.ellipse(cx, hy-hh*0.5, hw*1.06, hh*0.6, 0, Math.PI, 0); ctx.fill();
    ctx.fillRect(cx-hw*1.02, hy-hh*0.5, hw*0.24, hh*0.6); ctx.fillRect(cx+hw*0.78, hy-hh*0.5, hw*0.24, hh*0.6); }
  else if (style===3){ ctx.beginPath(); ctx.ellipse(cx-hw*0.1, hy-hh*0.6, hw*1.02, hh*0.46, -0.15, Math.PI*0.95, -0.05); ctx.fill(); }
  else { for (let i=0;i<7;i++){ ctx.beginPath(); ctx.arc(cx-hw*0.8+i*hw*0.27, hy-hh*0.72, hw*0.2, 0, Math.PI*2); ctx.fill(); } }
  // eyes, brows, mouth
  ctx.fillStyle = '#2a2320';
  ctx.beginPath(); ctx.arc(cx-hw*0.36, hy-hh*0.05, rx*0.035, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+hw*0.36, hy-hh*0.05, rx*0.035, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = hair; ctx.lineWidth = rx*0.045;
  ctx.beginPath(); ctx.moveTo(cx-hw*0.52, hy-hh*0.28); ctx.lineTo(cx-hw*0.18, hy-hh*0.32); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+hw*0.18, hy-hh*0.32); ctx.lineTo(cx+hw*0.52, hy-hh*0.28); ctx.stroke();
  ctx.strokeStyle = '#8a5a42'; ctx.lineWidth = rx*0.04;
  const smile = g(6);
  ctx.beginPath();
  if (smile<0.6){ ctx.arc(cx, hy+hh*0.4, hw*0.34, 0.25, Math.PI-0.25); }         // grin
  else if (smile<0.85){ ctx.moveTo(cx-hw*0.25, hy+hh*0.48); ctx.lineTo(cx+hw*0.25, hy+hh*0.48); } // stoic
  else { ctx.moveTo(cx-hw*0.22, hy+hh*0.5); ctx.quadraticCurveTo(cx+hw*0.1, hy+hh*0.58, cx+hw*0.28, hy+hh*0.44); }  // smirk
  ctx.stroke();
  ctx.restore();
  // frame
  ctx.strokeStyle = '#8a7a5a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2); ctx.stroke();
}

function planMixers(baseDay){
  const per = calPeriod(baseDay % DAYS_PER_YEAR);
  if (per.party <= 0.01) return;
  for (let si=0; si<WORLD.sororities.length; si++){
    if (rh() > (per.key==='MIXER' ? 0.6 : 0.3)) continue;
    const s = WORLD.sororities[si];
    // pick the suitor: rel-weighted with a taste for prestige
    let best = -1, bestW = -1;
    WORLD.houses.forEach((h, hi)=>{
      if (h.dark || isDry(h, baseDay+1)) return;
      const w = relSS(si, hi)*0.6 + h.stats.prestige*0.4 + rh()*30;
      if (w > bestW){ bestW = w; best = hi; }
    });
    if (best < 0) continue;
    const h = WORLD.houses[best];
    const day = baseDay + (rh()<0.5?1:2);
    const t0 = day*1440 + 20*60 + rhi(0,4)*15;
    const themes = ['a decades party','a luau','a graffiti party','an 80s prom','a toga party'];
