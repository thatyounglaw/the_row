const OTHERSTAGE={ last:-1, staged:[] };
function stageOthers(){
  const d=CLOCK.derive();
  const block=heroBlock()+d.dayAbs*6;
  if (block===OTHERSTAGE.last) return;
  OTHERSTAGE.last=block;
  OTHERSTAGE.staged=[];
  const raining=ACTS.rainDay===d.dayAbs, perfect=ACTS.perfectDay===d.dayAbs;
  for (const h of WORLD.houses){
    if (h.frat.hero) continue;
    const hr=d.hour;
    const active=!raining && (hr>=12 && hr<24) && hash01(d.dayAbs, block, h.x)<(perfect?0.95:0.62);
    if (!active) continue;
    const pranked=ACTS.prank && ACTS.prank.hx===h.x && ACTS.prank.until>d.dayAbs;
    const bank=pranked ? PRANK_PORCH : (PORCH_SETS[h.frat.key]||GENERIC_PORCH);
    const g=bank[Math.floor(hash01(d.dayAbs, block, h.x, 2)*bank.length)];
    const roster=h.roster.map(pid=>PEOPLE[pid]);
    const cast=[];
    for (let i=0;i<g.poses.length;i++){
      const p=roster[Math.floor(hash01(d.dayAbs, block, h.x, 3+i)*roster.length)];
      cast.push(p.pid);
    }
    OTHERSTAGE.staged.push({h, g, cast, t0:performance.now()/1000, fired:{}});
  }
}
function drawOthers(ctx, rt){
  const band=BAND.ROW;
  for (const st of OTHERSTAGE.staged){
    for (let i=0;i<st.cast.length;i++){
      const p=PEOPLE[st.cast[i]];
      const ax=st.h.x+st.g.dx[i];
      const sx=projX(band, ax);
      if (sx<-60||sx>view.w+60) continue;
      const sy=groundY(band)+(-26)*CAM.z;
      ctx.save();
      ctx.translate(sx,sy);
      ctx.scale(CAM.z*(st.g.dx[i]<0?1:-1), CAM.z);
      const f=(rt*0.5+i*0.4+hash01(p.pid))%1;
      (POSES[st.g.poses[i]]||POSES.stand)(ctx,p,f);
      ctx.restore();
      HIT.push({pid:p.pid, sx, sy:sy-46*CAM.z});
    }
    // occasional line
    const loopLen=44;
    const el=(rt-st.t0)%loopLen;
    const kk=Math.floor((rt-st.t0)/loopLen);
    if (el>=8 && !st.fired[kk] && CAM.z>0.5){
      st.fired[kk]=1;
      if (hash01(st.h.x, kk)<0.5){
        const txt=st.g.lines[Math.floor(hash01(st.h.x, kk, 2)*st.g.lines.length)];
        sayAt('ROW', st.h.x+st.g.dx[0], -26-58, txt, {dur:3.8, think:txt.startsWith('(')});
      }
    }
  }
}

// ==== §16 WEEKEND PARTIES (sim-lite, deterministic) =========================
function partiesTonight(){
  const d=CLOCK.derive();
  // a party "tonight" belongs to the evening's dayAbs (late hours borrow yesterday)
  const nightDay = d.hour<6 ? d.dayAbs-1 : d.dayAbs;
  if (isFDDay(nightDay))   // Fancy Dress: every house, all out
    return WORLD.houses.filter(h=>!(h.frat.hero&&ACTS.strikeUntil>nightDay))
      .map(h=>({h, hero:h.frat.hero, big:true, fd:true}));
  const dow=nightDay%7;
  if (dow!==4 && dow!==5) return [];
  const out=[];
  for (const h of WORLD.houses){
    const isHero=h.frat.hero;
    if (isHero && ACTS.strikeUntil>nightDay) continue;   // dry week
    let p= isHero ? (dow===5?0.85:0.35) : 0.38;
    if (isHero && ACTS.alumniUntil>nightDay) p=1;
    if (hash01(nightDay, h.x, 77)<p)
      out.push({h, hero:isHero, big:isHero&&(dow===5||ACTS.alumniUntil>nightDay)});
  }
  return out;
}
const PARTY_LINES=['REVOLUTION!','One more song!','SAME TEAM!','HEADS!','Rack ’em!','To the boys!'];
const RAGER_LINES=['ALIVE! (everyone, at once)','The solo! THE SOLO!','Evenflow does not take requests. Evenflow provides.','(four hundred high fives, simultaneously)'];
function partyHour(){
  const hr=CLOCK.derive().hour;
  return (hr>=20.5||hr<2.5);
}
let _partyBubbleT=0;
function drawParties(ctx, rt){
  if (!partyHour()) return;
  const tonight=partiesTonight();
  if (!tonight.length) return;
  const band=BAND.ROW;
  const raining=ACTS.rainDay===CLOCK.derive().dayAbs;
  for (const pt of tonight){
    const hx=pt.h.x;
    const sx=projX(band,hx);
    if (sx<-400||sx>view.w+400) continue;
    let n=(pt.big?14:8)+(ACTS.perfectDay===CLOCK.derive().dayAbs?5:0);
    if (PERF.rung>=2) n=Math.min(n,7);
    // when the hero house is open, its porch guests spill around the house
    // on the lawn instead of haunting the first-floor rooms
    const spillT=pt.hero ? smoothstep(0.3,0.8,HERO.openT) : 0;
    for (let i=0;i<n;i++){
      const off=(hash01(hx,i,1)-0.5)*(pt.big?300:220);
      let ax=hx+off;
      const isPorch=Math.abs(off)<130;
      if (raining && !isPorch) continue;   // rain herds everyone under the roof
      let fy=isPorch?-26:0;
      if (isPorch && spillT>0){
        ax=hx+lerp(off, Math.sign(off||1)*(172+Math.abs(off)*0.45), spillT);
        fy=lerp(fy, 0, spillT);
      }
      const psx=projX(band,ax);
      if (psx<-60||psx>view.w+60) continue;
      const psy=groundY(band)+fy*CAM.z;
      // synthetic guests (not roster — the whole campus shows up)
      const female=hash01(hx,i,2)<0.4;
      const guest={ pid:-1, female, polo: pt.fd ? (female?FD_DRESSES[i%FD_DRESSES.length]:'#26262e')
          : PAL.polos[Math.floor(hash01(hx,i,3)*8)],
        skin:SKINS[Math.floor(hash01(hx,i,4)*6)], hair:HAIRS[Math.floor(hash01(hx,i,5)*7)],
        hat:!pt.fd && hash01(hx,i,6)<0.2, kind:'GUEST' };
      const poseName= pt.big && isPorch ? 'highfive' : ['drink','talk','dance','stand'][Math.floor(hash01(hx,i,7)*4)];
      ctx.save();
      ctx.translate(psx,psy);
      ctx.scale(CAM.z*(hash01(hx,i,8)<0.5?-1:1), CAM.z);
      (POSES[poseName]||POSES.stand)(ctx, guest, (rt*0.5+i*0.29)%1);
      ctx.restore();
    }
    // music notes drifting from the house
    ctx.fillStyle='rgba(58,47,38,0.7)';
    ctx.font='italic '+Math.round(15*CAM.z+6)+'px Georgia';
    for (let i=0;i<3;i++){
      const t=((rt*0.3)+i*0.33+hash01(hx,i)) % 1;
      const nx=sx+Math.sin((t*5+i)*2)*30*CAM.z + 60*CAM.z;
      const ny=groundY(band)+(-170-t*90)*CAM.z;
      ctx.globalAlpha=0.75*(1-t);
      ctx.fillText(i%2?'♪':'♫', nx, ny);
    }
    ctx.globalAlpha=1;
    // party lines
    if (rt-_partyBubbleT>11 && CAM.z>0.45 && Math.abs(sx-view.w/2)<view.w*0.5){
      _partyBubbleT=rt;
      const bank=pt.big?RAGER_LINES:PARTY_LINES;
      sayAt('ROW', hx+(hash01(Math.floor(rt),hx)-0.5)*160, pt.big?-96:-26-58,
        bank[Math.floor(hash01(Math.floor(rt),hx,2)*bank.length)], {dur:3.6});
    }
  }
}

function houseParty(x){
  if (!partyHour()) return null;
  for (const pt of partiesTonight()) if (Math.abs(pt.h.x-x)<170) return pt;
  return null;
}

// ==== §18b TIME DIAL & SPEED ================================================
const DIAL={ el:null, cv:null, drag:false };
function dialInit(){
  const wrap=document.createElement('div');
  wrap.id='dialwrap'; wrap.className='hud';
  wrap.innerHTML='<canvas id="dial" width="natural" height="natural"></canvas><div id="speedchips">'+
    '<button data-s="0">⏸</button><button data-s="1" class="on">1×</button>'+
    '<button data-s="4">4×</button><button data-s="60">60×</button></div>';
  document.body.appendChild(wrap);
  DIAL.cv=document.getElementById('dial');
  DIAL.cv.width=natural(); DIAL.cv.height=natural();
  function natural(){ return 96*Math.min(window.devicePixelRatio||1,2); }
  wrap.style.pointerEvents='auto';
  wrap.querySelectorAll('#speedchips button').forEach(b=>{
    b.onclick=()=>{
      CLOCK.speed=parseFloat(b.dataset.s);
      wrap.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
    };
  });
  const pick=(e)=>{
    const r=DIAL.cv.getBoundingClientRect();
    const dx=e.clientX-(r.left+r.width/2), dy=e.clientY-(r.top+r.height/2);
    let ang=Math.atan2(dy,dx)+Math.PI/2;
    if (ang<0) ang+=Math.PI*2;
    const hr=ang/(Math.PI*2)*24;
    const d=CLOCK.derive();
    CLOCK.t=d.dayAbs*TICKS_PER_DAY+Math.round(hr*4);
    CLOCK.frac=0;
    HERO.lastBlock=-1; OTHERSTAGE.last=-1;
  };
  DIAL.cv.addEventListener('pointerdown',e=>{ DIAL.drag=true; pick(e); DIAL.cv.setPointerCapture(e.pointerId); });
  DIAL.cv.addEventListener('pointermove',e=>{ if (DIAL.drag) pick(e); });
  DIAL.cv.addEventListener('pointerup',()=>DIAL.drag=false);
}
function dialDraw(){
  const cv=DIAL.cv; if (!cv) return;
  const g=cv.getContext('2d');
  const S=cv.width, c=S/2, R=S*0.42;
  g.setTransform(1,0,0,1,0,0);
  g.clearRect(0,0,S,S);
  g.beginPath(); g.arc(c,c,R,0,7);
  g.fillStyle='rgba(250,243,226,0.92)'; g.fill();
  g.lineWidth=S*0.02; g.strokeStyle='#3a2f26'; g.stroke();
  // day/night arc shading
  g.beginPath(); g.arc(c,c,R*0.98, Math.PI*0.75, Math.PI*2.25);
  g.strokeStyle='rgba(70,80,122,0.25)'; g.lineWidth=S*0.06; g.stroke();
  // ticks
  g.strokeStyle='#6b5a49'; g.lineWidth=1;
  for (let i=0;i<24;i++){
    const a=i/24*Math.PI*2-Math.PI/2;
    const l=i%6===0?0.86:0.93;
    g.beginPath();
    g.moveTo(c+Math.cos(a)*R*l, c+Math.sin(a)*R*l);
    g.lineTo(c+Math.cos(a)*R*0.97, c+Math.sin(a)*R*0.97);
    g.stroke();
  }
  // needle
  const hr=CLOCK.hourFloat()%24;
  const a=hr/24*Math.PI*2-Math.PI/2;
  g.strokeStyle='#8a2a1a'; g.lineWidth=S*0.025; g.lineCap='round';
  g.beginPath(); g.moveTo(c-Math.cos(a)*R*0.1, c-Math.sin(a)*R*0.1);
  g.lineTo(c+Math.cos(a)*R*0.78, c+Math.sin(a)*R*0.78); g.stroke();
  g.fillStyle='#3a2f26';
  g.beginPath(); g.arc(c,c,S*0.03,0,7); g.fill();
}

function isMCDay(dayAbs){ const y=Math.floor(dayAbs/360);      // Mock Con parade, every 4th year
  return (seedBaseYear()+y)%4===0 && dayAbs%360===158; }

const ACTS={ rainDay:-1, perfectDay:-1, strikeUntil:-1, alumniUntil:-1,
  prank:null, cupidA:-1, cupidB:-1, cupidUntil:-1, cadets:null,
  note:null, noteUntil:0, noteTarget:null };
function actNote(txt, target){

      OTHERSTAGE.last=-1; }],
    ['play Cupid', ()=>{
      const d=CLOCK.derive();
      const bros=WORLD.hero.roster.map(p=>PEOPLE[p]).filter(p=>!p.tag);
      const a=bros[Math.floor(hash01(d.dayAbs,61)*bros.length)]||PEOPLE[WORLD.hero.roster[0]];
      const so=WORLD.sors[0];
      const b=PEOPLE[so.roster[Math.floor(hash01(d.dayAbs,62)*so.roster.length)]];
      ACTS.cupidA=a.pid; ACTS.cupidB=b.pid; ACTS.cupidUntil=d.dayAbs+7;
      actNote(a.name+' and '+b.first+' keep ending up on the same porch.', {band:'ROW', x:WORLD.hero.x});
      HERO.lastBlock=-1; }],
    ['start a prank war', ()=>{
      const d=CLOCK.derive();
      const targets=WORLD.houses.filter(h=>!h.frat.hero);
      const t=targets[Math.floor(hash01(d.dayAbs,63)*targets.length)];
      ACTS.prank={hx:t.x, until:d.dayAbs+4};
      actNote('forty flamingos bloom on the '+t.frat.nick+'’ lawn overnight.', {band:'ROW', x:t.x});
      OTHERSTAGE.last=-1; }],
    ['alumni money lands', ()=>{
      const d=CLOCK.derive(); ACTS.alumniUntil=d.dayAbs+3;
      actNote('a ’74 check clears. the good keg. a banner. gratitude.', {band:'ROW', x:WORLD.hero.x}); }],
    ['march the cadets', ()=>{
      ACTS.cadets={t0:performance.now()/1000, x0:unprojX(BAND.TOWN,-120)};
      actNote('the Institute is marching down Main. nobody knows why.'); }],

// ---- margin-note nudge -------------------------------------------------------
const NUDGE={el:null, target:null, txt:''};
function nudgeInit(){
  const el=document.createElement('div');
  el.id='nudge'; document.body.appendChild(el);
  NUDGE.el=el;
  el.onclick=()=>{
    if (!NUDGE.target) return;
    const b=BAND[NUDGE.target.band]||BAND.ROW;
    if (NUDGE.target.band!=='ROW' && CAM.tz>1.2) CAM.tz=0.85;   // foreground targets need the wide stage
    if (CAM.tz<0.7) CAM.tz=0.85;
    CAM.tx=clamp(NUDGE.target.x/b.pf, camMinX(CAM.tz), camMaxX(CAM.tz));
  };
}
function nudgeText(){
  const rtNow=performance.now()/1000;
  if (ACTS.note && rtNow<ACTS.noteUntil) return [ACTS.note, ACTS.noteTarget];
  const d=CLOCK.derive();
  const hr=d.hour;
  if (isMCDay(d.dayAbs) && hr>=9.5 && hr<15.5)
    return ['MOCK CONVENTION: parade on Main. elephants. real ones.', {band:'TOWN', x:1150}];
  if (isFDDay(d.dayAbs))
    return ['FANCY DRESS tonight — “'+fdTheme(d.dayAbs)+'”', {band:'ROW', x:WORLD.hero.x}];
  if (ACTS.strikeUntil>d.dayAbs)
    return ['dry week at ΓΔ. day '+(5-(ACTS.strikeUntil-d.dayAbs)+1)+' of reflection.', {band:'ROW', x:WORLD.hero.x}];
  if (hr>=16){
    const pts=partiesTonight();
    if (pts.length){
      const hero=pts.find(p=>p.big&&p.hero);
      if (hero) return ['tonight: Evenflow at ΓΔ. the Alive solo belongs to everyone.', {band:'ROW', x:WORLD.hero.x}];
      return ['tonight: party at '+pts.map(p=>p.h.frat.letters).join(', '), {band:'ROW', x:pts[0].h.x}];
    }
  }
  if (d.dow===3 && hr>=17) return ['Thursday: poker in the TV room. bring your books money.', {band:'ROW', x:WORLD.hero.x}];
  if (d.dow===0 && hr>=15 && hr<20.6) return ['chapter at 7. the DJ motion returns. it will die.', {band:'ROW', x:WORLD.hero.x}];
  if (d.dow===6 && hr>=8 && hr<12) return ['Sunday morning: the porch detectives convene.', {band:'ROW', x:WORLD.hero.x}];
  return [null,null];
}
function updateNudge(){
  if (!NUDGE.el) return;
  const [txt,target]=nudgeText();
  NUDGE.target=target;
  if (txt!==NUDGE.txt){
    NUDGE.txt=txt;
    if (!txt){ NUDGE.el.style.display='none'; }
    else { NUDGE.el.style.display='block'; NUDGE.el.textContent=txt; }
  }
}

// ---- sororities & town folk ---------------------------------------------------
const SOR_LINES=[
  'The new house still smells like new house.',
  'Do NOT wear good shoes to Red Square.',
  'The mixer list: him, him, hmm, absolutely not him.',
  'Chapter in ten. Bring your smile.',
  'He said “hey” with two extra y’s. It means something.',
  '(waving at literally everyone — the Speaking Tradition)',
];
const SORSTAGE={last:-1, staged:[]};
function buildSors(){
  WORLD.sors=[];
  const sorTags=['newHouseProud','mixKeeper','chairEverything'];
  for (const so of V2SORS){
    const roster=[];
    for (let i=0;i<6;i++){
      const p=newPerson('SOROR', so.letters, 1+(i%4), RNG.name);
      p.sorLetters=so.letters;
      if (i<3) p.tag=sorTags[i];
      roster.push(p.pid);
    }
    WORLD.sors.push({letters:so.letters, x:so.x, roster});
  }
  // town walkers
  WORLD.twalk=[];
  for (let i=0;i<5;i++){
    const w=makeWalker(40+i);
    w.band='TOWN'; w.gy=8; w.x=700+hash01(i,44)*3300; w.lastSay=-99;
    WORLD.twalk.push(w);
  }
}
const SHOP_TALK={
  bar:     {when:[20.5,25.5], lines:['Pitchers are on Chairman tonight.','The tin ceiling has heard worse.']},
  pizza:   {when:[22,26],     lines:['One slice. Okay, two. Okay.','Dom knows the order by the knock.']},
  icecream:{when:[13,17.5],   lines:['One scoop is a lie we tell ourselves.']},
  cinema:  {when:[19,21.5],   lines:['It’s the one with the asteroid. Again. We’re going.']},
  store:   {when:[10,13],     lines:['List says: everything, and ice.']},
  abc:     {when:[16,19],     lines:['He has the Post-it. He IS the Post-it.']},
  laundry: {when:[10,16],     lines:['Reading liner notes while the darks spin.']},
};
function stageSors(){
  const d=CLOCK.derive();
  const block=heroBlock()+d.dayAbs*6;
  if (block===SORSTAGE.last) return;
  SORSTAGE.last=block;
  SORSTAGE.staged=[];
  const raining=ACTS.rainDay===d.dayAbs;
  for (const so of WORLD.sors){
    if (raining) continue;
    if (!(d.hour>=14 && d.hour<23)) continue;
    if (hash01(d.dayAbs, block, so.x)>0.6) continue;
    const a=so.roster[Math.floor(hash01(d.dayAbs,block,so.x,1)*so.roster.length)];
    let b=so.roster[Math.floor(hash01(d.dayAbs,block,so.x,2)*so.roster.length)];
    if (b===a) b=so.roster[(so.roster.indexOf(a)+1)%so.roster.length];
    SORSTAGE.staged.push({so, cast:[a,b], t0:performance.now()/1000, fired:{}});
  }
}
function drawTownLife(ctx, rt){
  const band=BAND.TOWN, gy=groundY(band);
  const d=CLOCK.derive();
  stageSors();
  // sorority porch pairs
  for (const st of SORSTAGE.staged){
    const xs=[st.so.x-26, st.so.x-4];
    for (let i=0;i<2;i++){
      const p=PEOPLE[st.cast[i]];
      const sx=projX(band, xs[i]);
      if (sx<-60||sx>view.w+60) continue;
      const sy=gy+(-18)*CAM.z;
      ctx.save();
      ctx.translate(sx,sy); ctx.scale(CAM.z*(i?-1:1),CAM.z);
      POSES.talk(ctx, p, (rt*0.5+i*0.4)%1);
      ctx.restore();
      HIT.push({pid:p.pid, sx, sy:sy-46*CAM.z+CAM.fade*view.h*0.6});
    }
    const loopLen=40, el=(rt-st.t0)%loopLen, kk=Math.floor((rt-st.t0)/loopLen);
    if (el>=9 && !st.fired[kk] && CAM.z>0.5){
      st.fired[kk]=1;
      if (hash01(st.so.x,kk)<0.6){
        const txt=SOR_LINES[Math.floor(hash01(st.so.x,kk,2)*SOR_LINES.length)];
        sayAt('TOWN', st.so.x-16, -18-58, txt, {dur:3.8, think:txt.startsWith('(')});
      }
    }
  }
  // town walkers
  for (const w of WORLD.twalk){
    const sx=projX(band, w.x);
    if (sx>=-60 && sx<=view.w+60){
      ctx.save();
      ctx.translate(sx, gy+w.gy*CAM.z);
      ctx.scale(CAM.z, CAM.z);
      drawFigure(ctx, w, rt);
      ctx.restore();
    }
    // shop chatter
    if (rt-w.lastSay>38 && CAM.z>0.55){
      const hrW=d.hour<6?d.hour+24:d.hour;
      for (const sh of TOWN_SHOPS){
        const t=SHOP_TALK[sh.kind];
        if (!t || Math.abs(w.x-sh.x)>42) continue;
        if (hrW<t.when[0]||hrW>=t.when[1]) continue;
        if (hash01(Math.floor(rt), w.id)<0.5) break;
        w.lastSay=rt;
        sayAt('TOWN', w.x, -62, t.lines[Math.floor(hash01(Math.floor(rt),w.id,2)*t.lines.length)], {dur:3.6});
        break;
      }
    }
  }
  // Mock Convention parade — every 4th winter, elephants on Main
  if (isMCDay(d.dayAbs) && d.hour>=9.5 && d.hour<15.5){
    const head=900+((rt*16)%3400);
    drawParade(ctx, band, gy, head, rt);
  }
  // the cadets march down Main (an act)
  if (ACTS.cadets){
    const t=rt-ACTS.cadets.t0;
    for (let i=0;i<8;i++){
      const wx=ACTS.cadets.x0 + t*82 - i*30;
      const sx=projX(band, wx);
      if (sx<-60||sx>view.w+60) continue;
      ctx.save();
      ctx.translate(sx, gy+30*CAM.z);
      ctx.scale(CAM.z, CAM.z);
      const ph=Math.sin(t*6.8);   // in step. all of them. that's the point.
      ctx.strokeStyle='#5a5f6a'; ctx.lineWidth=4.6; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(5*ph,0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(-5*ph,0); ctx.stroke();
      ctx.fillStyle=PAL.cadet;
      ctx.beginPath(); ctx.moveTo(-6,-16); ctx.lineTo(6,-16); ctx.lineTo(7,-36); ctx.lineTo(-7,-36); ctx.closePath(); ctx.fill();
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.8; ctx.stroke();
      ctx.strokeStyle='#e8e2d2'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(-5,-33); ctx.lineTo(5,-30); ctx.stroke();   // the cross-belt
      ctx.fillStyle=SKINS[(i*2)%6];
      ctx.beginPath(); ctx.arc(0,-43,8.6,0,7); ctx.fill();
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.8; ctx.stroke();
      ctx.fillStyle='#e8e2d2';
      ctx.fillRect(-8,-54,16,6);
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.3; ctx.strokeRect(-8,-54,16,6);
      ctx.restore();
    }
    if (Math.floor(t)%13===2 && (t%1)<0.03 && CAM.z>0.4)
      sayAt('TOWN', ACTS.cadets.x0+t*82-90, 30-70, 'Left… left… left, right, left.', {dur:2.8});
  }
  // the Traveller — brand new this year, named for a famous horse
  const hrW2=d.hour<6?d.hour+24:d.hour;
  if ((d.dow===4||d.dow===5||(d.hour<6&&(d.dow===5||d.dow===6))) && (hrW2>=22 && hrW2<26.5)){
    const bx=((rt*64)%7200)-1100;
    const sx=projX(band, bx);
    if (sx>-140 && sx<view.w+140){
      ctx.save();
      ctx.translate(sx, gy+30*CAM.z);
      ctx.scale(CAM.z, CAM.z);
      ctx.fillStyle='#2e5a3c';
      ctx.beginPath(); ctx.roundRect(-52,-36,104,32,4); ctx.fill();
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='#ffe9a8';
      for (let i=0;i<5;i++) ctx.fillRect(-44+i*19,-31,13,10);
      ctx.fillStyle='#e8e2d2'; ctx.fillRect(-52,-19,104,3);
      ctx.save(); ctx.font='bold 6.5px Georgia'; ctx.textAlign='center'; ctx.fillStyle='#e8e2d2';
      ctx.fillText('T R A V E L L E R', 0, -8.5); ctx.restore();
      for (const wx2 of [-34,34]){
        ctx.fillStyle='#2e2a26'; ctx.beginPath(); ctx.arc(wx2,-3,7,0,7); ctx.fill();
        ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.6; ctx.stroke();
      }
      // headlight cone at night
      ctx.globalAlpha=0.25; ctx.fillStyle='#ffe9a8';
      ctx.beginPath(); ctx.moveTo(52,-14); ctx.lineTo(86,-20); ctx.lineTo(86,-4); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }
}
function drawParade(ctx, band, gy, head, rt){
  const yr=(seedBaseYear()+Math.floor(CLOCK.derive().dayAbs/360))%100;
  const put=(wx,fn)=>{
    const sx=projX(band,wx);
    if (sx<-160||sx>view.w+160) return;
    ctx.save(); ctx.translate(sx, gy+26*CAM.z); ctx.scale(CAM.z,CAM.z); fn(); ctx.restore();
  };
  // banner pair
  put(head, ()=>{
    ctx.fillStyle='#efe7d2'; ctx.fillRect(-52,-58,104,20);
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.6; ctx.strokeRect(-52,-58,104,20);
    ctx.save(); ctx.font='bold 8px Georgia'; ctx.textAlign='center'; ctx.fillStyle='#27406b';
    ctx.fillText('MOCK CONVENTION', 0, -47);
    ctx.font='italic 6px Georgia'; ctx.fillText('’0'+(yr%10)+' · every vote counts (pretend)', 0, -40.5);
    ctx.restore();
    for (const px of [-56,56]){
      ctx.strokeStyle='#8a6a4a'; ctx.lineWidth=2.4;
      ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,-58); ctx.stroke();
      const guest={pid:-1,female:false,polo:'#27406b',skin:SKINS[2],hair:HAIRS[1],hat:false};
      ctx.save(); ctx.translate(px+(px<0?8:-8),0); POSES.stand(ctx,guest,(rt*0.5)%1); ctx.restore();
    }
  });
  // elephants (real ones. rented.)
  put(head-150, ()=>drawElephant(ctx, rt, 0));
  put(head-290, ()=>drawElephant(ctx, rt, 1));
  // handler
  put(head-220, ()=>{
    const guest={pid:-1,female:false,polo:'#c0392b',skin:SKINS[4],hair:HAIRS[5],hat:true};
    POSES.talk(ctx,guest,(rt*0.6)%1);
  });
  // state float
  put(head-430, ()=>{
    ctx.fillStyle='#9a8a72'; ctx.fillRect(-58,-16,116,10);
    for (const wx of [-40,40]){
      ctx.fillStyle='#2e2a26'; ctx.beginPath(); ctx.arc(wx,-4,7,0,7); ctx.fill();
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.6; ctx.stroke();
    }
    ctx.fillStyle='#c03a30'; ctx.fillRect(-52,-34,104,18);
    ctx.fillStyle='#efe7d2'; ctx.fillRect(-52,-24,104,3);
    ctx.save(); ctx.font='bold 8px Georgia'; ctx.textAlign='center'; ctx.fillStyle='#efe7d2';
    ctx.fillText('VIRGINIA', 0, -21.5); ctx.restore();
    const guest={pid:-1,female:true,polo:'#c9a227',skin:SKINS[0],hair:HAIRS[4],hat:false};
    ctx.save(); ctx.translate(-20,-16); POSES.highfive(ctx,guest,(rt*0.4)%1); ctx.restore();
  });
  // curbside crowd, transfixed
  for (let i=0;i<7;i++){
    const cx=600+i*520+((i%2)?40:0);
    put(cx, ()=>{
      const guest={pid:-1, female:hash01(cx,2)<0.45, polo:PAL.polos[Math.floor(hash01(cx,3)*8)],
        skin:SKINS[Math.floor(hash01(cx,4)*6)], hair:HAIRS[Math.floor(hash01(cx,5)*7)], hat:hash01(cx,6)<0.2};
      POSES.stand(ctx,guest,(rt*0.3+i*0.17)%1);
    });
  }
}
function drawElephant(ctx, rt, k){
  const ph=Math.sin(rt*2.2+k*1.7);
  ctx.save();
  ctx.scale(-1,1);   // parade marches left-to-right; elephants face forward
  // legs
  ctx.strokeStyle='#7a7f86'; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-18,-22); ctx.lineTo(-18-ph*3,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(18,-22); ctx.lineTo(18+ph*3,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-8,-22); ctx.lineTo(-8+ph*2,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(9,-22); ctx.lineTo(9-ph*2,0); ctx.stroke();
  // body
  ctx.fillStyle='#8a8f96';
  ctx.beginPath(); ctx.ellipse(0,-34,32,19,0,0,7); ctx.fill();
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=2.4; ctx.stroke();
  // ceremonial blanket
  ctx.fillStyle='#c03a30'; ctx.fillRect(-18,-46,36,20);
  ctx.fillStyle='#c9a227'; ctx.fillRect(-18,-28,36,3);
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.4; ctx.strokeRect(-18,-46,36,23);
  // head + ear + trunk
  ctx.fillStyle='#8a8f96';
  ctx.beginPath(); ctx.arc(34,-42,12,0,7); ctx.fill();
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=2.2; ctx.stroke();
  ctx.fillStyle='#7a7f86';
  ctx.beginPath(); ctx.ellipse(28,-44,7,10,0.3,0,7); ctx.fill();
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.6; ctx.stroke();
  ctx.strokeStyle='#8a8f96'; ctx.lineWidth=5.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(43,-40);
  ctx.quadraticCurveTo(52,-32+ph*2, 48+ph*3, -18);
  ctx.stroke();
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(43,-37);
  ctx.quadraticCurveTo(51,-31+ph*2, 47+ph*3, -18); ctx.stroke();
  // the cel eye — even the elephant gets one
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(38,-45,2.6,3.2,0,0,7); ctx.fill();
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle=PAL.ink;
  ctx.beginPath(); ctx.arc(38.8,-44.6,1.1,0,7); ctx.fill();
  ctx.restore();
}

function drawHillLife(ctx, rt){
  const band=BAND.HILL, gy=groundY(band);
  const d=CLOCK.derive();
  // one kid taking his self-scheduled final under a tree. alone. trusted.
  if (d.dow<5 && d.hour>=10 && d.hour<16 && hash01(d.dayAbs,71)<0.6){
    const wx=1815;

      const p=PEOPLE[GAGS.examPid];
      const sy=gy+(-46)*CAM.z;

      ctx.restore();
      if (p) HIT.push({pid:p.pid, sx, sy:sy-40*CAM.z});

// ---- specials: figures with jobs ---------------------------------------------
const SPEC={ pizza:null, hooded:null, ladder:null };
function specialsTick(dt, rt){
  const d=CLOCK.derive();
  const hrW=d.hour<6?d.hour+24:d.hour;
  const dowEff=d.hour<6?(d.dow+6)%7:d.dow;
  // the pizza oracle: one delivery a night, knows everyone
  if (GAGS.pizza && hrW>=21.3 && hrW<23.8){
    if (!SPEC.pizza || SPEC.pizza.day!==d.dayAbs){
      const target=WORLD.houses[Math.floor(hash01(d.dayAbs,88)*WORLD.houses.length)];
      SPEC.pizza={day:d.dayAbs, x:4640, dir:-1, target:target.x+52, tname:target.frat.letters,
        state:'walk', dwell:0, phase:0, said:false, gy:24};
    }
    const pz=SPEC.pizza;
    if (pz.state==='walk'){
      pz.x+=pz.dir*92*dt; pz.phase+=dt*2.6;
      if (pz.dir===-1 && pz.x<=pz.target){
        pz.state='dwell'; pz.dwell=6.5;
        if (!pz.said && CAM.z>0.5){
          pz.said=true;
          const roster=WORLD.houses.find(h=>Math.abs(h.x+52-pz.target)<2);
          const someone=roster?PEOPLE[roster.roster[Math.floor(hash01(d.dayAbs,89)*roster.roster.length)]]:null;
          sayAt('ROW', pz.x, -34-52,
            someone? 'Two larges, one ranch. Evenin’, '+someone.name+'.' : 'Two larges, one ranch. I know the way.',
            {dur:4});
        }
      }
      if (pz.x<320) SPEC.pizza.done=true;
    } else {
      pz.dwell-=dt;
      if (pz.dwell<=0) pz.state='walk';
    }
  } else SPEC.pizza=null;
  // the hooded figure: Thursday midnight to four. do not wave.
  if (dowEff===3 && hrW>=24.3 && hrW<28.3){
    if (!SPEC.hooded || SPEC.hooded.day!==d.dayAbs){
      SPEC.hooded={day:d.dayAbs, x:4560, phase:0};
    }
    SPEC.hooded.x-=21*dt;
    SPEC.hooded.phase+=dt;
    if (SPEC.hooded.x<380) SPEC.hooded=null;
  } else SPEC.hooded=null;
  // the ladder. don't ask.
  if (GAGS.ladderPid>=0 && hrW>=9 && hrW<23){
    const blk=heroBlock()+d.dayAbs*6;
    if (hash01(d.dayAbs, heroBlock(), 501)<0.3){
      if (!SPEC.ladder || SPEC.ladder.blk!==blk){
        SPEC.ladder={blk, x:blk%2?4640:360, dir:blk%2?-1:1, phase:0, gy:24, done:false};
      }
      const ld=SPEC.ladder;
      if (!ld.done){
        ld.x+=ld.dir*58*dt; ld.phase+=dt*2.1;
        if (ld.x<330||ld.x>4670) ld.done=true;
      }
    }
  }
  // cadets: check retirement
  if (ACTS.cadets && rt-ACTS.cadets.t0>110) ACTS.cadets=null;
}
function drawSpecials(ctx, rt){

      ctx.fillStyle='#0c0a10';
      ctx.beginPath(); ctx.ellipse(2,-39,4.4,5.4,0,0,7); ctx.fill();
      ctx.restore();
    }
  }
  // the ladder truther
  if (SPEC.ladder && !SPEC.ladder.done && hrW>=9 && hrW<23){
    const ld=SPEC.ladder;
    const sx=projX(band, ld.x);
    if (sx>-80 && sx<view.w+80){

        polo:p?p.polo:'#9fc4d8', skin:p?p.skin:SKINS[0], hair:p?p.hair:HAIRS[0], hat:false, female:false, id:778};
      ctx.save();
      ctx.translate(sx, gy+24*CAM.z);
      ctx.scale(CAM.z, CAM.z);

      // the ladder itself, under one arm, explanation pending since 2001

      ctx.strokeStyle='#8a6a4a'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-26,-24); ctx.lineTo(30,-30); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-26,-19); ctx.lineTo(30,-25); ctx.stroke();
      ctx.lineWidth=1.3;
      for (let i=0;i<7;i++){
        const t=i/6, lx=lerp(-24,28,t);
        ctx.beginPath(); ctx.moveTo(lx, -24+t*-0.7-0); ctx.lineTo(lx, -19+t*-0.7-0.2); ctx.stroke();
      }
      ctx.restore();
      ctx.restore();
      if (p) HIT.push({pid:p.pid, sx, sy:gy+24*CAM.z-46*CAM.z});
    }
  }
}

function drawRain(ctx, rt){
  const d=CLOCK.derive();
  if (ACTS.rainDay!==d.dayAbs) return;
  ctx.save();
  ctx.fillStyle='rgba(90,100,115,0.18)';
  ctx.fillRect(0,0,view.w,view.h);
  // a proper cloud deck — no sunny-day rain
  const cd=ctx.createLinearGradient(0,0,0,view.h*0.55);
  cd.addColorStop(0,'rgba(108,116,130,0.85)');
  cd.addColorStop(0.6,'rgba(120,128,142,0.4)');
  cd.addColorStop(1,'rgba(130,138,150,0)');
  ctx.fillStyle=cd; ctx.fillRect(0,0,view.w,view.h*0.55);
  ctx.strokeStyle='rgba(200,215,228,0.4)'; ctx.lineWidth=1.2; ctx.lineCap='round';
  const n=90;
  for (let i=0;i<n;i++){
    const spd=560+hash01(i,1)*220;
    const px=((hash01(i,2)*view.w*1.3) - ((rt*spd*0.16)% (view.w*1.3)) + view.w*1.3)%(view.w*1.3) - view.w*0.15;
    const py=((hash01(i,3)*view.h) + rt*spd*0.5) % view.h;
    ctx.beginPath();
    ctx.moveTo(px,py); ctx.lineTo(px-3,py+11); ctx.stroke();

}

// ---- the composite viewer (click the frame in the chapter room) ----------------
const COMP={wrap:null, cv:null, down:null};
function compInit(){
  const wrap=document.createElement('div');
  wrap.id='compwrap';
  const frame=document.createElement('div');
  frame.id='compframe';
  const cv=document.createElement('canvas');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  cv.width=680*dpr; cv.height=470*dpr;
  cv.style.width='680px'; cv.style.height='470px';
  frame.appendChild(cv); wrap.appendChild(frame); document.body.appendChild(wrap);
  COMP.wrap=wrap; COMP.cv=cv;
  wrap.onclick=()=>{ wrap.style.display='none'; };
  // click the composite prop to open
  const c=document.getElementById('c');
  c.addEventListener('pointerdown', e=>{ COMP.down=[e.clientX,e.clientY,performance.now()]; });
  c.addEventListener('pointerup', e=>{
    if (!COMP.down) return;
    const [dx,dy,dt0]=COMP.down; COMP.down=null;
    if (Math.hypot(e.clientX-dx, e.clientY-dy)>7 || performance.now()-dt0>450) return;
    if (HERO.openT<0.55) return;
    const L=HERO.h.x-150;
    const band=BAND.ROW;
    const x0=projX(band, L+136-17), x1=projX(band, L+136+17);
    const gy=groundY(band);
    const y0=gy+(-94-36)*CAM.z, y1=gy+(-94-8)*CAM.z;
    if (e.clientX>=x0 && e.clientX<=x1 && e.clientY>=y0 && e.clientY<=y1){
      drawComposite();
      COMP.wrap.style.display='flex';
    }
  });
}
function drawComposite(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const g=COMP.cv.getContext('2d');
  g.setTransform(dpr,0,0,dpr,0,0);
  g.clearRect(0,0,680,470);
  g.fillStyle='#f4ead6'; g.fillRect(0,0,680,470);
  const d=CLOCK.derive();
  const yr=seedBaseYear()+d.year;
  g.fillStyle=PAL.ink; g.textAlign='center';
  g.font='bold 22px Georgia'; g.fillText('ΓΔ', 340, 34);
  g.font='13px Georgia'; g.fillText('GAMMA DELTA · COLONNADE COLLEGE · '+yr+'–'+(yr+1), 340, 52);
  g.font='italic 11px Georgia'; g.fillStyle='#6b5a49';
  g.fillText('“entertain ourselves first”', 340, 67);
  const roster=HERO.h.roster.map(pid=>PEOPLE[pid]);
  const cols=7, cw=680/cols, rh=86, oy=84;
  roster.forEach((p,i)=>{
    const cx=(i%cols)*cw+cw/2, cy=oy+Math.floor(i/cols)*rh;
    drawPortrait(g, p, cx, cy+22, 16);
    g.fillStyle=PAL.ink; g.font='bold 8.5px Georgia';
    g.fillText(p.name+' '+classTag(p), cx, cy+50);
    if (p.tag){ g.font='italic 7px Georgia'; g.fillStyle='#6b5a49';
      const kf=TAG_KNOWN[p.tag]||'';
      g.fillText(kf.length>26?kf.slice(0,25)+'…':kf, cx, cy+60); }
  });
  // the cook, honored center-bottom, larger — as is right
  if (HERO.h.cook){
    const ck=HERO.h.cook;
    drawPortrait(g, ck, 340, 428, 20);
    g.fillStyle=PAL.ink; g.font='bold 10px Georgia';
    g.fillText(ck.full, 340, 462);
    g.font='italic 8px Georgia'; g.fillStyle='#6b5a49';
    g.fillText('our kitchen · our compass', 340, 471-2);
  }
  g.textAlign='left';
}
function drawPortrait(g, p, cx, cy, r){
  g.save();
  g.beginPath(); g.ellipse(cx,cy,r+6,r+8,0,0,7);
  g.fillStyle='#efe7d2'; g.fill();
  g.strokeStyle='#8a7862'; g.lineWidth=1; g.stroke();
  g.fillStyle=p.skin;
  g.beginPath(); g.arc(cx,cy,r,0,7); g.fill();
  g.strokeStyle=PAL.ink; g.lineWidth=1.6; g.stroke();
  g.fillStyle=p.hair;
  if (p.kind==='COOK'){
    if (p.first.startsWith('Miss')){
      g.beginPath(); g.arc(cx,cy-3,r*0.98,Math.PI*0.9,Math.PI*0.1); g.fill();
    } else {
      g.beginPath(); g.arc(cx,cy-r*0.4,r*0.9,Math.PI*1.05,Math.PI*-0.05); g.fill();
    }
  } else if (p.female){
    g.beginPath(); g.arc(cx,cy-3,r*0.98,Math.PI*0.9,Math.PI*0.1); g.fill();
    g.fillRect(cx-r-2, cy-3, 4, r+4);
  } else {
    g.beginPath(); g.arc(cx,cy-r*0.35,r*0.94,Math.PI*0.95,Math.PI*0.05); g.fill();
  }
  // cel eyes + the smile — the composite photographer said “gentlemen, smile,” once
  for (const s of [-1,1]){
    g.fillStyle='#fff';

// ==== §22 P5: SHINE & SOUND =================================================
// A fully synthesized ambience — no assets, no samples. Every sound is math.

const AUDIO={ ctx:null, master:null, started:false, muted:false, vol:0.7,
  g:{}, wall:null, partyBus:null, nextBeat:0, lastBell:'', dbg:{} };

function audioInit(){
  // the chip: mute + volume, always visible
  const chip=document.createElement('div');
  chip.id='soundchip'; chip.className='hud';
  chip.innerHTML='<button id="mutebtn" title="sound">♪</button>'+
    '<input id="volslider" type="range" min="0" max="1" step="0.05" value="0.7">';
  document.body.appendChild(chip);
  chip.style.pointerEvents='auto';
  document.getElementById('mutebtn').onclick=()=>{
    AUDIO.muted=!AUDIO.muted;
    document.getElementById('mutebtn').textContent=AUDIO.muted?'∅':'♪';
    if (AUDIO.master) AUDIO.master.gain.value=AUDIO.muted?0:AUDIO.vol;
  };
  document.getElementById('volslider').oninput=e=>{
    AUDIO.vol=parseFloat(e.target.value);
    if (AUDIO.master && !AUDIO.muted) AUDIO.master.gain.value=AUDIO.vol;
  };
  // browsers demand a gesture before sound; take the first one offered
  const kick=()=>{
    if (!AUDIO.started){ try{ audioStart(); }catch(e){} }
    window.removeEventListener('pointerdown', kick);
    window.removeEventListener('keydown', kick);
  };
  window.addEventListener('pointerdown', kick);
  window.addEventListener('keydown', kick);
}
function audioStart(){
  const C=new (window.AudioContext||window.webkitAudioContext)();
  AUDIO.ctx=C; AUDIO.started=true;
  const master=C.createGain();
  master.gain.value=AUDIO.muted?0:AUDIO.vol;
  master.connect(C.destination);
  AUDIO.master=master;
  // a looping buffer, filled by a little generator
  const loop=(secs, fill, dest)=>{
    const b=C.createBuffer(1, Math.floor(secs*C.sampleRate), C.sampleRate);
    fill(b.getChannelData(0), C.sampleRate);
    const s=C.createBufferSource(); s.buffer=b; s.loop=true;
    const g=C.createGain(); g.gain.value=0;
    s.connect(g); g.connect(dest||master); s.start();
    return g;
  };
  // crickets: pulsed chirp trains around 4.3 kHz
  AUDIO.g.crickets=loop(3.1,(d,sr)=>{
    for (let i=0;i<d.length;i++){
      const t=i/sr;
      const train=(t%0.43)<0.26;
      const pulse=Math.sin(2*Math.PI*24*t)>0.15;
      const chirp=Math.sin(2*Math.PI*4300*t)*0.5+Math.sin(2*Math.PI*4650*t+1.3)*0.22;
      d[i]=(train&&pulse)? chirp*0.3*(0.75+0.25*Math.sin(2*Math.PI*0.9*t)) : 0;
    }
  });
  // dawn birds: sparse frequency-swept chirps
  AUDIO.g.birds=loop(4.8,(d,sr)=>{
    for (let k=0;k<15;k++){
      const st=Math.random()*4.4, dur=0.08+Math.random()*0.15;
      const f0=2200+Math.random()*1800, f1=f0+(Math.random()*1400-500);
      const s0=Math.floor(st*sr), n=Math.floor(dur*sr);
      for (let i=0;i<n && s0+i<d.length;i++){
        const t=i/sr, p=i/n;
        d[s0+i]+=Math.sin(2*Math.PI*(f0+(f1-f0)*p)*t)*Math.sin(Math.PI*p)*0.2;
      }
    }
  });
  // the river: brown-ish noise, felt more than heard
  AUDIO.g.river=loop(2.0,(d)=>{
    let v=0;
    for (let i=0;i<d.length;i++){ v=v*0.972+(Math.random()*2-1)*0.05; d[i]=v*2.0; }
  });
  // rain: brighter wash
  AUDIO.g.rain=loop(1.7,(d)=>{
    let v=0;
    for (let i=0;i<d.length;i++){ v=v*0.6+(Math.random()*2-1)*0.4; d[i]=v*0.32; }
  });
  // the Saturday mower, streets away
  const mowOsc=C.createOscillator(); mowOsc.type='sawtooth'; mowOsc.frequency.value=84;
  const mowLfo=C.createOscillator(); mowLfo.frequency.value=0.7;
  const mowLfoG=C.createGain(); mowLfoG.gain.value=6;
  mowLfo.connect(mowLfoG); mowLfoG.connect(mowOsc.frequency);
  const mowF=C.createBiquadFilter(); mowF.type='lowpass'; mowF.frequency.value=300;
  const mowG=C.createGain(); mowG.gain.value=0;
  mowOsc.connect(mowF); mowF.connect(mowG); mowG.connect(master);
  mowOsc.start(); mowLfo.start();
  AUDIO.g.mower=mowG;
  // the party bus: everything a basement produces, behind one lowpass "wall".
  // walking toward the house literally opens the filter — the door, opening.
  const wall=C.createBiquadFilter(); wall.type='lowpass'; wall.frequency.value=130;
  const partyG=C.createGain(); partyG.gain.value=0;
  wall.connect(partyG); partyG.connect(master);
  AUDIO.partyBus=wall; AUDIO.g.party=partyG; AUDIO.wall=wall;
  // crowd murmur lives inside the party bus
  AUDIO.g.murmur=loop(2.3,(d)=>{
    let v=0;
    for (let i=0;i<d.length;i++){ v=v*0.988+(Math.random()*2-1)*0.03; d[i]=v*2.6; }
  }, wall);
}
function bellTone(t){
  const C=AUDIO.ctx;
  const g=C.createGain();
  g.gain.setValueAtTime(0.22,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+3.4);
  g.connect(AUDIO.master);
  for (const [m,a] of [[1,1],[2.01,0.45],[2.74,0.26],[4.52,0.1]]){
    const o=C.createOscillator(); o.frequency.value=196*m;
    const og=C.createGain(); og.gain.value=a*0.25;
    o.connect(og); og.connect(g);
    o.start(t); o.stop(t+3.6);
  }
}
function audioTick(dt, rt){
  if (!AUDIO.started) return;
  const C=AUDIO.ctx;
  if (C.state==='suspended'){ C.resume(); return; }
  const d=CLOCK.derive();
  const hr=CLOCK.hourFloat()%24;
  const raining=ACTS.rainDay===d.dayAbs;
  const ease=(g,t)=>{ if (g) g.gain.value+=(t-g.gain.value)*Math.min(1,dt*2.5); };
  const night=clamp(hr>18.5 ? (hr-18.5)/1.4 : hr<6.4 ? (6.4-hr)/1.2 : 0, 0, 1);
  const dawn=(hr>5.2&&hr<9) ? Math.sin(Math.PI*(hr-5.2)/3.8) : 0;
  const zoomOut=clamp((0.75-CAM.z)/0.5, 0, 1);
  ease(AUDIO.g.crickets, night*0.42*(raining?0.15:1));
  ease(AUDIO.g.birds, dawn*0.45*(raining?0.25:1));
  ease(AUDIO.g.river, (0.05+zoomOut*0.24)*(raining?0.5:1));
  ease(AUDIO.g.rain, raining?0.4:0);
  ease(AUDIO.g.mower, (d.dow===5 && hr>9 && hr<11.6 && !raining) ? 0.045+0.02*Math.sin(rt*0.9) : 0);
  // the muffled thump: proximity in screens to the nearest live party
  let best=null, bd=1e9;
  if (partyHour()){
    const screenWu=view.w/Math.max(0.001,CAM.z);
    for (const pt of partiesTonight()){
      const dist=Math.abs(pt.h.x - CAM.x*BAND.ROW.pf)/screenWu;
      if (dist<bd){ bd=dist; best=pt; }
    }
  }
  const prox=best ? clamp(1-bd/2.2, 0, 1) : 0;
  const lean=clamp((CAM.z-0.45)/1.5, 0, 1);
  const open=prox*(0.3+0.7*lean);
  AUDIO.dbg={open, prox, big:!!(best&&best.big)};
  ease(AUDIO.g.party, open*0.55*(best&&best.big?1.2:1));
  ease(AUDIO.g.murmur, open*open*0.5);
  if (AUDIO.wall)
    AUDIO.wall.frequency.value+=((120+open*880+(best&&best.big?160:0))-AUDIO.wall.frequency.value)*Math.min(1,dt*3);
  // schedule the kick pattern a beat ahead
  if (best && open>0.02){
    const spb=60/(best.big?118:124);
    if (AUDIO.nextBeat<C.currentTime) AUDIO.nextBeat=C.currentTime+0.05;
    while (AUDIO.nextBeat<C.currentTime+0.4){
      const t=AUDIO.nextBeat;
      const o=C.createOscillator(), g=C.createGain();
      o.frequency.setValueAtTime(140,t);
      o.frequency.exponentialRampToValueAtTime(46,t+0.09);
      g.gain.setValueAtTime(0.8,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
      o.connect(g); g.connect(AUDIO.partyBus);
      o.start(t); o.stop(t+0.28);
      AUDIO.nextBeat+=spb;
    }
  }
  // church bells: Sunday 11 AM and 6 PM
  if (d.dow===6){
    const slot=(hr>=11&&hr<11.35)?11:(hr>=18&&hr<18.35)?18:0;
    const key=d.dayAbs+':'+slot;
    if (slot && AUDIO.lastBell!==key){
      AUDIO.lastBell=key;
      for (let i=0;i<6;i++) bellTone(C.currentTime+0.2+i*1.7);
    }
  }
}

// ---- the degrade ladder (measured, two rungs, quiet about it) ---------------
const PERF={acc:0, n:0, rung:0};
function perfTick(dt){
  PERF.acc+=dt; PERF.n++;
  if (PERF.n<120) return;
  const avg=PERF.acc/PERF.n;
  PERF.acc=0; PERF.n=0;
  if (PERF.rung===0 && avg>0.026){ PERF.rung=1; view.dprCap=1.25; resize(); }
  else if (PERF.rung===1 && avg>0.032){ PERF.rung=2; }
}
