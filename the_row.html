<canvas id="c"></canvas>
<div id="title" class="hud"><div class="t1">THE ROW</div><div class="t2" id="subtitle">Colonnade College &middot; Lexford, Virginia</div></div>

<script>
"use strict";
/* ============================================================================
   THE ROW — a living picture book
   Colonnade College · Lexford, Virginia · forever 1999–2006
   v2: hand-drawn Canvas 2D. No libraries, no assets, no build.
   ==========================================================================*/

// ==== §1 CONFIG & PALETTE ===================================================
const CFG = {
  PERSON_H: 56,             // world units; 1 wu = 1 px at zoom 1
  ZMIN: 0.16, ZMAX: 3.0,
  TILE: 1024,               // bake tile width in px
  BUCKETS: [0.25, 0.5, 1, 2],
  TILE_CACHE_MAX: 64,
};
const PAL = {
  paper:'#f4ead6', paperDeep:'#e9d8b7',
  ink:'#3a2f26', inkLight:'#6b5a49', inkFaded:'#8a7862',
  brick:'#a8563c', brickShade:'#8a4330', brickLight:'#c06a4b', mortar:'#d9c3ad',
  colonnade:'#f7f1e2', trim:'#e6dcc4', shutter:'#33523f',
  lawn:'#7fa055', lawnLight:'#9db76c', lawnShade:'#5c7f43', field:'#b3b273',
  oak:'#4d6f3f', oakLight:'#87a45d', trunk:'#6d573f', autumn:'#c07f3a',
  ridgeFar:'#93a6c2', ridgeMid:'#7186a8', ridgeNear:'#59698c',
  river:'#5b83a0', riverDeep:'#45688a', glint:'#dcebee',
  khaki:'#cfb98e', cadet:'#9aa2ac', roofSlate:'#5d5850', roofDark:'#4a453f',
  asphalt:'#8b8377', asphaltEdge:'#6f6659', sidewalk:'#d8c9ab',
  lampAmber:'#ffd98a', windowGlow:'#ffc46a', candle:'#ffb45e', neon:'#ff7d6b',
  polos:['#e8a0a8','#f2d489','#9fc4d8','#b8d9a8','#f0f0e8','#d8b8d8','#f0c8a0','#a8c8c0'],
  sky: {
    // hour stops: [hour, topColor, horizonColor, tint(multiply), glowAlpha]
    stops: [
      [0.0,  '#232a48','#3a4468','#46507a', 1.0],
      [5.0,  '#2a3153','#4a4a72','#6a6a8e', 0.9],
      [6.6,  '#7d8bb0','#f2b98a','#ffd9b0', 0.35],
      [9.0,  '#9db8d8','#e8e2cd','#fff4dd', 0.0],
      [13.0, '#a4c0dc','#e4e4d2','#ffffff', 0.0],
      [17.0, '#93aacc','#f0d9ae','#ffedc2', 0.0],
      [18.9, '#7a89b8','#f5b57e','#eda775', 0.35],
      [20.1, '#3d4370','#8a6a92','#8d7a9e', 0.8],
      [24.0, '#232a48','#3a4468','#46507a', 1.0],
    ],
  },
};

// ==== §2 RNG, NOISE & HASH ==================================================
function xmur3(str){ let h=1779033703^str.length; for (let i=0;i<str.length;i++){ h=Math.imul(h^str.charCodeAt(i),3432918353); h=h<<13|h>>>19; } return function(){ h=Math.imul(h^h>>>16,2246822507); h=Math.imul(h^h>>>13,3266489909); return (h^=h>>>16)>>>0; }; }
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
const RNG = { seedStr:'', world:null, hist:null, name:null, ambient:null };
function initRNG(s){ RNG.seedStr=s; for (const k of ['world','hist','name','ambient']) RNG[k]=mulberry32(xmur3(s+'::'+k)()); }
const rw = ()=>RNG.world(), rwr=(a,b)=>a+(b-a)*RNG.world(), rwi=(a,b)=>a+Math.floor(RNG.world()*(b-a+1));
const rwPick = arr=>arr[Math.floor(RNG.world()*arr.length)];
const ra = ()=>RNG.ambient(), rar=(a,b)=>a+(b-a)*RNG.ambient(), raPick=arr=>arr[Math.floor(RNG.ambient()*arr.length)];
const clamp=(v,a,b)=>v<a?a:(v>b?b:v), lerp=(a,b,t)=>a+(b-a)*t;
const smoothstep=(a,b,x)=>{ const t=clamp((x-a)/(b-a),0,1); return t*t*(3-2*t); };
let SEEDH = 1234;
function hash01(){ // stateless place-time hash: hash01(a, b, c, ...) — presentation determinism
  let h = SEEDH>>>0;
  for (let i=0;i<arguments.length;i++){
    let x = Math.imul((arguments[i]*1e4)|0, 2654435761);
    h = Math.imul(h ^ x, 2246822519); h = (h<<13|h>>>19)>>>0;
  }
  h = Math.imul(h^h>>>16, 2246822507); h = (h^h>>>13)>>>0;
  return h/4294967296;
}
function latticeHash(ix,iz){ let h=Math.imul(ix,374761393)+Math.imul(iz,668265263)+Math.imul(SEEDH,2246822519); h=Math.imul(h^(h>>>13),1274126177); return ((h^(h>>>16))>>>0)/4294967296; }
function vnoise(x,z){ const ix=Math.floor(x),iz=Math.floor(z),fx=x-ix,fz=z-iz;
  const a=latticeHash(ix,iz),b=latticeHash(ix+1,iz),c=latticeHash(ix,iz+1),d=latticeHash(ix+1,iz+1);
  const ux=fx*fx*(3-2*fx),uz=fz*fz*(3-2*fz);
  return lerp(lerp(a,b,ux),lerp(c,d,ux),uz);
}
function hexLerp(h1,h2,t){
  const a=parseInt(h1.slice(1),16), b=parseInt(h2.slice(1),16);
  const r=((a>>16)&255)+(((b>>16)&255)-((a>>16)&255))*t;
  const g=((a>>8)&255)+(((b>>8)&255)-((a>>8)&255))*t;
  const bl=(a&255)+((b&255)-(a&255))*t;
  return 'rgb('+(r|0)+','+(g|0)+','+(bl|0)+')';
}
function shade(hex, f){ // f<1 darker, f>1 lighter
  const a=parseInt(hex.slice(1),16);
  const r=clamp(((a>>16)&255)*f,0,255)|0, g=clamp(((a>>8)&255)*f,0,255)|0, b=clamp((a&255)*f,0,255)|0;
  return 'rgb('+r+','+g+','+b+')';
}

// ==== §4 CLOCK ==============================================================
const TICKS_PER_DAY=96, DAYS_PER_YEAR=360;
const MONTHS=['September','October','November','December','January','February','March','April','May','June','July','August'];
const DOW=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const CLOCK = {
  t: 0, frac: 0, speed: 1,   // sim-minutes per real second
  derive(){
    const dayAbs=Math.floor(this.t/TICKS_PER_DAY);
    const minutes=(this.t-dayAbs*TICKS_PER_DAY)*15;
    const year=Math.floor(dayAbs/DAYS_PER_YEAR);
    const dayInYear=dayAbs-year*DAYS_PER_YEAR;
    const month=Math.floor(dayInYear/30);
    return { dayAbs, year, dayInYear, month, dayInMonth:dayInYear-month*30+1, dow:dayAbs%7,
             hh:Math.floor(minutes/60), mm:minutes%60, hour:minutes/60 };
  },
  hourFloat(){ const d=this.derive(); return d.hour + this.frac*0.25; },
};

// ==== §5 ART TOOLKIT — ink & wash ==========================================
// Wobbly seeded ink stroke. pts in current-transform units. id keeps the
// wobble identical between bakes (it must never crawl).
function wob(ctx, pts, id, o){
  o=o||{};
  const amp=(o.amp!==undefined?o.amp:2.1)*ART.ampScale, seg=7;
  const w=Math.max((o.w!==undefined?o.w:1.6), ART.minInk);
  // resample
  const rp=[];
  for (let i=0;i<pts.length-1;i++){
    const [x1,y1]=pts[i],[x2,y2]=pts[i+1];
    const d=Math.hypot(x2-x1,y2-y1), n=Math.max(1,Math.round(d/seg));
    for (let j=(i===0?0:1); j<=n; j++) rp.push([lerp(x1,x2,j/n), lerp(y1,y2,j/n), i+j/n]);
  }
  if (o.close && pts.length>2) rp.push(rp[0].slice());
  ctx.beginPath();
  for (let i=0;i<rp.length;i++){
    const [x,y,s]=rp[i];
    // perpendicular
    const p=rp[Math.max(0,i-1)], nx=rp[Math.min(rp.length-1,i+1)];
    let dx=nx[0]-p[0], dy=nx[1]-p[1]; const l=Math.hypot(dx,dy)||1; dx/=l; dy/=l;
    const j=(vnoise(s*2.1+id*7.31, id*3.7)-0.5)*2*amp;
    const px=x-dy*j, py=y+dx*j;
    if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.lineWidth=w; ctx.strokeStyle=o.col||PAL.ink;
  ctx.lineCap='round'; ctx.lineJoin='round';
  const ga=ctx.globalAlpha;
  ctx.globalAlpha=ga*(o.alpha!==undefined?o.alpha:1);
  ctx.stroke();
  ctx.globalAlpha=ga;
}
function wobRect(ctx,x,y,w,h,id,o){ wob(ctx,[[x,y],[x+w,y],[x+w,y+h],[x,y+h],[x,y]],id,o); }
function wobEllipse(ctx,cx,cy,rx,ry,id,o){
  const pts=[]; const n=16;
  for (let i=0;i<=n;i++){ const a=i/n*Math.PI*2; pts.push([cx+Math.cos(a)*rx, cy+Math.sin(a)*ry]); }
  wob(ctx,pts,id,o);
}
// Wash fill: flat base + 2 soft tone blobs, inset halo from the ink line.
function washRect(ctx,x,y,w,h,base,id,o){
  o=o||{};
  const inset=o.inset!==undefined?o.inset:1.2;
  ctx.fillStyle=base;
  ctx.fillRect(x+inset,y+inset,w-inset*2,h-inset*2);
  ctx.save();
  ctx.beginPath(); ctx.rect(x+inset,y+inset,w-inset*2,h-inset*2); ctx.clip();
  const g1=hash01(id,1), g2=hash01(id,2), g3=hash01(id,9);
  ctx.globalAlpha=0.22;
  ctx.fillStyle=shade(base,1.16);
  ctx.beginPath(); ctx.ellipse(x+w*(0.2+g1*0.3), y+h*0.25, w*0.42, h*0.34, 0, 0, 7); ctx.fill();
  ctx.globalAlpha=0.24;
  ctx.fillStyle=shade(base,0.8);
  ctx.beginPath(); ctx.ellipse(x+w*(0.55+g2*0.3), y+h*0.82, w*0.5, h*0.3, 0, 0, 7); ctx.fill();
  ctx.globalAlpha=0.12;
  ctx.fillStyle=shade(base,1.28);
  ctx.beginPath(); ctx.ellipse(x+w*(0.3+g3*0.4), y+h*0.55, w*0.3, h*0.22, 0.4, 0, 7); ctx.fill();
  ctx.restore();
  ctx.globalAlpha=1;
}
function washPoly(ctx,pts,base,id,o){
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();
  ctx.fillStyle=base; ctx.fill();
  ctx.save(); ctx.clip();
  const g1=hash01(id,3);
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  for (const p of pts){ minx=Math.min(minx,p[0]); miny=Math.min(miny,p[1]); maxx=Math.max(maxx,p[0]); maxy=Math.max(maxy,p[1]); }
  const w=maxx-minx,h=maxy-miny;
  ctx.globalAlpha=0.13; ctx.fillStyle=shade(base,1.16);
  ctx.beginPath(); ctx.ellipse(minx+w*(0.25+g1*0.2), miny+h*0.3, w*0.45, h*0.4, 0, 0, 7); ctx.fill();
  ctx.globalAlpha=0.15; ctx.fillStyle=shade(base,0.84);
  ctx.beginPath(); ctx.ellipse(minx+w*0.7, miny+h*0.78, w*0.45, h*0.34, 0, 0, 7); ctx.fill();
  ctx.restore(); ctx.globalAlpha=1;
}
// hand-lettered feel for labels & titles
function jitterText(ctx, str, x, y, size, id, o){
  o=o||{};
  ctx.save();
  ctx.font=(o.style||'')+' '+size+'px Georgia, serif';
  ctx.fillStyle=o.col||PAL.ink;
  ctx.textBaseline='alphabetic';
  const widths=[];
  let total=0;
  for (const ch of str){ const w=ctx.measureText(ch).width; widths.push(w); total+=w*(o.track||1.04); }
  let cx = o.align==='center' ? x-total/2 : x;
  let i=0;
  for (const ch of str){
    const g1=hash01(id,i,1)-0.5, g2=hash01(id,i,2)-0.5;
    ctx.save();
    ctx.translate(cx+widths[i]/2, y+g2*size*0.06);
    ctx.rotate(g1*0.06);
    ctx.fillText(ch,-widths[i]/2,0);
    ctx.restore();
    cx+=widths[i]*(o.track||1.04); i++;
  }
  ctx.restore();
}
// context-wide art settings adjusted per bake bucket
const ART = { ampScale:1, minInk:1.1, detail:1 };
function artForBucket(bucket){
  ART.ampScale = 1;
  ART.minInk = 1.35/bucket;      // ink never thinner than ~1.15 device px
  ART.detail = bucket>=1 ? 2 : bucket>=0.5 ? 1 : 0;   // 0 poster, 1 mid, 2 full
}

// paper grain (screen-space overlay)
let GRAIN=null;
function makeGrain(){
  const c=document.createElement('canvas'); c.width=c.height=256;
  const g=c.getContext('2d');
  const img=g.createImageData(256,256);
  for (let i=0;i<img.data.length;i+=4){
    const v=200+Math.random()*55;
    img.data[i]=v; img.data[i+1]=v*0.98; img.data[i+2]=v*0.94;
    img.data[i+3]=Math.random()<0.5?14:0;
  }
  g.putImageData(img,0,0);
  // a few fibers
  g.strokeStyle='rgba(120,100,80,0.05)'; g.lineWidth=1;
  for (let i=0;i<40;i++){
    g.beginPath();
    const x=Math.random()*256,y=Math.random()*256;
    g.moveTo(x,y); g.lineTo(x+Math.random()*14-7,y+Math.random()*8-4);
    g.stroke();
  }
  GRAIN=c;
}

// ==== §8 BANDS & CAMERA =====================================================
const BANDS = [
  { id:'RIDGE',  pf:0.10, gy:470, topWu:-360, botWu:30 },
  { id:'HILL',   pf:0.34, gy:600, topWu:-300, botWu:170 },   // Colonnade on its hill
  { id:'ROW',    pf:0.85, gy:800, topWu:-380, botWu:130 },   // the hero band
  { id:'TOWN',   pf:1.12, gy:906, topWu:-190, botWu:46 },    // downtown Lexford + sorority row
  { id:'RIVER',  pf:1.38, gy:1006, topWu:-130, botWu:460 },  // pole houses over the water
];
const BAND = {}; for (const b of BANDS) BAND[b.id]=b;
const CAM = {
  x: 2450, z: 0.62, tx: 2450, tz: 0.62,
  yStage: 640,
  minX: 300, maxX: 4700,
};
function camYStage(){
  // poster centers the stage; zooming leans down onto the Row
  return lerp(660, BAND.ROW.gy - 300/CAM.z, smoothstep(0.3, 1.1, CAM.z));
}
function groundY(band){ // screen y of a band's ground line
  return (band.gy - CAM.yStage)*CAM.z + view.h*0.5;
}
function projX(band, wx){ return (wx - CAM.x*band.pf)*CAM.z + view.w*0.5; }
// world x at screen x for a band (for culling)
function unprojX(band, sx){ return (sx - view.w*0.5)/CAM.z + CAM.x*band.pf; }

// ==== §9 TILE CACHE =========================================================
const TILES = { map:new Map(), order:[], bakedThisFrame:0 };
function tileKey(bandId,bucket,ix){ return bandId+':'+bucket+':'+ix; }
function bucketFor(z){
  for (const b of CFG.BUCKETS) if (b>=z) return b;
  return CFG.BUCKETS[CFG.BUCKETS.length-1];
}
function getTile(band, bucket, ix, allowBake){
  const key=tileKey(band.id,bucket,ix);
  let t=TILES.map.get(key);
  if (t){ // refresh LRU
    const oi=TILES.order.indexOf(key);
    if (oi>=0) TILES.order.splice(oi,1);
    TILES.order.push(key);
    return t;
  }
  if (!allowBake || TILES.bakedThisFrame>=4) return null;
  TILES.bakedThisFrame++;
  const wuW=CFG.TILE/bucket;
  const x0=ix*wuW;
  const hWu=band.botWu-band.topWu;
  const cv=document.createElement('canvas');
  cv.width=CFG.TILE; cv.height=Math.ceil(hWu*bucket);
  const ctx=cv.getContext('2d');
  ctx.setTransform(bucket,0,0,bucket,-x0*bucket,-band.topWu*bucket);
  artForBucket(bucket);
  WORLDDRAW[band.id](ctx, x0, x0+wuW, bucket);
  artForBucket(1);
  t={cv, x0, wuW, hWu};
  TILES.map.set(key,t);
  TILES.order.push(key);
  while (TILES.order.length>CFG.TILE_CACHE_MAX){
    const old=TILES.order.shift();
    TILES.map.delete(old);
  }
  return t;
}
function drawBandTiles(ctx, band){
  const bucket=bucketFor(CAM.z);
  const wuW=CFG.TILE/bucket;
  const xL=unprojX(band,-80), xR=unprojX(band,view.w+80);
  const iMax=Math.floor(4900/wuW);
  const i0=Math.max(0,Math.floor(xL/wuW)), i1=Math.min(iMax,Math.floor(xR/wuW));
  const gy=groundY(band);
  for (let ix=i0; ix<=i1; ix++){
    let t=getTile(band,bucket,ix,true);
    let usedBucket=bucket;
    if (!t){ // fallback: any other baked bucket for this region
      for (const b2 of CFG.BUCKETS){
        if (b2===bucket) continue;
        const wu2=CFG.TILE/b2;
        const jx=Math.floor((ix*wuW+1)/wu2);
        const t2=TILES.map.get(tileKey(band.id,b2,jx));
        if (t2){ t=t2; usedBucket=b2; break; }
      }
    }
    if (!t) continue;
    const sx=projX(band, t.x0);
    const sy=gy + band.topWu*CAM.z;
    ctx.drawImage(t.cv, sx-0.5, sy, t.wuW*CAM.z+1, t.hWu*CAM.z);
  }
}

// ==== §10 SET-PIECE DRAWING =================================================
// Everything draws in band-ground coordinates: y=0 at the ground line, up is
// negative y. Facades are authored at 1wu = 1px; the bake transform scales.

const V2FRATS = [
  { key:'GD', letters:'ΓΔ', name:'Gamma Delta',  nick:'the Boys',        trim:'#2b4a6b', brickF:1.00, style:'gable',  hero:true  },
  { key:'RD', letters:'ΡΔ', name:'Rho Delta',    nick:'the Animals',     trim:'#7a2c22', brickF:0.94, style:'temple', hero:false },
  { key:'SS', letters:'ΣΣ', name:'Sigma Sterling', nick:'the Gentlemen', trim:'#27406b', brickF:1.06, style:'gable',  hero:false },
  { key:'PO', letters:'ΦΟ', name:'Phi Omicron',  nick:'the Pretty Boys', trim:'#5b3a6e', brickF:1.10, style:'temple', hero:false },

function drawShrub(ctx, x, y, s, id){
  washPoly(ctx, [[x-s,y],[x-s*0.7,y-s*0.9],[x,y-s*1.15],[x+s*0.75,y-s*0.85],[x+s,y]], PAL.oak, id);
  wob(ctx, [[x-s,y],[x-s*0.7,y-s*0.9],[x,y-s*1.15],[x+s*0.75,y-s*0.85],[x+s,y]], id, {w:1.3});
}

function drawWindow(ctx, cx, cy, w, h, id, opts){
  opts=opts||{};
  // glass
  washRect(ctx, cx-w/2, cy-h/2, w, h, '#5a6a7a', id, {inset:0.5});
  if (ART.detail>=1){
    // muntins
    ctx.strokeStyle='rgba(244,234,214,0.75)'; ctx.lineWidth=Math.max(1, ART.minInk*0.8);
    ctx.beginPath();
    ctx.moveTo(cx, cy-h/2+1); ctx.lineTo(cx, cy+h/2-1);
    ctx.moveTo(cx-w/2+1, cy); ctx.lineTo(cx+w/2-1, cy);
    ctx.stroke();
  }
  // trim + sill
  wobRect(ctx, cx-w/2, cy-h/2, w, h, id, {w:1.4, col:PAL.ink});
  if (ART.detail>=1){
    ctx.fillStyle=PAL.trim;
    ctx.fillRect(cx-w/2-3, cy+h/2, w+6, 3.5);
    wob(ctx, [[cx-w/2-3, cy+h/2+3.5],[cx+w/2+3, cy+h/2+3.5]], id+3, {w:1.2});
  }
  if (opts.shutters && ART.detail>=1){
    ctx.fillStyle=PAL.shutter;
    ctx.fillRect(cx-w/2-9, cy-h/2, 7, h);
    ctx.fillRect(cx+w/2+2, cy-h/2, 7, h);
    wobRect(ctx, cx-w/2-9, cy-h/2, 7, h, id+4, {w:1.1});
    wobRect(ctx, cx+w/2+2, cy-h/2, 7, h, id+5, {w:1.1});
  }
}

function drawFratHouse(ctx, h){
  const x=h.x, id=h.id;
  const W=300, bodyT=-206, foundT=-18;
  const brick = shade(PAL.brick, h.frat.brickF);
  // walkway to the sidewalk
  ctx.fillStyle=PAL.sidewalk;
  ctx.fillRect(x-14, 0, 28, 22);
  wob(ctx,[[x-14,0],[x-14,22]],id+61,{w:1.1,alpha:0.7});
  wob(ctx,[[x+14,0],[x+14,22]],id+62,{w:1.1,alpha:0.7});
  // foundation
  washRect(ctx, x-W/2-4, foundT, W+8, -foundT, '#b0a48c', id+1);
  wobRect(ctx, x-W/2-4, foundT, W+8, -foundT, id+1, {w:1.4});
  // brick body
  washRect(ctx, x-W/2, bodyT, W, bodyT*-1+foundT, brick, id+2);
  if (ART.detail>=2){
    // sparse brick ticks
    ctx.strokeStyle='rgba(58,47,38,0.18)'; ctx.lineWidth=1;
    for (let i=0;i<26;i++){
      const bx=x-W/2+8+hash01(id,20+i)* (W-16), by=bodyT+8+hash01(id,60+i)*(-bodyT+foundT-16);
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+7,by); ctx.stroke();
    }
  }
  wobRect(ctx, x-W/2, bodyT, W, -bodyT+foundT, id+2, {w:1.8});
  // second-floor windows
  const shut = h.frat.key==='SS'||h.frat.key==='GD';
  for (let i=0;i<4;i++){
    const wx=x-108+i*72;
    drawWindow(ctx, wx, -168, 34, 48, id+10+i, {shutters:shut});
    h.win(wx, -168);
  }
  // first-floor windows (flanking the door, behind porch)
  for (const off of [-108,-36,36,108]){
    if (Math.abs(off)<50) continue;
    drawWindow(ctx, x+off, -66, 34, 48, id+20+off, {shutters:false});
    h.win(x+off, -66);
  }
  // door
  ctx.fillStyle=shade('#6a4a30', 0.9+hash01(id,7)*0.2);
  ctx.fillRect(x-19, -78, 38, 60);
  wobRect(ctx, x-19, -78, 38, 60, id+30, {w:1.6});
  if (ART.detail>=1){
    wobRect(ctx, x-13, -66, 11, 20, id+31, {w:1});
    wobRect(ctx, x+2,  -66, 11, 20, id+32, {w:1});
    // transom fan
    ctx.fillStyle='#c8d4da';
    ctx.beginPath(); ctx.arc(x, -78, 15, Math.PI, 0); ctx.fill();
    wob(ctx, [[x-15,-78],[x+15,-78]], id+33, {w:1.2});
    ctx.beginPath(); ctx.strokeStyle=PAL.ink; ctx.lineWidth=1; ctx.arc(x,-78,15,Math.PI,0); ctx.stroke();
  }
  // porch: deck, columns, roof slab
  ctx.fillStyle='#ded2b4';
  ctx.fillRect(x-W/2-8, -26, W+16, 10);
  wobRect(ctx, x-W/2-8, -26, W+16, 10, id+40, {w:1.5});
  const colTop=-118;
  for (let i=0;i<5;i++){
    const cx=x-W/2+16+i*(W-32)/4;
    ctx.fillStyle=PAL.colonnade;
    ctx.fillRect(cx-5, colTop, 10, -colTop-26);
    wob(ctx, [[cx-5,colTop+2],[cx-5,-26]], id+41+i, {w:1.3});
    wob(ctx, [[cx+5,colTop+2],[cx+5,-26]], id+46+i, {w:1.3});
    if (ART.detail>=1){ ctx.fillRect(cx-7, colTop, 14, 5); ctx.fillRect(cx-7, -31, 14, 5); }
  }
  ctx.fillStyle=PAL.trim;
  ctx.fillRect(x-W/2-10, colTop-14, W+20, 14);
  wobRect(ctx, x-W/2-10, colTop-14, W+20, 14, id+52, {w:1.6});
  // porch couch (the institution) for the loud houses
  if ((h.frat.key==='RD'||h.frat.key==='GD') && ART.detail>=1){
    const sx=x+W/2-70;
    ctx.fillStyle='#7a5a48';
    ctx.fillRect(sx-26,-48,52,20);
    ctx.fillRect(sx-26,-58,52,12);
    ctx.fillStyle='#8a6a58';
    ctx.fillRect(sx-24,-46,22,10); ctx.fillRect(sx+2,-46,22,10);
    wobRect(ctx, sx-26,-58,52,30, id+55, {w:1.3});
  }
  if (h.frat.style==='temple'){
    // full-width pediment
    washPoly(ctx, [[x-W/2-16, bodyT],[x+W/2+16, bodyT],[x, bodyT-74]], PAL.colonnade, id+70);
    wob(ctx, [[x-W/2-16, bodyT],[x+W/2+16, bodyT],[x, bodyT-74],[x-W/2-16, bodyT]], id+70, {w:1.9});
    if (ART.detail>=1){
      wobEllipse(ctx, x, bodyT-30, 13, 13, id+71, {w:1.3});
    }
    // letters on the frieze
    jitterText(ctx, h.frat.letters, x, bodyT-8, 30, id+72, {align:'center', col:h.frat.trim, style:'bold'});
  } else {
    // side-gable roof band
    washPoly(ctx, [[x-W/2-18, bodyT],[x+W/2+18, bodyT],[x+W/2-26, bodyT-52],[x-W/2+26, bodyT-52]], PAL.roofSlate, id+74);
    wob(ctx, [[x-W/2-18, bodyT],[x-W/2+26, bodyT-52],[x+W/2-26, bodyT-52],[x+W/2+18, bodyT]], id+74, {w:1.9});
    if (ART.detail>=2){
      ctx.strokeStyle='rgba(58,47,38,0.25)'; ctx.lineWidth=1.1;
      for (let i=0;i<5;i++){
        const t=(i+1)/6;
        ctx.beginPath();
        ctx.moveTo(lerp(x-W/2-14, x-W/2+26, t), lerp(bodyT-2, bodyT-50, t));
        ctx.lineTo(lerp(x+W/2+14, x+W/2-26, t), lerp(bodyT-2, bodyT-50, t));
        ctx.stroke();
      }
    }
    // letters mounted on the brick between floors
    jitterText(ctx, h.frat.letters, x, -136, 25, id+72, {align:'center', col:'#e8dfc8', style:'bold'});
    // dormers
    for (const off of [-70, 70]){
      ctx.fillStyle=PAL.colonnade;
      ctx.fillRect(x+off-14, bodyT-34, 28, 32);
      washPoly(ctx,[[x+off-18,bodyT-34],[x+off+18,bodyT-34],[x+off,bodyT-52]],PAL.roofDark,id+80+off);
      drawWindow(ctx, x+off, bodyT-18, 16, 22, id+83+off, {});
      wobRect(ctx, x+off-14, bodyT-34, 28, 32, id+86+off, {w:1.2});
    }
  }
  // chimney + smoke anchor
  const chx = x + (h.frat.style==='temple' ? W/2-30 : W/2-52);
  const chTop = h.frat.style==='temple' ? bodyT-58 : bodyT-84;
  ctx.fillStyle=shade(brick,0.85);
  ctx.fillRect(chx-9, chTop, 18, 46);
  wobRect(ctx, chx-9, chTop, 18, 46, id+90, {w:1.4});
  h.smoke=[chx, chTop];
  // foundation shrubs
  drawShrub(ctx, x-W/2+26, -16, 16, id+95);
  drawShrub(ctx, x+W/2-26, -16, 14, id+96);
  // yard flavor per house
  if (ART.detail>=1) drawYardProp(ctx, h);
}

      ctx.fillRect(hx-20, -138, 40, 26);
      wobRect(ctx, hx-20, -138, 40, 26, id+2, {w:1.4});

      ctx.beginPath(); ctx.ellipse(hx-24, -112, 7, 2.6, 0, 0, 7); ctx.stroke();

      ctx.fillStyle='#6a7a62';
      ctx.fillRect(cx2-27,-27,25,12); ctx.fillRect(cx2+2,-27,25,12);

      ctx.fillStyle='#d86830';

      break;
    }
    case 'SS': { // boxwood pair + lamppost, naturally
      drawShrub(ctx, h.x-196, -2, 20, id+5);

      wobRect(ctx,sx-13,-88,32,24,id+7,{w:1.2});
      if (ART.detail>=2) jitterText(ctx,'RESERVED',sx+3,-72,7,id+8,{align:'center'});
      break;
    }
    case 'TK': { // cooler + football on the lawn

      ctx.beginPath(); ctx.ellipse(cx3+34,-4,9,5.5,0.3,0,7); ctx.fill();
      wobEllipse(ctx,cx3+34,-4,9,5.5,id+10,{w:1.1});

  }
}

function drawTree(ctx, t){
  const id=t.id;
  // trunk
  ctx.strokeStyle=PAL.trunk; ctx.lineWidth=7*t.s;
  ctx.beginPath(); ctx.moveTo(t.x, 0); ctx.quadraticCurveTo(t.x+t.lean*8, -60*t.s, t.x+t.lean*16, -110*t.s); ctx.stroke();
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.4;
  wob(ctx, [[t.x-3,0],[t.x+t.lean*16-3,-110*t.s]], id, {w:1.3, alpha:0.7});
  // canopy: clustered lobes
  const cx=t.x+t.lean*16, cy=-130*t.s;
  const lobes=[[0,0,62],[ -40,18,44],[42,20,46],[-16,-34,46],[26,-30,42]];
  for (let i=0;i<lobes.length;i++){
    const [ox,oy,r]=lobes[i];
    const col = i%2 ? PAL.oak : shade(PAL.oak,1.12);
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.ellipse(cx+ox*t.s, cy+oy*t.s, r*t.s, r*0.82*t.s, 0, 0, 7); ctx.fill();
  }
  // shade belly + light kiss
  ctx.fillStyle=shade(PAL.oak,0.8); ctx.globalAlpha=0.4;
  ctx.beginPath(); ctx.ellipse(cx+8*t.s, cy+30*t.s, 54*t.s, 26*t.s, 0.1, 0, 7); ctx.fill();
  ctx.globalAlpha=0.55; ctx.fillStyle=PAL.oakLight;
  ctx.beginPath(); ctx.ellipse(cx-16*t.s, cy-30*t.s, 40*t.s, 24*t.s, -0.3, 0, 7); ctx.fill();
  ctx.globalAlpha=1;
  // scalloped crown ink
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=Math.max(1.3, ART.minInk);
  ctx.globalAlpha=0.75;
  const scallops=9;
  ctx.beginPath();
  for (let i=0;i<=scallops;i++){
    const a=Math.PI*1.05 + (i/scallops)*Math.PI*0.92;
    const rr=(86+vnoise(i*3.1,id)*14)*t.s;
    const px2=cx+Math.cos(a)*rr, py2=cy-6*t.s+Math.sin(a)*rr*0.74;
    if (i===0) ctx.moveTo(px2,py2);
    else {
      const pa=Math.PI*1.05 + ((i-0.5)/scallops)*Math.PI*0.92;
      const prr=(96+vnoise(i*3.1+7,id)*12)*t.s;
      ctx.quadraticCurveTo(cx+Math.cos(pa)*prr, cy-6*t.s+Math.sin(pa)*prr*0.8, px2, py2);
    }
  }
  ctx.stroke();
  ctx.globalAlpha=1;
}

function drawCar(ctx, c){
  const id=c.id, x=c.x, y=c.y;
  const W2=c.suv?54:48, H2=c.suv?-34:-26;
  ctx.fillStyle=c.col;
  ctx.beginPath();
  ctx.moveTo(x-W2, y);
  ctx.lineTo(x-W2, y+H2*0.55);
  if (c.suv){ ctx.lineTo(x-W2+8, y+H2); ctx.lineTo(x+W2-10, y+H2); }
  else { ctx.lineTo(x-W2*0.5, y+H2*0.6); ctx.lineTo(x-W2*0.3, y+H2); ctx.lineTo(x+W2*0.42, y+H2); ctx.lineTo(x+W2*0.62, y+H2*0.6); }
  ctx.lineTo(x+W2, y+H2*0.55);
  ctx.lineTo(x+W2, y);
  ctx.closePath(); ctx.fill();
  ctx.save(); ctx.clip();
  ctx.globalAlpha=0.18; ctx.fillStyle='#ffffff';
  ctx.fillRect(x-W2, y+H2, W2*2, -H2*0.4);
  ctx.restore(); ctx.globalAlpha=1;
  // windows
  ctx.fillStyle='#c8d4da';
  if (c.suv) ctx.fillRect(x-W2+12, y+H2+4, W2*2-26, 12);
  else ctx.fillRect(x-W2*0.42, y+H2+3, W2*0.95, 9);
  // wheels
  for (const off of [-W2*0.55, W2*0.55]){
    ctx.fillStyle='#2e2a26';
    ctx.beginPath(); ctx.arc(x+off, y, 8.5, 0, 7); ctx.fill();
    ctx.fillStyle='#b0a48c';
    ctx.beginPath(); ctx.arc(x+off, y, 3.6, 0, 7); ctx.fill();
  }
  wob(ctx, [[x-W2,y],[x-W2,y+H2*0.55],[x-W2+(c.suv?8:14),y+H2],[x+W2-(c.suv?10:18),y+H2],[x+W2,y+H2*0.55],[x+W2,y]], id, {w:1.4});
}

function drawLamp(ctx, x, y, id){
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=2.6;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y-104); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y-104); ctx.quadraticCurveTo(x+2, y-116, x+14, y-116); ctx.stroke();
  ctx.fillStyle='#3a3f46';
  ctx.beginPath(); ctx.moveTo(x+6,y-116); ctx.lineTo(x+22,y-116); ctx.lineTo(x+19,y-104); ctx.lineTo(x+9,y-104); ctx.closePath(); ctx.fill();
  ctx.fillStyle=PAL.lampAmber; ctx.globalAlpha=0.9;
  ctx.fillRect(x+10.5, y-112, 7, 7);
  ctx.globalAlpha=1;
}

function drawTempleFront(ctx, x, w, hgt, id, opts){
  opts=opts||{};
  const colH=hgt*0.6, entH=hgt*0.1;
  // steps
  ctx.fillStyle='#ddd2b8';
  ctx.fillRect(x-w/2-10, -8, w+20, 8);
  ctx.fillRect(x-w/2-5, -14, w+10, 6);
  // shadowed portico interior
  ctx.fillStyle='#b9ad92';
  ctx.fillRect(x-w/2, -colH-14, w, colH);
  // door in the shadow
  ctx.fillStyle='#54432f';
  ctx.fillRect(x-w*0.08, -14-w*0.22, w*0.16, w*0.22);
  // columns: real white columns with gaps
  const n=opts.cols||4;
  const colW=w/(n*1.9);
  for (let i=0;i<n;i++){
    const cx=x-w/2 + (i+0.5)*w/n;
    ctx.fillStyle=PAL.colonnade;
    ctx.fillRect(cx-colW/2, -colH-12, colW, colH-2);
    ctx.strokeStyle='rgba(58,47,38,0.5)'; ctx.lineWidth=1;
    ctx.strokeRect(cx-colW/2, -colH-12, colW, colH-2);
  }
  // entablature + pediment
  ctx.fillStyle=PAL.colonnade;
  ctx.fillRect(x-w/2-6, -colH-14-entH, w+12, entH+4);
  washPoly(ctx, [[x-w/2-8,-colH-14-entH],[x+w/2+8,-colH-14-entH],[x,-hgt-14]], PAL.colonnade, id);
  wob(ctx, [[x-w/2-8,-colH-14-entH],[x,-hgt-14],[x+w/2+8,-colH-14-entH],[x-w/2-8,-colH-14-entH]], id, {w:1.5});
  wob(ctx, [[x-w/2-6,-colH-10],[x+w/2+6,-colH-10]], id+3, {w:1.2, alpha:0.7});
  if (opts.cupola){
    ctx.fillStyle=PAL.colonnade;
    ctx.fillRect(x-10, -hgt-36, 20, 22);
    ctx.strokeStyle='rgba(58,47,38,0.5)'; ctx.lineWidth=1;
    ctx.strokeRect(x-10, -hgt-36, 20, 22);
    washPoly(ctx, [[x-13,-hgt-36],[x+13,-hgt-36],[x,-hgt-54]], PAL.shutter, id+4);
    // Old George, the silent witness
    if (ART.detail>=1){
      ctx.fillStyle='#f7f1e2';
      ctx.fillRect(x-2.6, -hgt-68, 5.2, 13);
      ctx.beginPath(); ctx.arc(x, -hgt-71, 3.2, 0, 7); ctx.fill();
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=0.9;
      ctx.strokeRect(x-2.6, -hgt-68, 5.2, 13);
    }
  }
  if (opts.win) opts.win(x, -colH*0.5);
}

// ==== §11 WORLD ASSEMBLY ====================================================
const WORLD = { houses:[], trees:[], cars:[], lamps:[], glows:[], smokes:[], hillGlows:[], seedTag:'' };

function buildWorld(){
  WORLD.houses.length=0; WORLD.trees.length=0; WORLD.cars.length=0;
  WORLD.lamps.length=0; WORLD.glows.length=0; WORLD.smokes.length=0;
  const xs=[900, 1640, 2380, 3120, 3860];
  // seed shuffles which frat gets which lot (hero house stays on the Row)
  const order=V2FRATS.slice();
  for (let i=order.length-1;i>0;i--){ const j=Math.floor(rw()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
  order.forEach((frat,i)=>{
    const h={ x:xs[i], frat, id: 1000+i*137, smoke:null, win:()=>{} };
    WORLD.houses.push(h);
    for (let k=0;k<4;k++) WORLD.glows.push({band:'ROW', x:xs[i]-108+k*72, y:-168, kind:'window', hero:frat.hero});
    for (const off of [-108,-72,72,108]) WORLD.glows.push({band:'ROW', x:xs[i]+off, y:-66, kind:'window', hero:frat.hero});
    WORLD.glows.push({band:'ROW', x:xs[i], y:-96, kind:'lamp', hero:frat.hero});
  });
  WORLD.hero=WORLD.houses.find(h=>h.frat.hero);
  // downtown & river lights
  for (const sh of TOWN_SHOPS){
    WORLD.glows.push({band:'TOWN', x:sh.x-14, y:-sh.h+28, kind:'hillwin'});
    if (sh.kind==='cinema') WORLD.glows.push({band:'TOWN', x:sh.x, y:-sh.h+56, kind:'lamp'});
    if (sh.kind==='bar') WORLD.glows.push({band:'TOWN', x:sh.x, y:-22, kind:'lamp'});
  }
  for (const so of V2SORS){
    WORLD.glows.push({band:'TOWN', x:so.x-34, y:-72, kind:'window'});
    WORLD.glows.push({band:'TOWN', x:so.x+34, y:-72, kind:'window'});
  }
  for (const p of POLES){

function skyStops(hour){
  const st=PAL.sky.stops;
  let a=st[0], b=st[st.length-1];
  for (let i=0;i<st.length-1;i++) if (hour>=st[i][0] && hour<=st[i+1][0]){ a=st[i]; b=st[i+1]; break; }
  const t=(hour-a[0])/Math.max(0.001,b[0]-a[0]);
  return { top:hexLerp(a[1],b[1],t), hor:hexLerp(a[2],b[2],t), tint:hexLerp(a[3],b[3],t), glow:lerp(a[4],b[4],t), t };
}

function drawSky(ctx, sk, hour, rt){
  const grd=ctx.createLinearGradient(0,0,0,view.h*0.85);
  grd.addColorStop(0, sk.top); grd.addColorStop(1, sk.hor);
  ctx.fillStyle=grd; ctx.fillRect(0,0,view.w,view.h);
  // stars
  const night=hour<5.6||hour>20.2;
  if (night||sk.glow>0.75){
    ctx.globalAlpha=clamp((sk.glow-0.6)*2.4,0,0.9);
    ctx.drawImage(STARS, 0,0, view.w, view.h*0.5);
    ctx.globalAlpha=1;
  }
  // sun / moon
  const dayT=clamp((hour-6.2)/13.4,0,1);
  if (dayT>0 && dayT<1){
    const sx=view.w*(0.12+0.76*dayT) - (CAM.x-2400)*0.02;
    const sy=view.h*0.62 - Math.sin(dayT*Math.PI)*view.h*0.5;
    ctx.fillStyle='rgba(255,236,190,0.9)';
    ctx.beginPath(); ctx.arc(sx,sy,26,0,7); ctx.fill();
    ctx.globalAlpha=0.35;
    ctx.beginPath(); ctx.arc(sx,sy,48,0,7); ctx.fill();
    ctx.globalAlpha=1;
  }
  if (night){
    const mT=clamp(((hour+3.8)%24)/9,0,1);
    const mx=view.w*(0.2+0.6*mT), my=view.h*0.34 - Math.sin(mT*Math.PI)*view.h*0.14;
    ctx.fillStyle='rgba(238,240,248,0.95)';
    ctx.beginPath(); ctx.arc(mx,my,17,0,7); ctx.fill();
    ctx.fillStyle=sk.top;
    ctx.beginPath(); ctx.arc(mx-7,my-4,15,0,7); ctx.fill();
  }
  // clouds drift with a hint of parallax
  for (const cl of CLOUDS){
    const cx=((cl.x + rt*cl.v - CAM.x*0.05) % (view.w+700)) - 350;
    ctx.globalAlpha=0.32;
    ctx.drawImage(cl.cv, cx, cl.y, 340*cl.s, 120*cl.s);
    ctx.globalAlpha=1;
  }
}

function glowAlpha(hour){
  if (hour>=17.4 && hour<19.6) return smoothstep(17.4,19.2,hour);
  if (hour>=19.6 || hour<5.4) return 1;
  if (hour>=5.4 && hour<7.2) return 1-smoothstep(5.4,7.0,hour);
  return 0;
}
function drawGlows(ctx, hour, rt){
  const ga=glowAlpha(hour);
  if (ga<=0.01) return;
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const all=WORLD.glows.concat(WORLD.hillGlows);
  for (const g of all){
    const band=BAND[g.band];
    const sx=projX(band, g.x);
    if (sx<-80||sx>view.w+80) continue;
    const sy=groundY(band)+g.y*CAM.z;
    const pty = (g.band==='ROW' && g.kind==='window' && typeof houseParty==='function') ? houseParty(g.x) : null;
    const lit = pty ? 1 : (g.kind==='lamp' ? 1 : (hash01(g.x, g.y, Math.floor(hour<12?hour+24:hour))<0.72 ? 1 : 0));
    if (!lit) continue;
    const flick = (0.92+vnoise(rt*0.8, g.x*0.13)*0.16) * (pty ? 1.15+0.18*Math.sin(rt*11+g.x) : 1);
    const r=(g.kind==='lamp'?46:g.kind==='hillwin'?15:34)*CAM.z*flick;
    ctx.globalAlpha=ga*(g.kind==='lamp'?0.75:g.kind==='hillwin'?0.3:0.6)*(g.hero?clamp(1-HERO.openT*1.1,0,1):1);
    ctx.drawImage(GLOWSPR, sx-r, sy-r, r*2, r*2);
    if (g.kind==='lamp'){
      ctx.globalAlpha=ga*0.28;
      ctx.drawImage(GLOWSPR, sx-r*1.4, groundY(band)+18*CAM.z-r*0.5, r*2.8, r);
    }
    if (g.kind==='window'){
      // the pane itself goes warm
      ctx.globalAlpha=ga*0.8*(g.hero?clamp(1-HERO.openT*1.1,0,1):1);
      ctx.fillStyle=PAL.windowGlow;
      const w=15*CAM.z, h2=21*CAM.z;
      ctx.fillRect(sx-w/2, sy-h2/2, w, h2);
    }
  }
  ctx.restore();
}

function drawFigure(ctx, f, rt){
  const stride=Math.sin(f.phase*6.6);
  const bob=Math.abs(Math.cos(f.phase*6.6))*1.6;
  ctx.save();
  ctx.scale(f.dir,1);
  // shadow
  ctx.fillStyle='rgba(58,47,38,0.18)';
  ctx.beginPath(); ctx.ellipse(0,1.5,11,3,0,0,7); ctx.fill();
  ctx.translate(0,-bob);
  // legs — khaki
  ctx.strokeStyle=f.female?'#7a6a5a':PAL.khaki;
  ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(6*stride, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(-6*stride, 0); ctx.stroke();
  // shoes
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(6*stride,0); ctx.lineTo(6*stride+3,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-6*stride,0); ctx.lineTo(-6*stride+3,0); ctx.stroke();
  if (f.female){
    // sundress silhouette
    ctx.fillStyle=f.polo;
    ctx.beginPath();
    ctx.moveTo(-8,-16); ctx.lineTo(8,-16); ctx.lineTo(5,-36); ctx.lineTo(-5,-36); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2; ctx.stroke();
  } else {
    // polo torso
    ctx.fillStyle=f.polo;
    ctx.beginPath();
    ctx.moveTo(-7,-16); ctx.lineTo(7,-16); ctx.lineTo(8,-36); ctx.lineTo(-8,-36); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2; ctx.stroke();
    // collar (popped, obviously)
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillRect(-5,-38,10,3.5);
  }
  // arms swing
  ctx.strokeStyle=f.female?f.polo:f.polo;
  ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(0,-33); ctx.lineTo(-7*stride, -20); ctx.stroke();
  ctx.strokeStyle=f.skin; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(-7*stride,-21); ctx.lineTo(-8*stride,-18); ctx.stroke();
  // head
  ctx.fillStyle=f.skin;
  ctx.beginPath(); ctx.arc(1,-46,10,0,7); ctx.fill();
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(1,-46,10,0,7); ctx.stroke();
  // hair / hat
  if (f.hat){
    ctx.fillStyle='#5a6a52';
    ctx.beginPath(); ctx.arc(1,-50,9.6,Math.PI,0); ctx.fill();
    ctx.fillRect(1,-51.5,13,3);
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(1,-50,9.6,Math.PI,0); ctx.stroke();
  } else if (f.female){
    ctx.fillStyle=f.hair;
    ctx.beginPath(); ctx.arc(1,-49,9.8,Math.PI*0.9,Math.PI*0.1); ctx.fill();
    ctx.fillRect(-9,-49,4,14); // ponytail-ish fall
  } else {
    ctx.fillStyle=f.hair;
    ctx.beginPath(); ctx.arc(1,-49.5,9.4,Math.PI*0.95,Math.PI*0.05); ctx.fill();
  }
  // face dot eyes when close
  if (CAM.z>0.85){

}

function figTick(dt, rt){
  dogTick(dt);

    if (f.x<380){ f.dir=1; } if (f.x>4620){ f.dir=-1; }
  }
  // the Speaking Tradition
  for (let i=0;i<FIGS.length;i++) for (let j=i+1;j<FIGS.length;j++){
    const a=FIGS[i],b=FIGS[j];
    if (a.dir===b.dir) continue;
    const d=Math.abs(a.x-b.x);
    if (d<34 && rt-a.lastHey>7 && rt-b.lastHey>7){
      a.lastHey=rt; b.lastHey=rt;
      addBubble(a, HEYS[Math.floor(hash01(a.id,b.id,Math.floor(rt))*HEYS.length)]);
      setTimeout(()=>{}, 0);
      addBubble(b, HEYS[Math.floor(hash01(b.id,a.id,Math.floor(rt)+1)*HEYS.length)], 1.5);
    }
  }

  const band=BAND.ROW, gy=groundY(band);
  for (const f of FIGS){
    const sx=projX(band, f.x);
    if (sx<-60||sx>view.w+60) continue;
    ctx.save();
    ctx.translate(sx, gy+f.gy*CAM.z);
    ctx.scale(CAM.z, CAM.z);
    drawFigure(ctx, f, rt);
    ctx.restore();
  }
}
function drawBubbles(ctx){
  const now=performance.now()/1000;
  const band=BAND.ROW, gy=groundY(band);
  for (let i=BUBBLES.length-1;i>=0;i--){
    const b=BUBBLES[i];
    const age=now-b.t0;
    if (age>b.dur){ BUBBLES.splice(i,1); continue; }
    const f=b.fig;
    const sx=projX(band,f.x), sy=gy+(f.gy-62)*CAM.z;
    if (sx<-80||sx>view.w+80) continue;
    const a=age<0.15?age/0.15 : age>b.dur-0.3 ? (b.dur-age)/0.3 : 1;
    ctx.save();
    ctx.globalAlpha=a;
    ctx.font='italic 12.5px Georgia, serif';
    const w=ctx.measureText(b.txt).width;
    const bx=sx-w/2-8, by=sy-30, bw=w+16, bh=21;
    ctx.fillStyle='rgba(250,243,226,0.95)';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(bx,by,bw,bh,9); else ctx.rect(bx,by,bw,bh);
    ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2;
    wob(ctx, [[bx,by+bh*0.5],[bx+3,by],[bx+bw-3,by],[bx+bw,by+bh*0.5],[bx+bw-3,by+bh],[bx+3,by+bh],[bx,by+bh*0.5]], b.fig.id*7+Math.floor(b.t0), {w:1.1});
    // tail
    wob(ctx, [[sx-2,by+bh],[sx,by+bh+7]], b.fig.id*9, {w:1.1});
    ctx.fillStyle=PAL.ink;
    ctx.fillText(b.txt, bx+8, by+15);
    ctx.restore();
  }
}
// chimney smoke + birds (ambient decoration)
function drawSmoke(ctx, rt){
  const band=BAND.ROW, gy=groundY(band);
  for (const h of WORLD.houses){
    if (!h.smoke) continue;
    if (hash01(h.id,44)<0.3) continue;   // not every chimney smokes
    const sx=projX(band,h.smoke[0]);
    if (sx<-100||sx>view.w+100) continue;
    const sy=gy+h.smoke[1]*CAM.z;
    ctx.fillStyle='rgba(220,212,198,0.4)';
    for (let i=0;i<4;i++){
      const t=((rt*0.16)+i*0.25+hash01(h.id,i)*0.2)%1;
      const px=sx+Math.sin((t*4+h.id)*1.8)*10*CAM.z*(0.5+t);
      const py=sy-t*66*CAM.z;
      const r=(4+t*9)*CAM.z;
      ctx.globalAlpha=0.35*(1-t);
      ctx.beginPath(); ctx.arc(px,py,r,0,7); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}
let BIRDS={t:-10, x:0, y:0};
function drawBirds(ctx, rt){
  if (rt-BIRDS.t>26){ BIRDS={t:rt, x:-100, y:80+Math.random()*160, n:2+Math.floor(Math.random()*3)}; }
  const age=rt-BIRDS.t;
  const bx=-100+age*90;
  if (bx>view.w+100) return;
  ctx.strokeStyle='rgba(58,47,38,0.75)'; ctx.lineWidth=1.6;
  for (let i=0;i<BIRDS.n;i++){
    const px=bx-i*26, py=BIRDS.y+Math.sin((rt*3+i))*4+i*7;
    const fl=Math.sin(rt*9+i*2)*3;
    ctx.beginPath();
    ctx.moveTo(px-6,py-fl); ctx.quadraticCurveTo(px,py+2,px,py);
    ctx.quadraticCurveTo(px,py+2,px+6,py-fl);
    ctx.stroke();
  }
}

const view={w:0,h:0,dpr:1};
let cv, cx2d;
function resize(){
  view.dpr=Math.min(window.devicePixelRatio||1, 2);
  view.w=window.innerWidth; view.h=window.innerHeight;
  cv.width=view.w*view.dpr; cv.height=view.h*view.dpr;
  cv.style.width=view.w+'px'; cv.style.height=view.h+'px';
}
function bindInput(){
  let dragging=false,lx=0;
  cv.addEventListener('pointerdown',e=>{ dragging=true; lx=e.clientX; cv.classList.add('dragging'); cv.setPointerCapture(e.pointerId); });
  cv.addEventListener('pointerup',()=>{ dragging=false; cv.classList.remove('dragging'); });
  cv.addEventListener('pointermove',e=>{
    if (!dragging) return;
    const dx=e.clientX-lx; lx=e.clientX;
    CAM.tx=clamp(CAM.tx - dx/(CAM.z*BAND.ROW.pf), CAM.minX, CAM.maxX);
  });
  cv.addEventListener('wheel',e=>{
    e.preventDefault();
    const oldZ=CAM.tz;
    CAM.tz=clamp(CAM.tz*Math.exp(-e.deltaY*0.0013), CFG.ZMIN, CFG.ZMAX);
    // zoom toward the cursor (ROW band anchor)
    const wx=(e.clientX-view.w*0.5)/(oldZ)+CAM.tx*BAND.ROW.pf;
    CAM.tx=clamp((wx-(e.clientX-view.w*0.5)/CAM.tz)/BAND.ROW.pf, CAM.minX, CAM.maxX);
  },{passive:false});
  window.addEventListener('resize', resize);
}
function updateHUD(){

function parseSeed(){
  const m=location.hash.match(/s=([A-Za-z0-9_-]+)/);
  if (m) return m[1];
  const s=Math.random().toString(36).slice(2,8);
  history.replaceState(null,'','#s='+s);
  return s;
}
window.addEventListener('hashchange',()=>location.reload());
let _lastT=0;
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min(0.1,(ts-_lastT)/1000||0.016);
  _lastT=ts;
  const rt=ts/1000;
  TILES.bakedThisFrame=0;
  // clock
  CLOCK.frac+=dt*CLOCK.speed/15;
  while (CLOCK.frac>=1){ CLOCK.frac-=1; CLOCK.t++; }
  // camera easing
  const k=1-Math.exp(-dt*6);
  CAM.x+=(CAM.tx-CAM.x)*k; CAM.z+=(CAM.tz-CAM.z)*k;
  CAM.yStage=camYStage();
  figTick(dt, rt);
  // ---- draw
  const ctx=cx2d;
  ctx.setTransform(view.dpr,0,0,view.dpr,0,0);
  const hour=CLOCK.hourFloat()%24;
  const sk=skyStops(hour);
  drawSky(ctx, sk, hour, rt);
  drawBirds(ctx, rt);
  stageHero();
  stageOthers();
  HIT.length=0;
  // hero house focus/open amount
  {
    const sxc=projX(BAND.ROW, HERO.h.x);
    const focus=1-clamp((Math.abs(sxc-view.w*0.5)-view.w*0.22)/(view.w*0.4),0,1);
    const target=smoothstep(1.35,2.05,CAM.z)*focus;
    HERO.openT+=(target-HERO.openT)*Math.min(1,dt*7);
  }
  for (const b of BANDS){
    drawBandTiles(ctx, b);
    if (b.id==='ROW'){
      const openT=HERO.openT;
      // world-space dynamic drawing for the hero house
      const wx=()=>ctx.setTransform(view.dpr*CAM.z,0,0,view.dpr*CAM.z,
        view.dpr*(view.w*0.5-CAM.x*b.pf*CAM.z), view.dpr*groundY(b));
      artForBucket(clamp(CAM.z,0.5,2.5));
      if (openT>0.02){ wx(); drawHeroShell(ctx, rt); }
      ctx.setTransform(view.dpr,0,0,view.dpr,0,0);
      drawHeroActors(ctx, rt, openT);
      if (openT<0.97){
        wx();
        ctx.globalAlpha=1-openT;
        drawFratHouse(ctx, WORLD.hero);
        ctx.globalAlpha=1;
      }
      artForBucket(1);
      ctx.setTransform(view.dpr,0,0,view.dpr,0,0);
      drawSmoke(ctx, rt);
      drawOthers(ctx, rt);
      drawParties(ctx, rt);
      drawFigures(ctx, rt);
      drawDog(ctx);
    }
  }
  drawWorldBubbles(ctx);
  // day tint (multiply), feathered off the sky so dusk doesn't double-dip
  if (sk.tint!=='#ffffff'){
    ctx.globalCompositeOperation='multiply';
    const horizon=groundY(BAND.RIDGE)-120*CAM.z;
    const tg=ctx.createLinearGradient(0,Math.max(0,horizon-140),0,Math.max(1,horizon+90));
    tg.addColorStop(0,'rgba(255,255,255,1)');
    tg.addColorStop(1,sk.tint);
    ctx.fillStyle=tg;
    ctx.fillRect(0,0,view.w,view.h);
    ctx.globalCompositeOperation='source-over';
  }
  if (HERO.openT>0.05){
    const ga2=glowAlpha(hour);
    if (ga2>0.02){
      ctx.save();
      ctx.setTransform(view.dpr*CAM.z,0,0,view.dpr*CAM.z,
        view.dpr*(view.w*0.5-CAM.x*BAND.ROW.pf*CAM.z), view.dpr*groundY(BAND.ROW));
      ctx.globalCompositeOperation='lighter';
      for (const r of HERO.rooms){
        if (r.outdoor) continue;
        ctx.fillStyle='rgba(255,186,104,'+(0.13*HERO.openT*ga2)+')';
        ctx.fillRect(r.x, r.floorY-r.h, r.w, r.h);
      }
      ctx.restore();
    }
  }
  drawGlows(ctx, hour, rt);
  drawBubbles(ctx);
  // paper grain + soft vignette
  ctx.save();
  ctx.globalCompositeOperation='overlay';
  ctx.globalAlpha=0.5;
  ctx.fillStyle=ctx.createPattern(GRAIN,'repeat');
  ctx.fillRect(0,0,view.w,view.h);
  ctx.restore();
  const vg=ctx.createRadialGradient(view.w/2,view.h/2,view.h*0.42,view.w/2,view.h/2,view.h*0.95);
  vg.addColorStop(0,'rgba(58,47,38,0)');
  vg.addColorStop(1,'rgba(58,47,38,0.10)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,view.w,view.h);
  dialDraw();
  updateHUD();
  DBG.frames++;
}

function newPerson(kind, orgKey, classYear, rnd){
  const male = kind!=='SOROR' && kind!=='COOK';
  const g=(n)=>hash01(PEOPLE.length*17.13, n*7.7);
  const first = kind==='COOK' ? COOK_NAMES[Math.floor(rnd()*COOK_NAMES.length)] : male? M_FIRST[Math.floor(rnd()*M_FIRST.length)] : F_FIRST[Math.floor(rnd()*F_FIRST.length)];
  const last = kind==='COOK' ? '' : SURNAMES[Math.floor(rnd()*SURNAMES.length)];
  const nick = (male && kind==='BROTHER' && rnd()<0.4) ? NICKNAMES[Math.floor(rnd()*NICKNAMES.length)] : null;
  const p={
    pid:PEOPLE.length, kind, orgKey, classYear,
    first, last, nick, name: nick||first,
    full: kind==='COOK' ? first : (nick? first+' “'+nick+'” '+last : first+' '+last),
    skin: SKINS[Math.floor(g(1)*SKINS.length)],
    hair: HAIRS[Math.floor(g(2)*HAIRS.length)],
    polo: PAL.polos[Math.floor(g(3)*PAL.polos.length)],
    hat: g(8)<0.2, female: !male,
    tag: null, mentions:0,
  };
  PEOPLE.push(p);
  return p;
}
function classTag(p){
  const d=CLOCK.derive();
  const yr=(2000+((SEEDH>>>3)%5)-1)+d.year+(4-p.classYear)+1;
  return "’0"+(yr%10);
}
function knownFor(p){ return p.tag ? TAG_KNOWN[p.tag] : (p.kind==='COOK'?'running this kitchen since before you were born':'general good standing'); }

function buildRosters(){
  for (const h of WORLD.houses){
    h.roster=[];
    const isHero=h.frat.hero;
    for (let cy=1;cy<=4;cy++){
      const n=isHero?7:5;
      for (let i=0;i<n;i++){
        const p=newPerson('BROTHER', h.frat.key, cy, RNG.name);
        h.roster.push(p.pid);
      }
    }
    // routine tags: hero house gets the full cast of characters
    const bros=h.roster.map(pid=>PEOPLE[pid]);
    const tagPool = isHero ? TAGS.slice() : ['napper','porchFixture','auxHog','pokerShark','gymRat'];
    let ti=0;
    for (const p of bros){
      if (hash01(p.pid,5)<(isHero?0.7:0.3) && ti<tagPool.length){
        p.tag=tagPool[ti++];
      }
    }
    // the boys' factions live in the tags: noodler/tapehead = stoner mystics,
    // movieNerd/riffKing = the Core society
    if (isHero){ h.cook = newPerson('COOK', h.frat.key, 0, RNG.name); }
  }
}

// ==== §7 POSE RIG ===========================================================
// One little body, many poses. All draw at ground anchor, y-up negative,
// scaled by caller. dir=±1. f = anim phase 0..1.
function rigCore(ctx, p, opts){
  opts=opts||{};
  // torso + head + hair; limbs are the pose's job
  const tor=opts.torsoAt||[0,-16];
  ctx.save();
  ctx.translate(tor[0], 0);
  if (p.female){
    ctx.fillStyle=p.polo;
    ctx.beginPath(); ctx.moveTo(-8,tor[1]); ctx.lineTo(8,tor[1]); ctx.lineTo(5,tor[1]-20); ctx.lineTo(-5,tor[1]-20); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2; ctx.stroke();
  } else if (p.kind==='COOK'){
    ctx.fillStyle='#e8e2d2';
    ctx.beginPath(); ctx.moveTo(-9,tor[1]); ctx.lineTo(9,tor[1]); ctx.lineTo(8,tor[1]-21); ctx.lineTo(-8,tor[1]-21); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2; ctx.stroke();
    ctx.fillStyle='#c05a4a'; ctx.fillRect(-6,tor[1]-8,12,6); // apron bib
  } else {
    ctx.fillStyle=p.polo;
    ctx.beginPath(); ctx.moveTo(-7,tor[1]); ctx.lineTo(7,tor[1]); ctx.lineTo(8,tor[1]-20); ctx.lineTo(-8,tor[1]-20); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2; ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillRect(-5,tor[1]-22,10,3.5);   // the collar, popped
  }
  // head
  const hy=tor[1]-30;
  ctx.fillStyle=p.skin;
  ctx.beginPath(); ctx.arc(1,hy,10,0,7); ctx.fill();
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(1,hy,10,0,7); ctx.stroke();
  if (p.hat && !p.female && p.kind!=='COOK'){
    ctx.fillStyle='#5a6a52';
    ctx.beginPath(); ctx.arc(1,hy-4,9.6,Math.PI,0); ctx.fill();
    ctx.fillRect(1,hy-5.5,13,3);
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(1,hy-4,9.6,Math.PI,0); ctx.stroke();
  } else if (p.female){
    ctx.fillStyle=p.hair;
    ctx.beginPath(); ctx.arc(1,hy-3,9.8,Math.PI*0.9,Math.PI*0.1); ctx.fill();
    ctx.fillRect(-9,hy-3,4,13);
  } else {
    ctx.fillStyle=p.hair;
    ctx.beginPath(); ctx.arc(1,hy-3.5,9.4,Math.PI*0.95,Math.PI*0.05); ctx.fill();
  }
  if (CAM.z>1.1){
    ctx.fillStyle=PAL.ink;
    ctx.beginPath(); ctx.arc(5,hy-1,1.1,0,7); ctx.fill();
  }
  ctx.restore();
  return hy;
}
function legsStand(ctx, p, sway){
  ctx.strokeStyle=p.female?'#7a6a5a':PAL.khaki; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(-4+(sway||0),0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(4+(sway||0),0); ctx.stroke();
}
function armsDown(ctx, p){
  ctx.strokeStyle=p.polo; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-5,-33); ctx.lineTo(-8,-20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,-33); ctx.lineTo(8,-20); ctx.stroke();
}
const POSES = {
  stand(ctx,p,f){ legsStand(ctx,p,Math.sin(f*6.28)*0.6); rigCore(ctx,p); armsDown(ctx,p); },
  talk(ctx,p,f){
    legsStand(ctx,p,0); rigCore(ctx,p);
    ctx.strokeStyle=p.polo; ctx.lineWidth=4; ctx.lineCap='round';

    ctx.beginPath(); ctx.moveTo(7,-8); ctx.lineTo(7,0); ctx.stroke();
    rigCore(ctx,p,{torsoAt:[0,-14]});
    ctx.strokeStyle=p.polo; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(3,-30); ctx.lineTo(9,-22); ctx.stroke();
  },
  couch(ctx,p,f){ // slumped low
    ctx.strokeStyle=p.female?'#7a6a5a':PAL.khaki; ctx.lineWidth=5; ctx.lineCap='round';

// ==== §13b WORLD BUBBLES & HOVER ===========================================
// generalized bubbles: anchor = {band, wx, wy} world point
const WBUB=[];
function sayAt(band, wx, wy, txt, opts){
  opts=opts||{};
  if (WBUB.length>7) WBUB.shift();
  WBUB.push({band, wx, wy, txt, t0:performance.now()/1000, dur:opts.dur||3.4, think:opts.think});
}
function drawWorldBubbles(ctx){
  const now=performance.now()/1000;
  for (let i=WBUB.length-1;i>=0;i--){
    const b=WBUB[i];
    const age=now-b.t0;
    if (age>b.dur){ WBUB.splice(i,1); continue; }
    const band=BAND[b.band];
    const sx=projX(band,b.wx), sy=groundY(band)+b.wy*CAM.z;
    if (sx<-140||sx>view.w+140) continue;
    const a=age<0.18?age/0.18 : age>b.dur-0.35 ? (b.dur-age)/0.35 : 1;
    ctx.save();
    ctx.globalAlpha=a;
    ctx.font='italic 13px Georgia, serif';
    const w=Math.min(240, ctx.measureText(b.txt).width);
    const lines=wrapText(ctx, b.txt, 240);
    const bw=Math.max(...lines.map(l=>ctx.measureText(l).width))+18;
    const bh=lines.length*16+10;
    const bx=clamp(sx-bw/2, 8, view.w-bw-8), by=sy-bh-14;
    ctx.fillStyle='rgba(250,243,226,0.96)';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(bx,by,bw,bh,10); else ctx.rect(bx,by,bw,bh);
    ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2;
    ctx.stroke();
    if (b.think){
      ctx.fillStyle='rgba(250,243,226,0.96)';
      ctx.beginPath(); ctx.arc(sx-3, by+bh+5, 3, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(sx, by+bh+10, 2, 0, 7); ctx.fill();
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=0.9;
      ctx.beginPath(); ctx.arc(sx-3, by+bh+5, 3, 0, 7); ctx.stroke();
      ctx.beginPath(); ctx.arc(sx, by+bh+10, 2, 0, 7); ctx.stroke();
    } else {
      wob(ctx, [[clamp(sx-4,bx+6,bx+bw-10),by+bh],[clamp(sx,bx+8,bx+bw-8),by+bh+8]], i*13, {w:1.1});
    }
    ctx.fillStyle=PAL.ink;
    lines.forEach((l,li)=> ctx.fillText(l, bx+9, by+16+li*16));
    ctx.restore();
  }
}
const _wrapCache=new Map();
function wrapText(ctx, txt, maxW){
  const key=txt+'|'+maxW;
  let r=_wrapCache.get(key);
  if (r) return r;
  const words=txt.split(' ');
  const lines=[]; let cur='';
  for (const w of words){
    const t=cur?cur+' '+w:w;
    if (ctx.measureText(t).width>maxW && cur){ lines.push(cur); cur=w; }
    else cur=t;
  }
  if (cur) lines.push(cur);
  if (_wrapCache.size>400) _wrapCache.clear();
  _wrapCache.set(key,r=lines);
  return r;
}
// hover
const HIT=[];
const HOVER={ cur:null, el:null };
function hoverInit(){
  const el=document.createElement('div');
  el.id='hovercard';
  document.body.appendChild(el);
  HOVER.el=el;
  window.addEventListener('mousemove', e=>{
    let best=null, bd=30*30;
    for (const h of HIT){
      const d=(h.sx-e.clientX)*(h.sx-e.clientX)+(h.sy-e.clientY)*(h.sy-e.clientY);
      if (d<bd){ bd=d; best=h; }
    }
    if (best){
      const p=PEOPLE[best.pid];
      el.innerHTML='<b>'+p.full+(p.kind==='COOK'?'':' '+classTag(p))+'</b><br><span>'+
        (p.kind==='COOK' ? 'runs this kitchen' : (WORLD.houses.find(x=>x.frat.key===p.orgKey)||{frat:{letters:''}}).frat.letters)+
        (p.tag||p.kind==='COOK' ? ' · known for: '+knownFor(p) : '')+'</span>';
      el.style.display='block';
      el.style.left=Math.min(view.w-240, e.clientX+14)+'px';
      el.style.top=(e.clientY-8)+'px';
      HOVER.cur=best.pid;
    } else { el.style.display='none'; HOVER.cur=null; }
  });
}

function heroBlock(){ // 6 blocks/day like the plan
  const hr=CLOCK.derive().hour;
  return hr<6?0:hr<9?1:hr<13?2:hr<18?3:hr<22?4:5;
}
function vigEligible(v, d){
  const hr=d.hour<6 ? d.hour+24 : d.hour;   // late night wraps
  if (v.dows && !v.dows.includes(d.dow)) return false;
  return hr>=v.when[0] && hr<v.when[1];
}
function stageHero(){
  const d=CLOCK.derive();
  const block=heroBlock()+d.dayAbs*6;
  if (block===HERO.lastBlock) return;
  HERO.lastBlock=block;
  HERO.staged={};
  const roster=HERO.h.roster.map(pid=>PEOPLE[pid]);
  const used=new Set();
  for (const room of HERO.rooms){
    const pool=VIGS.filter(v=>v.room===room.id && vigEligible(v,d));
    if (!pool.length) continue;
    // weighted deterministic pick
    let tw=0; for (const v of pool) tw+=v.wt||1;
    let roll=hash01(d.dayAbs, block, room.x, 1)*tw;
    let pick=pool[0];
    for (const v of pool){ roll-=(v.wt||1); if (roll<=0){ pick=v; break; } }
    if (hash01(d.dayAbs, block, room.x, 2) < 0.22 && room.id!=='porch') continue; // some rooms just sit empty — houses breathe
    // cast
    const cast=[];
    let ok=true;
    pick.cast.forEach((c,ci)=>{
      let p=null;
      if (c.cook && HERO.h.cook){ p=HERO.h.cook; }
      else {
        const tagged=roster.filter(x=>!used.has(x.pid) && c.tag && x.tag===c.tag);
        const anyone=roster.filter(x=>!used.has(x.pid) && !x.female);
        const from=tagged.length?tagged:anyone;
        if (!from.length){ ok=false; return; }
        p=from[Math.floor(hash01(d.dayAbs, block, room.x, 3+ci)*from.length)];
      }
      used.add(p.pid);
      cast.push(p.pid);
    });
    if (!ok) continue;
    HERO.staged[room.id]={ vig:pick, cast, t0:performance.now()/1000, fired:{} };
  }
}
function drawHeroActors(ctx, rt, openT){
  const band=BAND.ROW;

    if (!st) continue;
    const interiorAlpha=room.outdoor?1:openT;
    if (interiorAlpha<=0.02) continue;
    // chapter secret: no actors visible
    const d=CLOCK.derive();
    if (room.id==='chapter' && d.dow===0 && d.hour>=20.5) continue;
    ctx.save();
    ctx.globalAlpha=interiorAlpha;
    st.vig.cast.forEach((c,ci)=>{
      const p=PEOPLE[st.cast[ci]];
      if (!p) return;
      const ax=room.x + room.w/2 + c.dx;   // authored dx is relative to room center
      const fy=room.floorY;
      const sx=projX(band, ax);
      if (sx<-80||sx>view.w+80) return;
      const sy=groundY(band)+fy*CAM.z;
      ctx.save();
      ctx.translate(sx,sy);
      ctx.scale(CAM.z*(c.face||1), CAM.z);
      const f=(rt*0.5 + ci*0.37 + hash01(p.pid)*0.9)%1;
      (POSES[c.pose]||POSES.stand)(ctx, p, f);
      ctx.restore();
      HIT.push({pid:p.pid, sx, sy:sy-46*CAM.z});
    });
    ctx.restore();
    // scripted bubbles (only when actually watching)
    if (interiorAlpha>0.35 && CAM.z>0.5){
      const loopLen=34;
      const el=(rt-st.t0)%loopLen;
      for (let si=0; si<(st.vig.script||[]).length; si++){
        const line=st.vig.script[si];
        const kk=Math.floor((rt-st.t0)/loopLen)+':'+si;
        if (el>=line.at && !st.fired[kk]){
          st.fired[kk]=1;
          const p=PEOPLE[st.cast[line.ci]];
          if (p){
            const variants=line.t;
            let txt=variants[Math.floor(hash01(p.pid, si, Math.floor(rt/loopLen))*variants.length)];
            txt=txt.replace('{n}', ''+(2+Math.floor(hash01(p.pid)*4)));
            const ax=room.x+room.w/2+st.vig.cast[line.ci].dx;
            sayAt('ROW', ax, room.floorY-58, txt, {think:line.think, dur:4.2});
            p.mentions++;
          }
        }
      }
    }
  }
}

function drawShop(ctx, sh){
  const x=sh.x, w=sh.w, h=sh.h, id=9000+x;
  washRect(ctx, x-w/2, -h, w, h, sh.col, id);
  wobRect(ctx, x-w/2, -h, w, h, id, {w:1.7});
  // parapet
  ctx.fillStyle=shade(sh.col,0.82);
  ctx.fillRect(x-w/2-3, -h-7, w+6, 7);
  wob(ctx,[[x-w/2-3,-h-7],[x+w/2+3,-h-7]],id+1,{w:1.4});
  // display window + door
  ctx.fillStyle='#c8d4da';
  ctx.fillRect(x-w/2+8, -34, w*0.5, 26);
  wobRect(ctx, x-w/2+8, -34, w*0.5, 26, id+2, {w:1.2});
  ctx.fillStyle='#54432f';
  ctx.fillRect(x+w/2-24, -34, 16, 34);
  wobRect(ctx, x+w/2-24, -34, 16, 34, id+3, {w:1.2});
  // upstairs windows
  for (let i=0;i<Math.floor(w/44);i++){
    const wx=x-w/2+24+i*44;
    ctx.fillStyle='#5a6a7a';
    ctx.fillRect(wx-8,-h+18,16,20);
    wobRect(ctx, wx-8,-h+18,16,20, id+4+i, {w:1.1});
  }
  // awning or marquee
  if (sh.kind==='cinema'){
    ctx.fillStyle='#e8e0cc';
    ctx.fillRect(x-w/2+4, -h+46, w-8, 22);
    wobRect(ctx, x-w/2+4, -h+46, w-8, 22, id+8, {w:1.4});
    jitterText(ctx, sh.name, x, -h+61, 13, id+9, {align:'center', style:'bold'});
    ctx.fillStyle='#c9a227';
    for (let i=0;i<9;i++){ ctx.beginPath(); ctx.arc(x-w/2+10+i*(w-20)/8, -h+43, 1.6, 0, 7); ctx.fill(); }
  } else {
    const aw=['#7a2c22','#27406b','#1f5c38'][x%3];
    ctx.fillStyle=aw;
    ctx.beginPath();
    ctx.moveTo(x-w/2+4,-40); ctx.lineTo(x+w/2-4,-40); ctx.lineTo(x+w/2-10,-30); ctx.lineTo(x-w/2+10,-30); ctx.closePath(); ctx.fill();
    wob(ctx,[[x-w/2+4,-40],[x+w/2-4,-40]],id+8,{w:1.2});
    jitterText(ctx, sh.name, x, -h+30, 8.5, id+9, {align:'center', col:'#efe7d2'});
  }
}
function drawSorHouse(ctx, so){
  const x=so.x, id=9500+x, W=200, H=120;
  washRect(ctx, x-W/2, -H, W, H, '#f0e8d8', id);
  wobRect(ctx, x-W/2, -H, W, H, id, {w:1.7});

  ctx.fillStyle=so.col;
  ctx.fillRect(x-W/2, -H-4, W, 5);
  washPoly(ctx, [[x-W/2-12,-H],[x+W/2+12,-H],[x,-H-44]], '#e8e0d0', id+1);
  wob(ctx, [[x-W/2-12,-H],[x,-H-44],[x+W/2+12,-H],[x-W/2-12,-H]], id+1, {w:1.6});
  for (let i=0;i<4;i++){
    const wx=x-W/2+34+i*(W-68)/3;
    ctx.fillStyle='#5a6a7a'; ctx.fillRect(wx-11,-86,22,28);
    ctx.fillStyle=so.col; ctx.fillRect(wx-16,-86,4,28); ctx.fillRect(wx+12,-86,4,28);
    wobRect(ctx, wx-11,-86,22,28, id+3+i, {w:1.1});
  }
  // porch
  ctx.fillStyle='#e8e0d0';
  ctx.fillRect(x-W/2-4, -18, W+8, 7);
  for (let i=0;i<4;i++){
    const cx=x-W/2+14+i*(W-28)/3;
    ctx.fillStyle='#f0ece0'; ctx.fillRect(cx-3.4,-52,6.8,36);

  ctx.fillStyle='#e8e0d0'; ctx.fillRect(x-W/2-6,-56,W+12,7);
  ctx.fillStyle='#54432f'; ctx.fillRect(x-11,-46,22,28);

function drawPoleHouse(ctx, p){

  ctx.strokeStyle='#8a7862'; ctx.lineWidth=1.6;
  for (let i=0;i<=8;i++){ ctx.beginPath(); ctx.moveTo(x-64+i*16,-40); ctx.lineTo(x-64+i*16,-52); ctx.stroke(); }
  ctx.beginPath(); ctx.moveTo(x-64,-52); ctx.lineTo(x+64,-52); ctx.stroke();
  washRect(ctx, x-46, -96, 92, 56, '#a08a68', id+1);
  wobRect(ctx, x-46, -96, 92, 56, id+1, {w:1.6});

  ctx.fillStyle='#5a6a7a'; ctx.fillRect(x-30,-84,20,18);
  wobRect(ctx, x-30,-84,20,18, id+3,{w:1.1});
  ctx.fillStyle='#54432f'; ctx.fillRect(x+8,-82,16,42);

  ctx.strokeStyle='#9a8a72'; ctx.lineWidth=3;

// ==== §14b GENERIC PORCH LIFE (every house breathes) ========================
const GENERIC_PORCH=[
  { poses:['couch','couch'], dx:[104,128], lines:['The porch is undefeated.','You can see everything from here. Everything.','(supervising the street)'] },
  { poses:['talk','talk'], dx:[-96,-70], lines:['There he is!','What’s goin’ on, big guy.','Tell him about the fish. Tell him.'] },
  { poses:['drink','couch'], dx:[96,124], lines:['To Tuesday. A quiet giant.','This railing has held better men than us.'] },
  { poses:['guitar','sit'], dx:[-100,-72], lines:['(the opening chords of something everyone knows)','One more verse. There’s always one more verse.'] },
];
const OTHERSTAGE={ last:-1, staged:[] };
function stageOthers(){
  const d=CLOCK.derive();
  const block=heroBlock()+d.dayAbs*6;
  if (block===OTHERSTAGE.last) return;
  OTHERSTAGE.last=block;
  OTHERSTAGE.staged=[];
  for (const h of WORLD.houses){
    if (h.frat.hero) continue;
    const hr=d.hour;
    const active=(hr>=12 && hr<24) && hash01(d.dayAbs, block, h.x)<0.62;
    if (!active) continue;
    const g=GENERIC_PORCH[Math.floor(hash01(d.dayAbs, block, h.x, 2)*GENERIC_PORCH.length)];
    const roster=h.roster.map(pid=>PEOPLE[pid]);
    const cast=[];
    for (let i=0;i<g.poses.length;i++){
      const p=roster[Math.floor(hash01(d.dayAbs, block, h.x, 3+i)*roster.length)];
      cast.push(p.pid);
    }
    OTHERSTAGE.staged.push({h, g, cast, t0:performance.now()/1000, fired:{}});
  }
}
function drawOthers(ctx, rt){
  const band=BAND.ROW;
  for (const st of OTHERSTAGE.staged){
    for (let i=0;i<st.cast.length;i++){
      const p=PEOPLE[st.cast[i]];
      const ax=st.h.x+st.g.dx[i];
      const sx=projX(band, ax);
      if (sx<-60||sx>view.w+60) continue;
      const sy=groundY(band)+(-26)*CAM.z;
      ctx.save();
      ctx.translate(sx,sy);
      ctx.scale(CAM.z*(st.g.dx[i]<0?1:-1), CAM.z);
      const f=(rt*0.5+i*0.4+hash01(p.pid))%1;
      (POSES[st.g.poses[i]]||POSES.stand)(ctx,p,f);
      ctx.restore();
      HIT.push({pid:p.pid, sx, sy:sy-46*CAM.z});
    }
    // occasional line
    const loopLen=44;
    const el=(rt-st.t0)%loopLen;
    const kk=Math.floor((rt-st.t0)/loopLen);
    if (el>=8 && !st.fired[kk] && CAM.z>0.5){
      st.fired[kk]=1;
      if (hash01(st.h.x, kk)<0.5){
        const txt=st.g.lines[Math.floor(hash01(st.h.x, kk, 2)*st.g.lines.length)];
        sayAt('ROW', st.h.x+st.g.dx[0], -26-58, txt, {dur:3.8, think:txt.startsWith('(')});
      }
    }
  }
}

// ==== §16 WEEKEND PARTIES (sim-lite, deterministic) =========================
function partiesTonight(){
  const d=CLOCK.derive();
  // a party "tonight" belongs to the evening's dayAbs (late hours borrow yesterday)
  const nightDay = d.hour<6 ? d.dayAbs-1 : d.dayAbs;
  const dow=nightDay%7;
  if (dow!==4 && dow!==5) return [];
  const out=[];
  for (const h of WORLD.houses){
    const isHero=h.frat.hero;
    const p= isHero ? (dow===5?0.85:0.35) : 0.38;
    if (hash01(nightDay, h.x, 77)<p) out.push({h, hero:isHero, big:isHero&&dow===5});
  }
  return out;
}
const PARTY_LINES=['REVOLUTION!','One more song!','SAME TEAM!','HEADS!','Rack ’em!','To the boys!'];
const RAGER_LINES=['ALIVE! (everyone, at once)','The solo! THE SOLO!','Evenflow does not take requests. Evenflow provides.','(four hundred high fives, simultaneously)'];
function partyHour(){
  const hr=CLOCK.derive().hour;
  return (hr>=20.5||hr<2.5);
}
let _partyBubbleT=0;
function drawParties(ctx, rt){
  if (!partyHour()) return;
  const tonight=partiesTonight();
  if (!tonight.length) return;
  const band=BAND.ROW;
  for (const pt of tonight){
    const hx=pt.h.x;
    const sx=projX(band,hx);
    if (sx<-400||sx>view.w+400) continue;
    const n=pt.big?14:8;
    for (let i=0;i<n;i++){
      const off=(hash01(hx,i,1)-0.5)*(pt.big?300:220);
      const ax=hx+off;
      const isPorch=Math.abs(off)<130;
      const fy=isPorch?-26:0;
      const psx=projX(band,ax);
      if (psx<-60||psx>view.w+60) continue;
      const psy=groundY(band)+fy*CAM.z;
      // synthetic guests (not roster — the whole campus shows up)
      const guest={ pid:-1, female:hash01(hx,i,2)<0.4, polo:PAL.polos[Math.floor(hash01(hx,i,3)*8)],
        skin:SKINS[Math.floor(hash01(hx,i,4)*6)], hair:HAIRS[Math.floor(hash01(hx,i,5)*7)],
        hat:hash01(hx,i,6)<0.2, kind:'GUEST' };
      const poseName= pt.big && isPorch ? 'highfive' : ['drink','talk','dance','stand'][Math.floor(hash01(hx,i,7)*4)];
      ctx.save();
      ctx.translate(psx,psy);
      ctx.scale(CAM.z*(hash01(hx,i,8)<0.5?-1:1), CAM.z);
      (POSES[poseName]||POSES.stand)(ctx, guest, (rt*0.5+i*0.29)%1);
      ctx.restore();
    }
    // music notes drifting from the house
    ctx.fillStyle='rgba(58,47,38,0.7)';
    ctx.font='italic '+Math.round(15*CAM.z+6)+'px Georgia';
    for (let i=0;i<3;i++){
      const t=((rt*0.3)+i*0.33+hash01(hx,i)) % 1;
      const nx=sx+Math.sin((t*5+i)*2)*30*CAM.z + 60*CAM.z;
      const ny=groundY(band)+(-170-t*90)*CAM.z;
      ctx.globalAlpha=0.75*(1-t);
      ctx.fillText(i%2?'♪':'♫', nx, ny);
    }
    ctx.globalAlpha=1;
    // party lines
    if (rt-_partyBubbleT>11 && CAM.z>0.45 && Math.abs(sx-view.w/2)<view.w*0.5){
      _partyBubbleT=rt;
      const bank=pt.big?RAGER_LINES:PARTY_LINES;
      sayAt('ROW', hx+(hash01(Math.floor(rt),hx)-0.5)*160, pt.big?-96:-26-58,
        bank[Math.floor(hash01(Math.floor(rt),hx,2)*bank.length)], {dur:3.6});
    }
  }
}
// party glow override helper (used by drawGlows)
function houseParty(x){
  if (!partyHour()) return null;
  for (const pt of partiesTonight()) if (Math.abs(pt.h.x-x)<170) return pt;
  return null;
}

// ==== §18b TIME DIAL & SPEED ================================================
const DIAL={ el:null, cv:null, drag:false };
function dialInit(){
  const wrap=document.createElement('div');
  wrap.id='dialwrap'; wrap.className='hud';
  wrap.innerHTML='<canvas id="dial" width="natural" height="natural"></canvas><div id="speedchips">'+
    '<button data-s="0">⏸</button><button data-s="1" class="on">1×</button>'+
    '<button data-s="4">4×</button><button data-s="60">60×</button></div>';
  document.body.appendChild(wrap);
  DIAL.cv=document.getElementById('dial');
  DIAL.cv.width=natural(); DIAL.cv.height=natural();
  function natural(){ return 96*Math.min(window.devicePixelRatio||1,2); }
  wrap.style.pointerEvents='auto';
  wrap.querySelectorAll('#speedchips button').forEach(b=>{
    b.onclick=()=>{
      CLOCK.speed=parseFloat(b.dataset.s);
      wrap.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
    };
  });
  const pick=(e)=>{
    const r=DIAL.cv.getBoundingClientRect();
    const dx=e.clientX-(r.left+r.width/2), dy=e.clientY-(r.top+r.height/2);
    let ang=Math.atan2(dy,dx)+Math.PI/2;
    if (ang<0) ang+=Math.PI*2;
    const hr=ang/(Math.PI*2)*24;
    const d=CLOCK.derive();
    CLOCK.t=d.dayAbs*TICKS_PER_DAY+Math.round(hr*4);
    CLOCK.frac=0;
    HERO.lastBlock=-1; OTHERSTAGE.last=-1;
  };
  DIAL.cv.addEventListener('pointerdown',e=>{ DIAL.drag=true; pick(e); DIAL.cv.setPointerCapture(e.pointerId); });
  DIAL.cv.addEventListener('pointermove',e=>{ if (DIAL.drag) pick(e); });
  DIAL.cv.addEventListener('pointerup',()=>DIAL.drag=false);
}
function dialDraw(){
  const cv=DIAL.cv; if (!cv) return;
  const g=cv.getContext('2d');
  const S=cv.width, c=S/2, R=S*0.42;
  g.setTransform(1,0,0,1,0,0);
  g.clearRect(0,0,S,S);
  g.beginPath(); g.arc(c,c,R,0,7);
  g.fillStyle='rgba(250,243,226,0.92)'; g.fill();
  g.lineWidth=S*0.02; g.strokeStyle='#3a2f26'; g.stroke();
  // day/night arc shading
  g.beginPath(); g.arc(c,c,R*0.98, Math.PI*0.75, Math.PI*2.25);
  g.strokeStyle='rgba(70,80,122,0.25)'; g.lineWidth=S*0.06; g.stroke();
  // ticks
  g.strokeStyle='#6b5a49'; g.lineWidth=1;
  for (let i=0;i<24;i++){
    const a=i/24*Math.PI*2-Math.PI/2;
    const l=i%6===0?0.86:0.93;
    g.beginPath();
    g.moveTo(c+Math.cos(a)*R*l, c+Math.sin(a)*R*l);
    g.lineTo(c+Math.cos(a)*R*0.97, c+Math.sin(a)*R*0.97);
    g.stroke();
  }
  // needle
  const hr=CLOCK.hourFloat()%24;
  const a=hr/24*Math.PI*2-Math.PI/2;
  g.strokeStyle='#8a2a1a'; g.lineWidth=S*0.025; g.lineCap='round';
  g.beginPath(); g.moveTo(c-Math.cos(a)*R*0.1, c-Math.sin(a)*R*0.1);
  g.lineTo(c+Math.cos(a)*R*0.78, c+Math.sin(a)*R*0.78); g.stroke();
  g.fillStyle='#3a2f26';
  g.beginPath(); g.arc(c,c,S*0.03,0,7); g.fill();
}
