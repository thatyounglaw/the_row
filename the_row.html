<!DOCTYPE html>
<html lang="en">
<head>

<title>The Row</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; width:100%; height:100%; background:#f4ead6; }
  #c { position:absolute; inset:0; display:block; cursor:grab; }
  #c.dragging { cursor:grabbing; }

  #title { top:16px; left:22px; }

  #hovercard {

  #nudge {

    max-width:340px; display:none; pointer-events:auto; cursor:pointer;
    background:rgba(250,243,226,.94); border:1px solid rgba(58,47,38,.55); border-radius:3px;
    padding:5px 10px; font-family:Georgia, serif; font-style:italic; font-size:12px; color:#3a2f26;

  }
  #nudge:hover { background:#fdf6e4; }
  #actsbtn {
    position:absolute; bottom:44px; right:20px; z-index:20; pointer-events:auto; cursor:pointer;
    font-family:Georgia, serif; font-style:italic; font-size:12px; color:#3a2f26;
    background:rgba(250,243,226,.9); border:1px solid rgba(58,47,38,.5); border-radius:3px; padding:3px 12px;
  }
  #actsbtn:hover { background:rgba(58,47,38,.12); }
  #actsdrawer {
    position:absolute; bottom:76px; right:20px; z-index:21; display:none; flex-direction:column; gap:4px;
    background:rgba(250,243,226,.97); border:1px solid #3a2f26; border-radius:4px; padding:10px;
    box-shadow:3px 4px 0 rgba(58,47,38,.2); pointer-events:auto;

  #actsdrawer .acttitle { font-family:Georgia, serif; font-size:11px; letter-spacing:2px; opacity:.7; margin-bottom:3px; }
  #actsdrawer button {

  }

  #compwrap {

    background:rgba(42,38,32,.55); pointer-events:auto;
  }
  #compframe {
    background:#f4ead6; border:10px solid #4a3220; border-radius:2px; box-shadow:0 14px 50px rgba(0,0,0,.5);
    padding:14px 18px; cursor:pointer;
  }
  body.night #title, body.night #datechip, body.night #hint {

  }
  body.night #seedchip { color:#e8dfc8; }
  #loading {

<body>
<canvas id="c"></canvas>
<div id="title" class="hud"><div class="t1">THE ROW</div><div class="t2" id="subtitle">Colonnade College &middot; Lexford, Virginia</div></div>
<div id="datechip" class="hud"><div class="d1" id="d1">&nbsp;</div><div class="d2" id="d2">&nbsp;</div></div>
<div id="hint" class="hud">drag to wander &middot; scroll to lean in</div>
<div id="seedchip" class="hud">seed <b id="seedval"></b><button id="reseed">new year</button><button id="copylink">copy link</button></div>
<div id="loading"><div class="big">THE ROW</div><div class="sub" id="loadmsg">inking the valley&hellip;</div></div>
<script>
"use strict";
/* ============================================================================
   THE ROW — a living picture book
   Colonnade College · Lexford, Virginia · forever 1999–2006
   v2: hand-drawn Canvas 2D. No libraries, no assets, no build.
   ==========================================================================*/

// ==== §1 CONFIG & PALETTE ===================================================
const CFG = {
  PERSON_H: 56,             // world units; 1 wu = 1 px at zoom 1
  TILE: 1024,               // bake tile width in px
  BUCKETS: [0.25, 0.5, 1, 2, 3],
  TILE_CACHE_MAX: 64,
};
const PAL = {
  paper:'#f4ead6', paperDeep:'#e9d8b7',
  ink:'#33241f', inkLight:'#6b5a49', inkFaded:'#8a7862',
  brick:'#b0563a', brickShade:'#8a4634', brickLight:'#c86a48', mortar:'#d9c3ad',
  colonnade:'#f7f1e2', trim:'#e6dcc4', shutter:'#33523f',
  lawn:'#7fae58', lawnLight:'#95c46c', lawnShade:'#5c8a48', field:'#b3b273',
  oak:'#4f7f3c', oakLight:'#6fa254', trunk:'#6d573f', autumn:'#c07f3a',
  ridgeFar:'#93a6c2', ridgeMid:'#7186a8', ridgeNear:'#59698c',
  river:'#5b83a0', riverDeep:'#45688a', glint:'#dcebee',
  khaki:'#cfb98e', cadet:'#9aa2ac', roofSlate:'#4a4038', roofDark:'#3a322c',
  asphalt:'#7a7570', asphaltEdge:'#645e56', sidewalk:'#d8c9a4',
  lampAmber:'#ffd98a', windowGlow:'#ffc46a', candle:'#ffb45e', neon:'#ff7d6b',
  polos:['#e8a0a8','#f2d489','#9fc4d8','#b8d9a8','#f0f0e8','#d8b8d8','#f0c8a0','#a8c8c0'],
  sky: {
    // hour stops: [hour, topColor, horizonColor, tint(multiply), glowAlpha]
    stops: [
      [0.0,  '#1f2745','#384268','#3e4a80', 1.0],
      [5.0,  '#283052','#48486f','#5c6296', 0.9],
      [6.6,  '#7d8bb0','#f2b98a','#ffd9b0', 0.35],
      [9.0,  '#7fb0e0','#dcebf2','#fff4dd', 0.0],
      [13.0, '#6f9ed6','#d6e6ec','#ffffff', 0.0],
      [17.0, '#7fa0d0','#ffd9a0','#ffedc2', 0.0],
      [18.9, '#7a89b8','#ffb87a','#eda775', 0.35],
      [20.1, '#3a4370','#7f6c96','#8678a8', 0.8],
      [24.0, '#1f2745','#384268','#3e4a80', 1.0],
    ],
  },
};

// ==== §2 RNG, NOISE & HASH ==================================================
function xmur3(str){ let h=1779033703^str.length; for (let i=0;i<str.length;i++){ h=Math.imul(h^str.charCodeAt(i),3432918353); h=h<<13|h>>>19; } return function(){ h=Math.imul(h^h>>>16,2246822507); h=Math.imul(h^h>>>13,3266489909); return (h^=h>>>16)>>>0; }; }
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
const RNG = { seedStr:'', world:null, hist:null, name:null, ambient:null };
function initRNG(s){ RNG.seedStr=s; for (const k of ['world','hist','name','ambient']) RNG[k]=mulberry32(xmur3(s+'::'+k)()); }
const rw = ()=>RNG.world(), rwr=(a,b)=>a+(b-a)*RNG.world(), rwi=(a,b)=>a+Math.floor(RNG.world()*(b-a+1));
const rwPick = arr=>arr[Math.floor(RNG.world()*arr.length)];
const ra = ()=>RNG.ambient(), rar=(a,b)=>a+(b-a)*RNG.ambient(), raPick=arr=>arr[Math.floor(RNG.ambient()*arr.length)];
const clamp=(v,a,b)=>v<a?a:(v>b?b:v), lerp=(a,b,t)=>a+(b-a)*t;
const smoothstep=(a,b,x)=>{ const t=clamp((x-a)/(b-a),0,1); return t*t*(3-2*t); };
let SEEDH = 1234;
function hash01(){ // stateless place-time hash: hash01(a, b, c, ...) — presentation determinism
  let h = SEEDH>>>0;
  for (let i=0;i<arguments.length;i++){
    let x = Math.imul((arguments[i]*1e4)|0, 2654435761);
    h = Math.imul(h ^ x, 2246822519); h = (h<<13|h>>>19)>>>0;
  }
  h = Math.imul(h^h>>>16, 2246822507); h = (h^h>>>13)>>>0;
  return h/4294967296;
}
function latticeHash(ix,iz){ let h=Math.imul(ix,374761393)+Math.imul(iz,668265263)+Math.imul(SEEDH,2246822519); h=Math.imul(h^(h>>>13),1274126177); return ((h^(h>>>16))>>>0)/4294967296; }
function vnoise(x,z){ const ix=Math.floor(x),iz=Math.floor(z),fx=x-ix,fz=z-iz;
  const a=latticeHash(ix,iz),b=latticeHash(ix+1,iz),c=latticeHash(ix,iz+1),d=latticeHash(ix+1,iz+1);
  const ux=fx*fx*(3-2*fx),uz=fz*fz*(3-2*fz);
  return lerp(lerp(a,b,ux),lerp(c,d,ux),uz);
}
function hexLerp(h1,h2,t){
  const a=parseInt(h1.slice(1),16), b=parseInt(h2.slice(1),16);
  const r=((a>>16)&255)+(((b>>16)&255)-((a>>16)&255))*t;
  const g=((a>>8)&255)+(((b>>8)&255)-((a>>8)&255))*t;
  const bl=(a&255)+((b&255)-(a&255))*t;
  return 'rgb('+(r|0)+','+(g|0)+','+(bl|0)+')';
}
function shade(hex, f){ // f<1 darker, f>1 lighter
  const a=parseInt(hex.slice(1),16);
  const r=clamp(((a>>16)&255)*f,0,255)|0, g=clamp(((a>>8)&255)*f,0,255)|0, b=clamp((a&255)*f,0,255)|0;
  return 'rgb('+r+','+g+','+b+')';
}

// ==== §4 CLOCK ==============================================================
const TICKS_PER_DAY=96, DAYS_PER_YEAR=360;
const MONTHS=['September','October','November','December','January','February','March','April','May','June','July','August'];
const DOW=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const CLOCK = {
  t: 0, frac: 0, speed: 1,   // sim-minutes per real second
  derive(){
    const dayAbs=Math.floor(this.t/TICKS_PER_DAY);
    const minutes=(this.t-dayAbs*TICKS_PER_DAY)*15;
    const year=Math.floor(dayAbs/DAYS_PER_YEAR);
    const dayInYear=dayAbs-year*DAYS_PER_YEAR;
    const month=Math.floor(dayInYear/30);
    return { dayAbs, year, dayInYear, month, dayInMonth:dayInYear-month*30+1, dow:dayAbs%7,
             hh:Math.floor(minutes/60), mm:minutes%60, hour:minutes/60 };
  },
  hourFloat(){ const d=this.derive(); return d.hour + this.frac*0.25; },
};

// ==== §5 ART TOOLKIT — cel cartoon =========================================
// Confident cel outline with a whisper of hand (seeded, id-stable so it never
// crawls between bakes). pts in current-transform units.
function wob(ctx, pts, id, o){
  o=o||{};
  const amp=(o.amp!==undefined?o.amp:2.1)*ART.ampScale, seg=7;
  const w=Math.max((o.w!==undefined?o.w:1.6)*1.55, ART.minInk);
  // resample
  const rp=[];
  for (let i=0;i<pts.length-1;i++){
    const [x1,y1]=pts[i],[x2,y2]=pts[i+1];
    const d=Math.hypot(x2-x1,y2-y1), n=Math.max(1,Math.round(d/seg));
    for (let j=(i===0?0:1); j<=n; j++) rp.push([lerp(x1,x2,j/n), lerp(y1,y2,j/n), i+j/n]);
  }
  if (o.close && pts.length>2) rp.push(rp[0].slice());
  ctx.beginPath();
  for (let i=0;i<rp.length;i++){
    const [x,y,s]=rp[i];
    // perpendicular
    const p=rp[Math.max(0,i-1)], nx=rp[Math.min(rp.length-1,i+1)];
    let dx=nx[0]-p[0], dy=nx[1]-p[1]; const l=Math.hypot(dx,dy)||1; dx/=l; dy/=l;
    const j=(vnoise(s*2.1+id*7.31, id*3.7)-0.5)*2*amp;
    const px=x-dy*j, py=y+dx*j;
    if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.lineWidth=w; ctx.strokeStyle=o.col||PAL.ink;
  ctx.lineCap='round'; ctx.lineJoin='round';
  const ga=ctx.globalAlpha;
  ctx.globalAlpha=ga*(o.alpha!==undefined?o.alpha:1);
  ctx.stroke();
  ctx.globalAlpha=ga;
}
function wobRect(ctx,x,y,w,h,id,o){ wob(ctx,[[x,y],[x+w,y],[x+w,y+h],[x,y+h],[x,y]],id,o); }
function wobEllipse(ctx,cx,cy,rx,ry,id,o){
  const pts=[]; const n=16;
  for (let i=0;i<=n;i++){ const a=i/n*Math.PI*2; pts.push([cx+Math.cos(a)*rx, cy+Math.sin(a)*ry]); }
  wob(ctx,pts,id,o);
}
// Cel fill: flat opaque base + ONE hard shadow tone on the right (big shapes
// only — small rects like windows and props stay clean flats).
function washRect(ctx,x,y,w,h,base,id,o){
  o=o||{};
  ctx.fillStyle=base;
  ctx.fillRect(x+0.5,y+0.5,w-1,h-1);
  if (w>26 && h>20){
    ctx.save();
    ctx.beginPath(); ctx.rect(x+0.5,y+0.5,w-1,h-1); ctx.clip();
    ctx.fillStyle='rgba(40,22,40,0.14)';
    ctx.beginPath();
    ctx.moveTo(x+w*0.78,y); ctx.lineTo(x+w,y); ctx.lineTo(x+w,y+h); ctx.lineTo(x+w*0.64,y+h);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}
function washPoly(ctx,pts,base,id,o){
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();
  ctx.fillStyle=base; ctx.fill();
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  for (const p of pts){ minx=Math.min(minx,p[0]); miny=Math.min(miny,p[1]); maxx=Math.max(maxx,p[0]); maxy=Math.max(maxy,p[1]); }
  if (maxx-minx>40){
    ctx.save(); ctx.clip();
    ctx.fillStyle='rgba(40,22,40,0.12)';
    ctx.fillRect(minx+(maxx-minx)*0.7, miny, (maxx-minx)*0.3, maxy-miny);
    ctx.restore();
  }
}
// hand-lettered feel for labels & titles
function jitterText(ctx, str, x, y, size, id, o){
  o=o||{};
  ctx.save();
  ctx.font=(o.style||'')+' '+size+'px Georgia, serif';
  ctx.fillStyle=o.col||PAL.ink;
  ctx.textBaseline='alphabetic';
  const widths=[];
  let total=0;
  for (const ch of str){ const w=ctx.measureText(ch).width; widths.push(w); total+=w*(o.track||1.04); }
  let cx = o.align==='center' ? x-total/2 : x;
  let i=0;
  for (const ch of str){
    const g1=hash01(id,i,1)-0.5, g2=hash01(id,i,2)-0.5;
    ctx.save();
    ctx.translate(cx+widths[i]/2, y+g2*size*0.03);
    ctx.rotate(g1*0.025);
    ctx.fillText(ch,-widths[i]/2,0);
    ctx.restore();
    cx+=widths[i]*(o.track||1.04); i++;
  }
  ctx.restore();
}
// context-wide art settings adjusted per bake bucket
const ART = { ampScale:0.3, minInk:1.9, detail:1 };
function artForBucket(bucket){
  ART.ampScale = 0.3;            // cel lines: confident, near-straight
  ART.minInk = 2.1/bucket;       // ink never thinner than ~2 device px
  ART.detail = bucket>=1 ? 2 : bucket>=0.5 ? 1 : 0;   // 0 poster, 1 mid, 2 full
}

// ==== §8 BANDS & CAMERA =====================================================
const BANDS = [
  { id:'RIDGE',  pf:0.10, gy:470, topWu:-360, botWu:30 },
  { id:'HILL',   pf:0.34, gy:600, topWu:-300, botWu:170 },   // Colonnade on its hill
  { id:'ROW',    pf:0.85, gy:800, topWu:-380, botWu:130 },   // the hero band
  { id:'TOWN',   pf:1.12, gy:906, topWu:-190, botWu:46 },    // downtown Lexford + sorority row
  { id:'RIVER',  pf:1.38, gy:1006, topWu:-130, botWu:460 },  // pole houses over the water
];
const BAND = {}; for (const b of BANDS) BAND[b.id]=b;
const CAM = {
  x: 2450, z: 0.62, tx: 2450, tz: 0.62,
  yStage: 640,
  dragging: false, velX: 0, fade: 0, settle: 0,
};
// Every reachable camera state is a composed shot: zoom bounds derive from the
// viewport, pan bounds derive from zoom, and the vertical rail has three acts.
const WORLD_L=-250, WORLD_R=5150;               // the viewable ends of the valley
const RIVER_BOT=BAND.RIVER.gy+BAND.RIVER.botWu; // world-y of the river's bottom edge
function zMinDyn(){ return clamp(view.h/2100, 0.38, 0.55); }   // valley fills the frame
function zMaxDyn(){ return clamp(view.h*0.86/330, 2.2, 3.2); } // dollhouse fills the frame
function camMinX(z){ return (WORLD_L + view.w*0.5/z)/BAND.ROW.pf; }
function camMaxX(z){ return (WORLD_R - view.w*0.5/z)/BAND.ROW.pf; }
function camYStage(){
  const z=CAM.z, h=view.h;
  // act 1→2: the poster rises into the street…
  const street=lerp(660, BAND.ROW.gy - 300/z, smoothstep(0.34, 1.1, z));
  // …act 3: the dollhouse takes center stage
  let y=lerp(street, BAND.ROW.gy - 98, smoothstep(1.3, 2.0, z));
  // and the frame is always full-bleed: the river's bottom edge never
  // rises above the sill, so there is no void, ever
  return Math.min(y, RIVER_BOT - h*0.5/z);
}
function groundY(band){ // screen y of a band's ground line
  return (band.gy - CAM.yStage)*CAM.z + view.h*0.5;
}
function projX(band, wx){ return (wx - CAM.x*band.pf)*CAM.z + view.w*0.5; }
// world x at screen x for a band (for culling)
function unprojX(band, sx){ return (sx - view.w*0.5)/CAM.z + CAM.x*band.pf; }

// ==== §9 TILE CACHE =========================================================
const TILES = { map:new Map(), order:[], bakedThisFrame:0 };
function tileKey(bandId,bucket,ix){ return bandId+':'+bucket+':'+ix; }
function bucketFor(z){
  for (const b of CFG.BUCKETS) if (b>=z) return b;
  return CFG.BUCKETS[CFG.BUCKETS.length-1];
}
function getTile(band, bucket, ix, allowBake){
  const key=tileKey(band.id,bucket,ix);
  let t=TILES.map.get(key);
  if (t){ // refresh LRU
    const oi=TILES.order.indexOf(key);
    if (oi>=0) TILES.order.splice(oi,1);
    TILES.order.push(key);
    return t;
  }
  if (!allowBake || TILES.bakedThisFrame>=4) return null;
  TILES.bakedThisFrame++;
  const wuW=CFG.TILE/bucket;
  const x0=ix*wuW;
  const hWu=band.botWu-band.topWu;
  const cv=document.createElement('canvas');
  cv.width=CFG.TILE; cv.height=Math.ceil(hWu*bucket);
  const ctx=cv.getContext('2d');
  ctx.setTransform(bucket,0,0,bucket,-x0*bucket,-band.topWu*bucket);
  artForBucket(bucket);
  WORLDDRAW[band.id](ctx, x0, x0+wuW, bucket);
  artForBucket(1);
  t={cv, x0, wuW, hWu};
  TILES.map.set(key,t);
  TILES.order.push(key);
  while (TILES.order.length>CFG.TILE_CACHE_MAX){
    const old=TILES.order.shift();
    TILES.map.delete(old);
  }
  return t;
}
function drawBandTiles(ctx, band){
  const bucket=bucketFor(CAM.z);
  const wuW=CFG.TILE/bucket;
  const xL=unprojX(band,-80), xR=unprojX(band,view.w+80);
  // overscan far past the pan clamps so no band edge is ever on screen
  const i0=Math.max(Math.floor(-2400/wuW),Math.floor(xL/wuW));
  const i1=Math.min(Math.floor(9200/wuW),Math.floor(xR/wuW));
  const gy=groundY(band);
  for (let ix=i0; ix<=i1; ix++){
    let t=getTile(band,bucket,ix,true);
    let usedBucket=bucket;
    if (!t){ // fallback: any other baked bucket for this region
      for (const b2 of CFG.BUCKETS){
        if (b2===bucket) continue;
        const wu2=CFG.TILE/b2;
        const jx=Math.floor((ix*wuW+1)/wu2);
        const t2=TILES.map.get(tileKey(band.id,b2,jx));
        if (t2){ t=t2; usedBucket=b2; break; }
      }
    }
    if (!t) continue;
    const sx=projX(band, t.x0);
    const sy=gy + band.topWu*CAM.z;
    ctx.drawImage(t.cv, sx-0.5, sy, t.wuW*CAM.z+1, t.hWu*CAM.z);
  }
}

function drawShrub(ctx, x, y, s, id){
  washPoly(ctx, [[x-s,y],[x-s*0.7,y-s*0.9],[x,y-s*1.15],[x+s*0.75,y-s*0.85],[x+s,y]], PAL.oak, id);
  wob(ctx, [[x-s,y],[x-s*0.7,y-s*0.9],[x,y-s*1.15],[x+s*0.75,y-s*0.85],[x+s,y]], id, {w:1.3});
}

function drawWindow(ctx, cx, cy, w, h, id, opts){
  opts=opts||{};
  // glass
  washRect(ctx, cx-w/2, cy-h/2, w, h, '#5a6a7a', id, {inset:0.5});
  if (ART.detail>=1){
    // muntins
    ctx.strokeStyle='rgba(244,234,214,0.75)'; ctx.lineWidth=Math.max(1, ART.minInk*0.8);
    ctx.beginPath();
    ctx.moveTo(cx, cy-h/2+1); ctx.lineTo(cx, cy+h/2-1);
    ctx.moveTo(cx-w/2+1, cy); ctx.lineTo(cx+w/2-1, cy);
    ctx.stroke();
  }
  // trim + sill
  wobRect(ctx, cx-w/2, cy-h/2, w, h, id, {w:1.4, col:PAL.ink});
  if (ART.detail>=1){
    ctx.fillStyle=PAL.trim;
    ctx.fillRect(cx-w/2-3, cy+h/2, w+6, 3.5);
    wob(ctx, [[cx-w/2-3, cy+h/2+3.5],[cx+w/2+3, cy+h/2+3.5]], id+3, {w:1.2});
  }
  if (opts.shutters && ART.detail>=1){
    ctx.fillStyle=PAL.shutter;
    ctx.fillRect(cx-w/2-9, cy-h/2, 7, h);
    ctx.fillRect(cx+w/2+2, cy-h/2, 7, h);
    wobRect(ctx, cx-w/2-9, cy-h/2, 7, h, id+4, {w:1.1});
    wobRect(ctx, cx+w/2+2, cy-h/2, 7, h, id+5, {w:1.1});
  }
}

function drawFratHouse(ctx, h){
  const x=h.x, id=h.id;
  const W=300, bodyT=-206, foundT=-18;
  const brick = shade(PAL.brick, h.frat.brickF);
  // walkway to the sidewalk
  ctx.fillStyle=PAL.sidewalk;
  ctx.fillRect(x-14, 0, 28, 22);
  wob(ctx,[[x-14,0],[x-14,22]],id+61,{w:1.1,alpha:0.7});
  wob(ctx,[[x+14,0],[x+14,22]],id+62,{w:1.1,alpha:0.7});
  // foundation
  washRect(ctx, x-W/2-4, foundT, W+8, -foundT, '#b0a48c', id+1);
  wobRect(ctx, x-W/2-4, foundT, W+8, -foundT, id+1, {w:1.4});
  // brick body
  washRect(ctx, x-W/2, bodyT, W, bodyT*-1+foundT, brick, id+2);
  if (ART.detail>=2){
    // sparse brick ticks
    ctx.strokeStyle='rgba(58,47,38,0.18)'; ctx.lineWidth=1;
    for (let i=0;i<26;i++){
      const bx=x-W/2+8+hash01(id,20+i)* (W-16), by=bodyT+8+hash01(id,60+i)*(-bodyT+foundT-16);
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+7,by); ctx.stroke();
    }
  }
  wobRect(ctx, x-W/2, bodyT, W, -bodyT+foundT, id+2, {w:1.8});
  // second-floor windows
  const shut = h.frat.key==='SS'||h.frat.key==='GD';
  for (let i=0;i<4;i++){
    const wx=x-108+i*72;
    drawWindow(ctx, wx, -168, 34, 48, id+10+i, {shutters:shut});
    h.win(wx, -168);
  }
  // first-floor windows (flanking the door, behind porch)
  for (const off of [-108,-36,36,108]){
    if (Math.abs(off)<50) continue;
    drawWindow(ctx, x+off, -66, 34, 48, id+20+off, {shutters:false});
    h.win(x+off, -66);
  }
  // door
  ctx.fillStyle=shade('#6a4a30', 0.9+hash01(id,7)*0.2);
  ctx.fillRect(x-19, -78, 38, 60);
  wobRect(ctx, x-19, -78, 38, 60, id+30, {w:1.6});
  if (ART.detail>=1){
    wobRect(ctx, x-13, -66, 11, 20, id+31, {w:1});
    wobRect(ctx, x+2,  -66, 11, 20, id+32, {w:1});
    // transom fan
    ctx.fillStyle='#c8d4da';
    ctx.beginPath(); ctx.arc(x, -78, 15, Math.PI, 0); ctx.fill();
    wob(ctx, [[x-15,-78],[x+15,-78]], id+33, {w:1.2});
    ctx.beginPath(); ctx.strokeStyle=PAL.ink; ctx.lineWidth=1; ctx.arc(x,-78,15,Math.PI,0); ctx.stroke();
  }
  // porch: deck, columns, roof slab
  ctx.fillStyle='#ded2b4';
  ctx.fillRect(x-W/2-8, -26, W+16, 10);
  wobRect(ctx, x-W/2-8, -26, W+16, 10, id+40, {w:1.5});
  const colTop=-118;
  for (let i=0;i<5;i++){
    const cx=x-W/2+16+i*(W-32)/4;
    ctx.fillStyle=PAL.colonnade;
    ctx.fillRect(cx-5, colTop, 10, -colTop-26);
    wob(ctx, [[cx-5,colTop+2],[cx-5,-26]], id+41+i, {w:1.3});
    wob(ctx, [[cx+5,colTop+2],[cx+5,-26]], id+46+i, {w:1.3});
    if (ART.detail>=1){ ctx.fillRect(cx-7, colTop, 14, 5); ctx.fillRect(cx-7, -31, 14, 5); }
  }
  ctx.fillStyle=PAL.trim;
  ctx.fillRect(x-W/2-10, colTop-14, W+20, 14);
  wobRect(ctx, x-W/2-10, colTop-14, W+20, 14, id+52, {w:1.6});
  // porch couch (the institution) for the loud houses
  if ((h.frat.key==='RD'||h.frat.key==='GD') && ART.detail>=1){
    const sx=x+W/2-70;
    ctx.fillStyle='#7a5a48';
    ctx.fillRect(sx-26,-48,52,20);
    ctx.fillRect(sx-26,-58,52,12);
    ctx.fillStyle='#8a6a58';
    ctx.fillRect(sx-24,-46,22,10); ctx.fillRect(sx+2,-46,22,10);
    wobRect(ctx, sx-26,-58,52,30, id+55, {w:1.3});
  }
  if (h.frat.style==='temple'){
    // full-width pediment
    washPoly(ctx, [[x-W/2-16, bodyT],[x+W/2+16, bodyT],[x, bodyT-74]], PAL.colonnade, id+70);
    wob(ctx, [[x-W/2-16, bodyT],[x+W/2+16, bodyT],[x, bodyT-74],[x-W/2-16, bodyT]], id+70, {w:1.9});
    if (ART.detail>=1){
      wobEllipse(ctx, x, bodyT-30, 13, 13, id+71, {w:1.3});
    }
    // letters on the frieze
    jitterText(ctx, h.frat.letters, x, bodyT-8, 30, id+72, {align:'center', col:h.frat.trim, style:'bold'});
  } else {
    // side-gable roof band
    washPoly(ctx, [[x-W/2-18, bodyT],[x+W/2+18, bodyT],[x+W/2-26, bodyT-52],[x-W/2+26, bodyT-52]], PAL.roofSlate, id+74);
    wob(ctx, [[x-W/2-18, bodyT],[x-W/2+26, bodyT-52],[x+W/2-26, bodyT-52],[x+W/2+18, bodyT]], id+74, {w:1.9});
    if (ART.detail>=2){
      ctx.strokeStyle='rgba(58,47,38,0.25)'; ctx.lineWidth=1.1;
      for (let i=0;i<5;i++){
        const t=(i+1)/6;
        ctx.beginPath();
        ctx.moveTo(lerp(x-W/2-14, x-W/2+26, t), lerp(bodyT-2, bodyT-50, t));
        ctx.lineTo(lerp(x+W/2+14, x+W/2-26, t), lerp(bodyT-2, bodyT-50, t));
        ctx.stroke();
      }
    }
    // letters mounted on the brick between floors
    jitterText(ctx, h.frat.letters, x, -136, 25, id+72, {align:'center', col:'#e8dfc8', style:'bold'});
    // dormers
    for (const off of [-70, 70]){
      ctx.fillStyle=PAL.colonnade;
      ctx.fillRect(x+off-14, bodyT-34, 28, 32);
      washPoly(ctx,[[x+off-18,bodyT-34],[x+off+18,bodyT-34],[x+off,bodyT-52]],PAL.roofDark,id+80+off);
      drawWindow(ctx, x+off, bodyT-18, 16, 22, id+83+off, {});
      wobRect(ctx, x+off-14, bodyT-34, 28, 32, id+86+off, {w:1.2});
    }
  }
  // chimney + smoke anchor
  const chx = x + (h.frat.style==='temple' ? W/2-30 : W/2-52);
  const chTop = h.frat.style==='temple' ? bodyT-58 : bodyT-84;
  ctx.fillStyle=shade(brick,0.85);
  ctx.fillRect(chx-9, chTop, 18, 46);
  wobRect(ctx, chx-9, chTop, 18, 46, id+90, {w:1.4});
  h.smoke=[chx, chTop];
  // foundation shrubs
  drawShrub(ctx, x-W/2+26, -16, 16, id+95);
  drawShrub(ctx, x+W/2-26, -16, 14, id+96);
  // yard flavor per house
  if (ART.detail>=1) drawYardProp(ctx, h);
}

function drawTree(ctx, t){
  // trunk
  ctx.strokeStyle=PAL.trunk; ctx.lineWidth=7*t.s; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(t.x, 0); ctx.quadraticCurveTo(t.x+t.lean*8, -60*t.s, t.x+t.lean*16, -110*t.s); ctx.stroke();
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=Math.max(1.5, ART.minInk*0.8);
  ctx.beginPath(); ctx.moveTo(t.x-3.5, 0); ctx.quadraticCurveTo(t.x+t.lean*8-3.5, -60*t.s, t.x+t.lean*16-3.5, -108*t.s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(t.x+3.5, 0); ctx.quadraticCurveTo(t.x+t.lean*8+3.5, -60*t.s, t.x+t.lean*16+3.5, -108*t.s); ctx.stroke();
  // canopy: clustered lobes with a cel silhouette outline —
  // stroke every lobe first, then refill; only the outer edge survives.
  const cx=t.x+t.lean*16, cy=-130*t.s;
  const lobes=[[0,0,62],[ -40,18,44],[42,20,46],[-16,-34,46],[26,-30,42]];
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=Math.max(3.4*t.s, ART.minInk*1.5);
  for (const [ox,oy,r] of lobes){
    ctx.beginPath(); ctx.ellipse(cx+ox*t.s, cy+oy*t.s, r*t.s, r*0.82*t.s, 0, 0, 7); ctx.stroke();
  }
  for (let i=0;i<lobes.length;i++){
    const [ox,oy,r]=lobes[i];
    ctx.fillStyle = i%2 ? PAL.oak : shade(PAL.oak,1.12);
    ctx.beginPath(); ctx.ellipse(cx+ox*t.s, cy+oy*t.s, r*t.s, r*0.82*t.s, 0, 0, 7); ctx.fill();
  }
  // one hard cel shade + one light kiss, clipped to the canopy
  ctx.save();
  ctx.beginPath();
  for (const [ox,oy,r] of lobes) ctx.ellipse(cx+ox*t.s, cy+oy*t.s, r*t.s, r*0.82*t.s, 0, 0, 7);
  ctx.clip();
  ctx.fillStyle='rgba(30,30,50,0.14)';
  ctx.beginPath(); ctx.ellipse(cx+30*t.s, cy+24*t.s, 52*t.s, 34*t.s, 0.35, 0, 7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.16)';
  ctx.beginPath(); ctx.ellipse(cx-18*t.s, cy-32*t.s, 38*t.s, 22*t.s, -0.3, 0, 7); ctx.fill();
  ctx.restore();
}

function drawCar(ctx, c){
  const id=c.id, x=c.x, y=c.y;
  const W2=c.suv?54:48, H2=c.suv?-34:-26;
  ctx.fillStyle=c.col;
  ctx.beginPath();
  ctx.moveTo(x-W2, y);
  ctx.lineTo(x-W2, y+H2*0.55);
  if (c.suv){ ctx.lineTo(x-W2+8, y+H2); ctx.lineTo(x+W2-10, y+H2); }
  else { ctx.lineTo(x-W2*0.5, y+H2*0.6); ctx.lineTo(x-W2*0.3, y+H2); ctx.lineTo(x+W2*0.42, y+H2); ctx.lineTo(x+W2*0.62, y+H2*0.6); }
  ctx.lineTo(x+W2, y+H2*0.55);
  ctx.lineTo(x+W2, y);
  ctx.closePath(); ctx.fill();
  ctx.save(); ctx.clip();
  ctx.globalAlpha=0.18; ctx.fillStyle='#ffffff';
  ctx.fillRect(x-W2, y+H2, W2*2, -H2*0.4);
  ctx.restore(); ctx.globalAlpha=1;
  // windows
  ctx.fillStyle='#c8d4da';
  if (c.suv) ctx.fillRect(x-W2+12, y+H2+4, W2*2-26, 12);
  else ctx.fillRect(x-W2*0.42, y+H2+3, W2*0.95, 9);
  // wheels
  for (const off of [-W2*0.55, W2*0.55]){
    ctx.fillStyle='#2e2a26';
    ctx.beginPath(); ctx.arc(x+off, y, 8.5, 0, 7); ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.8; ctx.stroke();
    ctx.fillStyle='#b0a48c';
    ctx.beginPath(); ctx.arc(x+off, y, 3.6, 0, 7); ctx.fill();
  }
  wob(ctx, [[x-W2,y],[x-W2,y+H2*0.55],[x-W2+(c.suv?8:14),y+H2],[x+W2-(c.suv?10:18),y+H2],[x+W2,y+H2*0.55],[x+W2,y]], id, {w:1.4});
}

function drawLamp(ctx, x, y, id){
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=3.4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y-104); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y-104); ctx.quadraticCurveTo(x+2, y-116, x+14, y-116); ctx.stroke();
  ctx.fillStyle='#3a3f46';
  ctx.beginPath(); ctx.moveTo(x+6,y-116); ctx.lineTo(x+22,y-116); ctx.lineTo(x+19,y-104); ctx.lineTo(x+9,y-104); ctx.closePath(); ctx.fill();
  ctx.fillStyle=PAL.lampAmber; ctx.globalAlpha=0.9;
  ctx.fillRect(x+10.5, y-112, 7, 7);
  ctx.globalAlpha=1;
}

function drawTempleFront(ctx, x, w, hgt, id, opts){
  opts=opts||{};
  const colH=hgt*0.6, entH=hgt*0.1;
  // steps
  ctx.fillStyle='#ddd2b8';
  ctx.fillRect(x-w/2-10, -8, w+20, 8);
  ctx.fillRect(x-w/2-5, -14, w+10, 6);
  // shadowed portico interior
  ctx.fillStyle='#b9ad92';
  ctx.fillRect(x-w/2, -colH-14, w, colH);
  // door in the shadow
  ctx.fillStyle='#54432f';
  ctx.fillRect(x-w*0.08, -14-w*0.22, w*0.16, w*0.22);
  // columns: real white columns with gaps
  const n=opts.cols||4;
  const colW=w/(n*1.9);
  for (let i=0;i<n;i++){
    const cx=x-w/2 + (i+0.5)*w/n;
    ctx.fillStyle=PAL.colonnade;
    ctx.fillRect(cx-colW/2, -colH-12, colW, colH-2);
    ctx.strokeStyle='rgba(58,47,38,0.5)'; ctx.lineWidth=1;
    ctx.strokeRect(cx-colW/2, -colH-12, colW, colH-2);
  }
  // entablature + pediment
  ctx.fillStyle=PAL.colonnade;
  ctx.fillRect(x-w/2-6, -colH-14-entH, w+12, entH+4);
  washPoly(ctx, [[x-w/2-8,-colH-14-entH],[x+w/2+8,-colH-14-entH],[x,-hgt-14]], PAL.colonnade, id);
  wob(ctx, [[x-w/2-8,-colH-14-entH],[x,-hgt-14],[x+w/2+8,-colH-14-entH],[x-w/2-8,-colH-14-entH]], id, {w:1.5});
  wob(ctx, [[x-w/2-6,-colH-10],[x+w/2+6,-colH-10]], id+3, {w:1.2, alpha:0.7});
  if (opts.cupola){
    ctx.fillStyle=PAL.colonnade;
    ctx.fillRect(x-10, -hgt-36, 20, 22);
    ctx.strokeStyle='rgba(58,47,38,0.5)'; ctx.lineWidth=1;
    ctx.strokeRect(x-10, -hgt-36, 20, 22);
    washPoly(ctx, [[x-13,-hgt-36],[x+13,-hgt-36],[x,-hgt-54]], PAL.shutter, id+4);
    // Old George, the silent witness
    if (ART.detail>=1){
      ctx.fillStyle='#f7f1e2';
      ctx.fillRect(x-2.6, -hgt-68, 5.2, 13);
      ctx.beginPath(); ctx.arc(x, -hgt-71, 3.2, 0, 7); ctx.fill();
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=0.9;
      ctx.strokeRect(x-2.6, -hgt-68, 5.2, 13);
    }
  }
  if (opts.win) opts.win(x, -colH*0.5);
}

const WORLD = { houses:[], trees:[], cars:[], lamps:[], glows:[], smokes:[], hillGlows:[], seedTag:'' };

function buildWorld(){
  WORLD.houses.length=0; WORLD.trees.length=0; WORLD.cars.length=0;
  WORLD.lamps.length=0; WORLD.glows.length=0; WORLD.smokes.length=0;
  const xs=[900, 1640, 2380, 3120, 3860];
  // seed shuffles which frat gets which lot (hero house stays on the Row)
  const order=V2FRATS.slice();
  for (let i=order.length-1;i>0;i--){ const j=Math.floor(rw()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
  order.forEach((frat,i)=>{
    const h={ x:xs[i], frat, id: 1000+i*137, smoke:null, win:()=>{} };
    WORLD.houses.push(h);
    for (let k=0;k<4;k++) WORLD.glows.push({band:'ROW', x:xs[i]-108+k*72, y:-168, kind:'window', hero:frat.hero});
    for (const off of [-108,-72,72,108]) WORLD.glows.push({band:'ROW', x:xs[i]+off, y:-66, kind:'window', hero:frat.hero});
    WORLD.glows.push({band:'ROW', x:xs[i], y:-96, kind:'lamp', hero:frat.hero});
  });
  WORLD.hero=WORLD.houses.find(h=>h.frat.hero);
  // downtown & river lights
  for (const sh of TOWN_SHOPS){
    WORLD.glows.push({band:'TOWN', x:sh.x-14, y:-sh.h+28, kind:'hillwin'});
    if (sh.kind==='cinema') WORLD.glows.push({band:'TOWN', x:sh.x, y:-sh.h+56, kind:'lamp'});
    if (sh.kind==='bar') WORLD.glows.push({band:'TOWN', x:sh.x, y:-22, kind:'lamp'});
  }
  for (const so of V2SORS){
    WORLD.glows.push({band:'TOWN', x:so.x-34, y:-72, kind:'window'});
    WORLD.glows.push({band:'TOWN', x:so.x+34, y:-72, kind:'window'});
  }
  for (const p of POLES){
    WORLD.glows.push({band:'RIVER', x:p.x-20, y:-75, kind:'window'});
    WORLD.glows.push({band:'RIVER', x:p.x, y:-52, kind:'lamp'});
  }
  // trees between and beyond houses
  const treeXs=[540, 1270, 2010, 2750, 3490, 4230, 4480];
  for (let i=0;i<treeXs.length;i++){
    if (hash01(i,99)<0.15) continue;
    WORLD.trees.push({ x:treeXs[i]+ (hash01(i,3)-0.5)*90, s:0.85+hash01(i,4)*0.5, lean:(hash01(i,5)-0.5)*1.6, id:3000+i*61 });
  }
  // bookends: the valley keeps going past where you can pan
  for (const bx of [-420,-180,40,5000,5180,5390]){
    WORLD.trees.push({ x:bx, s:0.8+hash01(bx,4)*0.5, lean:(hash01(bx,5)-0.5)*1.6, id:3400+((bx+500)|0) });
  }
  // lamps along the sidewalk
  for (let x=620; x<=4300; x+=460){
    WORLD.lamps.push({x:x+(hash01(x)<0.5?-14:10), y:24});
    WORLD.glows.push({band:'ROW', x:x+12, y:-92+24, kind:'lamp'});
  }
  // parked era cars
  const carCols=['#4a5d43','#6e3a33','#39465e','#c9bda1','#8c8f94','#3a3d42'];
  const spots=[760, 1180, 1500, 2200, 2560, 2940, 3300, 3700, 4060];
  for (let i=0;i<spots.length;i++){
    if (hash01(i,7)<0.3) continue;
    WORLD.cars.push({ x:spots[i], y:45, suv:hash01(i,8)<0.6, col:carCols[Math.floor(hash01(i,9)*carCols.length)], id:5000+i*17 });
  }
  // window glows for the hill (Colonnade)
  for (const hx of [210,550,880,1210,1550]){
    WORLD.hillGlows.push({band:'HILL', x:hx-34, y:-96, kind:'hillwin'});
    WORLD.hillGlows.push({band:'HILL', x:hx+34, y:-96, kind:'hillwin'});
  }
}

// per-band static painters (called by the tile baker)
const WORLDDRAW = {
  RIDGE(ctx, x0, x1){
    const b=BAND.RIDGE;
    // far ridge — one long soft roll
    ctx.fillStyle=PAL.ridgeFar;
    ctx.beginPath(); ctx.moveTo(x0-20, 30);
    for (let x=x0-20; x<=x1+20; x+=60){
      ctx.lineTo(x, -150 - vnoise(x*0.0012, 11)*90);
    }
    ctx.lineTo(x1+20, 30); ctx.closePath(); ctx.fill();
    // House Mountain — the twin humps, unmistakable
    const hm = 700; // world anchor (pf makes it drift slow)
    ctx.fillStyle=PAL.ridgeMid;
    ctx.beginPath();
    ctx.moveTo(hm-680, 30);
    ctx.quadraticCurveTo(hm-420, -240, hm-190, -252);
    ctx.quadraticCurveTo(hm-80, -258, hm-30, -216);   // Big House saddle-edge
    ctx.quadraticCurveTo(hm+40, -186, hm+120, -212);  // the saddle
    ctx.quadraticCurveTo(hm+230, -244, hm+330, -216); // Little House
    ctx.quadraticCurveTo(hm+560, -140, hm+760, 30);
    ctx.closePath(); ctx.fill();
    // near wooded ridge line — soft rolls with occasional canopy bumps
    ctx.fillStyle=hexLerp(PAL.ridgeMid, PAL.ridgeNear, 0.55);
    ctx.beginPath(); ctx.moveTo(x0-20, 32);
    for (let x=x0-20; x<=x1+20; x+=22){
      let ry=-58 - vnoise(x*0.003, 31)*46;
      ry -= vnoise(x*0.03, 55)>0.62 ? 7 : 0;
      ctx.lineTo(x, ry);
    }
    ctx.lineTo(x1+20, 32); ctx.closePath(); ctx.fill();
  },
  HILL(ctx, x0, x1){
    // the lawn rises to the Colonnade — lighter with distance haze
    ctx.fillStyle=hexLerp(PAL.lawn, '#b8c4b0', 0.38);
    ctx.beginPath();
    ctx.moveTo(x0-20, 170);
    ctx.lineTo(x0-20, -66 - vnoise(x0*0.002, 21)*20);
    for (let x=x0-20;x<=x1+20;x+=50) ctx.lineTo(x, -66 - vnoise(x*0.002, 21)*20);
    ctx.lineTo(x1+20, 170);
    ctx.closePath(); ctx.fill();
    // light patches
    ctx.globalAlpha=0.3; ctx.fillStyle=hexLerp(PAL.lawnLight,'#c8d0be',0.4);
    for (let x=x0;x<x1;x+=270){
      ctx.beginPath(); ctx.ellipse(x+ (vnoise(x,1)*100), -20, 130, 26, 0, 0, 7); ctx.fill();
    }
    ctx.globalAlpha=1;
    // brick walk along the crest
    ctx.strokeStyle='#a86a52'; ctx.lineWidth=7;
    ctx.beginPath(); ctx.moveTo(x0-20,-52);
    for (let x=x0-20;x<=x1+20;x+=90) ctx.lineTo(x, -52 - vnoise(x*0.003, 41)*8);
    ctx.stroke();
    // the five halls: temple fronts on the crest (fixed world positions)
    const halls=[
      {x:210,  w:200, h:150, cupola:false, cols:6},
      {x:550,  w:170, h:140, cupola:false, cols:4},
      {x:880,  w:210, h:168, cupola:true,  cols:6},   // center hall, Old George on top
      {x:1210, w:170, h:140, cupola:false, cols:4},
      {x:1550, w:200, h:150, cupola:false, cols:6},
    ];
    for (const t of halls){
      if (t.x+t.w<x0-60 || t.x-t.w>x1+60) continue;
      ctx.save(); ctx.translate(0,-58);
      drawTempleFront(ctx, t.x, t.w, t.h, 7000+t.x, t);
      ctx.restore();
    }
    // scattered crest trees
    for (let x=Math.floor(x0/230)*230; x<x1+230; x+=230){
      const gx=x+vnoise(x,71)*120;
      if (gx>60 && gx<1720) continue; // keep the colonnade clear
      const s=0.36+vnoise(x,72)*0.2;
      ctx.save(); ctx.translate(gx, -46); ctx.scale(1,1);
      drawTree(ctx, {x:0, s, lean:(vnoise(x,73)-0.5), id:7100+x});
      ctx.restore();
    }
  },
  ROW(ctx, x0, x1){
    // back lawn: a soft strip that meets the hill, not a wall
    ctx.fillStyle=PAL.lawn;
    ctx.beginPath();
    ctx.moveTo(x0-20, 22);
    ctx.lineTo(x0-20, -64);
    for (let x=x0-20;x<=x1+20;x+=60) ctx.lineTo(x, -64 - vnoise(x*0.0035, 81)*14);
    ctx.lineTo(x1+20, 22);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha=0.3; ctx.fillStyle=PAL.lawnLight;
    for (let x=Math.floor(x0/300)*300;x<x1;x+=300){
      ctx.beginPath(); ctx.ellipse(x+150, -20-vnoise(x,81)*20, 170, 26, 0, 0, 7); ctx.fill();
    }
    ctx.globalAlpha=1;
    // sidewalk
    ctx.fillStyle=PAL.sidewalk;
    ctx.fillRect(x0-20, 18, x1-x0+40, 14);
    wob(ctx, [[x0-20,18],[x1+20,18]], 901, {w:1.2, alpha:0.6});
    // expansion joints
    if (ART.detail>=1){
      ctx.strokeStyle='rgba(58,47,38,0.3)'; ctx.lineWidth=1;
      for (let x=Math.floor(x0/56)*56;x<x1;x+=56){
        ctx.beginPath(); ctx.moveTo(x,19); ctx.lineTo(x,31); ctx.stroke();
      }
    }
    // grass verge under everything below the street
    ctx.fillStyle=shade(PAL.lawn,0.96);
    ctx.fillRect(x0-20, 66, x1-x0+40, 66);
    // the street
    ctx.fillStyle=PAL.asphalt;
    ctx.fillRect(x0-20, 32, x1-x0+40, 38);
    ctx.fillStyle=PAL.asphaltEdge;
    ctx.fillRect(x0-20, 32, x1-x0+40, 3);
    if (ART.detail>=1){
      ctx.strokeStyle='rgba(244,234,214,0.5)'; ctx.lineWidth=2; ctx.setLineDash([16,22]);
      ctx.beginPath(); ctx.moveTo(x0-20, 52); ctx.lineTo(x1+20, 52); ctx.stroke();
      ctx.setLineDash([]);
    }
    // set pieces by x
    for (const t of WORLD.trees) if (t.x>x0-200 && t.x<x1+200) drawTree(ctx, t);
    for (const h of WORLD.houses) if (!h.frat.hero && h.x>x0-260 && h.x<x1+260) drawFratHouse(ctx, h);
    for (const l of WORLD.lamps) if (l.x>x0-40 && l.x<x1+40) drawLamp(ctx, l.x, l.y, 6000+l.x);
    for (const c of WORLD.cars) if (c.x>x0-80 && c.x<x1+80) drawCar(ctx, c);
  },

};

// ==== §12 SKY & ATMOSPHERE ==================================================
function skyStops(hour){
  const st=PAL.sky.stops;
  let a=st[0], b=st[st.length-1];
  for (let i=0;i<st.length-1;i++) if (hour>=st[i][0] && hour<=st[i+1][0]){ a=st[i]; b=st[i+1]; break; }
  const t=(hour-a[0])/Math.max(0.001,b[0]-a[0]);
  return { top:hexLerp(a[1],b[1],t), hor:hexLerp(a[2],b[2],t), tint:hexLerp(a[3],b[3],t), glow:lerp(a[4],b[4],t), t };
}
let CLOUDS=null;
function makeClouds(){
  CLOUDS=[];
  for (let i=0;i<4;i++){
    const c=document.createElement('canvas'); c.width=340; c.height=120;
    const g=c.getContext('2d');
    g.fillStyle='#ffffff';
    const n=5+Math.floor(hash01(i,1)*3);
    for (let j=0;j<n;j++){
      const bx=62+hash01(i,j,2)*216, by=54+hash01(i,j,3)*30, r=20+hash01(i,j,4)*24;
      g.beginPath(); g.ellipse(bx,by,r,r*0.62,0,0,7); g.fill();
    }
    g.globalCompositeOperation='source-atop';
    g.fillStyle='rgba(210,200,220,0.5)';
    g.fillRect(0,68,340,60);
    CLOUDS.push({cv:c, x:hash01(i,5)*3000, y:30+hash01(i,6)*90, s:0.5+hash01(i,7)*0.55, v:2+hash01(i,8)*3});
  }
}
let STARS=null;
function makeStars(){

function drawSky(ctx, sk, hour, rt){
  const grd=ctx.createLinearGradient(0,0,0,view.h*0.85);
  grd.addColorStop(0, sk.top); grd.addColorStop(1, sk.hor);
  ctx.fillStyle=grd; ctx.fillRect(0,0,view.w,view.h);
  // stars
  const night=hour<5.6||hour>20.2;
  if (night||sk.glow>0.75){
    ctx.globalAlpha=clamp((sk.glow-0.6)*2.4,0,0.9);
    ctx.drawImage(STARS, 0,0, view.w, view.h*0.5);
    ctx.globalAlpha=1;
  }
  // sun / moon
  const dayT=clamp((hour-6.2)/13.4,0,1);
  if (dayT>0 && dayT<1){
    const sx=view.w*(0.12+0.76*dayT) - (CAM.x-2400)*0.02;
    const sy=view.h*0.62 - Math.sin(dayT*Math.PI)*view.h*0.5;
    ctx.fillStyle='rgba(255,236,190,0.9)';
    ctx.beginPath(); ctx.arc(sx,sy,26,0,7); ctx.fill();
    ctx.globalAlpha=0.35;
    ctx.beginPath(); ctx.arc(sx,sy,48,0,7); ctx.fill();
    ctx.globalAlpha=1;
  }
  if (night){
    const mT=clamp(((hour+3.8)%24)/9,0,1);
    const mx=view.w*(0.2+0.6*mT), my=view.h*0.34 - Math.sin(mT*Math.PI)*view.h*0.14;
    ctx.fillStyle='rgba(238,240,248,0.95)';
    ctx.beginPath(); ctx.arc(mx,my,17,0,7); ctx.fill();
    ctx.fillStyle=sk.top;
    ctx.beginPath(); ctx.arc(mx-7,my-4,15,0,7); ctx.fill();
  }
  // clouds drift with a hint of parallax
  for (const cl of CLOUDS){
    const cx=((cl.x + rt*cl.v - CAM.x*0.05) % (view.w+700)) - 350;
    ctx.globalAlpha=0.32;
    ctx.drawImage(cl.cv, cx, cl.y, 340*cl.s, 120*cl.s);
    ctx.globalAlpha=1;
  }
}
let GLOWSPR=null;
function makeGlowSprite(){
  GLOWSPR=document.createElement('canvas'); GLOWSPR.width=GLOWSPR.height=64;
  const g=GLOWSPR.getContext('2d');
  const grd=g.createRadialGradient(32,32,3,32,32,31);
  grd.addColorStop(0,'rgba(255,214,138,0.85)');
  grd.addColorStop(0.4,'rgba(255,190,100,0.32)');
  grd.addColorStop(1,'rgba(255,180,90,0)');
  g.fillStyle=grd; g.fillRect(0,0,64,64);
}
function glowAlpha(hour){
  if (hour>=17.4 && hour<19.6) return smoothstep(17.4,19.2,hour);
  if (hour>=19.6 || hour<5.4) return 1;
  if (hour>=5.4 && hour<7.2) return 1-smoothstep(5.4,7.0,hour);
  return 0;
}
function drawGlows(ctx, hour, rt){
  const ga=glowAlpha(hour);
  if (ga<=0.01) return;
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const all=WORLD.glows.concat(WORLD.hillGlows);
  for (const g of all){
    const band=BAND[g.band];
    const fgB=(g.band==='TOWN'||g.band==='RIVER');
    if (fgB && CAM.fade>0.9) continue;   // their bands have bowed out
    const sx=projX(band, g.x);
    if (sx<-80||sx>view.w+80) continue;
    const dy=fgB?CAM.fade*view.h*0.6:0;
    const sy=groundY(band)+g.y*CAM.z+dy;
    const pty = (g.band==='ROW' && g.kind==='window' && typeof houseParty==='function') ? houseParty(g.x) : null;
    const lit = pty ? 1 : (g.kind==='lamp' ? 1 : (hash01(g.x, g.y, Math.floor(hour<12?hour+24:hour))<0.72 ? 1 : 0));
    if (!lit) continue;
    const flick = (0.92+vnoise(rt*0.8, g.x*0.13)*0.16) * (pty ? 1.15+0.18*Math.sin(rt*11+g.x) : 1);
    const r=(g.kind==='lamp'?58:g.kind==='hillwin'?15:38)*CAM.z*flick;
    ctx.globalAlpha=ga*(g.kind==='lamp'?0.85:g.kind==='hillwin'?0.3:0.6)
      *(g.hero?clamp(1-HERO.openT*1.1,0,1):1)*(fgB?1-CAM.fade:1);
    ctx.drawImage(GLOWSPR, sx-r, sy-r, r*2, r*2);
    if (g.kind==='lamp'){
      ctx.globalAlpha=ga*0.28*(fgB?1-CAM.fade:1);
      ctx.drawImage(GLOWSPR, sx-r*1.4, groundY(band)+18*CAM.z+dy-r*0.5, r*2.8, r);
    }
    if (g.kind==='window'){
      // the pane itself goes warm
      ctx.globalAlpha=ga*0.8*(g.hero?clamp(1-HERO.openT*1.1,0,1):1);
      ctx.fillStyle=PAL.windowGlow;
      const w=15*CAM.z, h2=21*CAM.z;
      ctx.fillRect(sx-w/2, sy-h2/2, w, h2);
    }
  }
  ctx.restore();
}

const FIGS=[];
function makeWalker(i){
  const dir=hash01(i,1)<0.5?1:-1;
  return {
    x: 500+hash01(i,2)*3800, dir,
    speed: 42+hash01(i,3)*26,
    band:'ROW', gy: 24,
    polo: PAL.polos[Math.floor(hash01(i,4)*PAL.polos.length)],
    skin: ['#e8c49a','#dfb98f','#c98f62','#8a5a3a','#f0d0aa'][Math.floor(hash01(i,5)*5)],
    hair: ['#2a2018','#4a3520','#6a4a28','#8a6a3a','#b89b62'][Math.floor(hash01(i,6)*5)],
    hat: hash01(i,7)<0.3, female: hash01(i,8)<0.3,
    phase: hash01(i,9)*7, lastHey: -99, id:i,
  };
}
function drawFigure(ctx, f, rt){
  const stride=Math.sin(f.phase*6.6);
  const bob=Math.abs(Math.cos(f.phase*6.6))*1.6;
  ctx.save();
  ctx.scale(f.dir,1);
  // shadow
  ctx.fillStyle='rgba(58,47,38,0.18)';
  ctx.beginPath(); ctx.ellipse(0,1.5,11,3,0,0,7); ctx.fill();
  ctx.translate(0,-bob);
  // legs — khaki
  ctx.strokeStyle=f.female?'#7a6a5a':PAL.khaki;
  ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(6*stride, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(-6*stride, 0); ctx.stroke();
  // shoes
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(6*stride,0); ctx.lineTo(6*stride+3,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-6*stride,0); ctx.lineTo(-6*stride+3,0); ctx.stroke();
  if (f.female){
    // sundress silhouette
    ctx.fillStyle=f.polo;
    ctx.beginPath();
    ctx.moveTo(-8,-16); ctx.lineTo(8,-16); ctx.lineTo(5,-36); ctx.lineTo(-5,-36); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2; ctx.stroke();
  } else {
    // polo torso
    ctx.fillStyle=f.polo;
    ctx.beginPath();
    ctx.moveTo(-7,-16); ctx.lineTo(7,-16); ctx.lineTo(8,-36); ctx.lineTo(-8,-36); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2; ctx.stroke();
    // collar (popped, obviously)
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillRect(-5,-38,10,3.5);
  }
  // arms swing
  ctx.strokeStyle=f.female?f.polo:f.polo;
  ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(0,-33); ctx.lineTo(-7*stride, -20); ctx.stroke();
  ctx.strokeStyle=f.skin; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(-7*stride,-21); ctx.lineTo(-8*stride,-18); ctx.stroke();
  // head
  ctx.fillStyle=f.skin;
  ctx.beginPath(); ctx.arc(1,-46,10,0,7); ctx.fill();
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(1,-46,10,0,7); ctx.stroke();
  // hair / hat
  if (f.hat){
    ctx.fillStyle='#5a6a52';
    ctx.beginPath(); ctx.arc(1,-50,9.6,Math.PI,0); ctx.fill();
    ctx.fillRect(1,-51.5,13,3);
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(1,-50,9.6,Math.PI,0); ctx.stroke();
  } else if (f.female){
    ctx.fillStyle=f.hair;
    ctx.beginPath(); ctx.arc(1,-49,9.8,Math.PI*0.9,Math.PI*0.1); ctx.fill();
    ctx.fillRect(-9,-49,4,14); // ponytail-ish fall
  } else {
    ctx.fillStyle=f.hair;
    ctx.beginPath(); ctx.arc(1,-49.5,9.4,Math.PI*0.95,Math.PI*0.05); ctx.fill();
  }
  // face dot eyes when close
  if (CAM.z>0.85){
    ctx.fillStyle=PAL.ink;
    ctx.beginPath(); ctx.arc(5,-47,1.1,0,7); ctx.fill();
  }
  ctx.restore();
}

const DOG={x:1500, dir:1, phase:0, pauseT:0};
function dogTick(dt){
  if (DOG.pauseT>0){ DOG.pauseT-=dt; return; }
  DOG.x+=DOG.dir*74*dt; DOG.phase+=dt*9;
  if (hash01(Math.floor(DOG.x/160))<0.12 && Math.abs(DOG.x%160)<4) DOG.pauseT=1.6+hash01(DOG.x)*2; // something smelled important
  if (DOG.x<420) DOG.dir=1;
  if (DOG.x>4560) DOG.dir=-1;
}
function drawDog(ctx){
  if (HERO.openT>0.85) return;
  const band=BAND.ROW, gy=groundY(band);
  const sx=projX(band, DOG.x);
  if (sx<-40||sx>view.w+40) return;
  ctx.save();
  ctx.globalAlpha=clamp(1-HERO.openT*1.15,0,1);
  ctx.save();
  ctx.translate(sx, gy+26*CAM.z);
  ctx.scale(CAM.z*DOG.dir, CAM.z);
  const trot=DOG.pauseT>0?0:Math.sin(DOG.phase*2);
  ctx.fillStyle='rgba(58,47,38,0.15)';
  ctx.beginPath(); ctx.ellipse(0,1,13,2.6,0,0,7); ctx.fill();
  ctx.fillStyle='#7a5c3e';
  ctx.beginPath(); ctx.ellipse(0,-9,11,6,0,0,7); ctx.fill();       // body
  ctx.beginPath(); ctx.arc(11,-13,4.6,0,7); ctx.fill();            // head
  ctx.beginPath(); ctx.moveTo(11,-17); ctx.lineTo(9,-21); ctx.lineTo(13,-19); ctx.closePath(); ctx.fill(); // ear
  ctx.strokeStyle='#7a5c3e'; ctx.lineWidth=2.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-6,-5); ctx.lineTo(-6+trot*2.5,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,-5); ctx.lineTo(6-trot*2.5,0); ctx.stroke();
  const wag=DOG.pauseT>0?Math.sin(performance.now()*0.02)*3:Math.sin(DOG.phase*3)*2;
  ctx.beginPath(); ctx.moveTo(-11,-11); ctx.quadraticCurveTo(-15,-14+wag,-17,-16+wag); ctx.stroke();
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=0.9;
  ctx.beginPath(); ctx.ellipse(0,-9,11,6,0,0,7); ctx.stroke();
  ctx.fillStyle=PAL.ink;
  ctx.beginPath(); ctx.arc(14.5,-13.5,0.9,0,7); ctx.fill();        // nose
  ctx.restore();
  ctx.restore();
}
function figTick(dt, rt){
  dogTick(dt);
  for (const f of FIGS){
    f.x += f.dir*f.speed*dt;
    f.phase += f.speed*dt/34;
    if (f.x<380){ f.dir=1; } if (f.x>4620){ f.dir=-1; }
  }
  // the Speaking Tradition
  for (let i=0;i<FIGS.length;i++) for (let j=i+1;j<FIGS.length;j++){
    const a=FIGS[i],b=FIGS[j];
    if (a.dir===b.dir) continue;
    const d=Math.abs(a.x-b.x);
    if (d<34 && rt-a.lastHey>7 && rt-b.lastHey>7){
      a.lastHey=rt; b.lastHey=rt;
      addBubble(a, HEYS[Math.floor(hash01(a.id,b.id,Math.floor(rt))*HEYS.length)]);
      setTimeout(()=>{}, 0);
      addBubble(b, HEYS[Math.floor(hash01(b.id,a.id,Math.floor(rt)+1)*HEYS.length)], 1.5);
    }
  }
}
function drawFigures(ctx, rt){
  if (HERO.openT>0.85) return;   // the sidewalk is buried under the cross-section
  const band=BAND.ROW, gy=groundY(band);
  ctx.save();
  ctx.globalAlpha=clamp(1-HERO.openT*1.15,0,1);
  for (const f of FIGS){
    const sx=projX(band, f.x);
    if (sx<-60||sx>view.w+60) continue;
    ctx.save();
    ctx.translate(sx, gy+f.gy*CAM.z);
    ctx.scale(CAM.z, CAM.z);
    drawFigure(ctx, f, rt);
    ctx.restore();
  }
  ctx.restore();
}
function drawBubbles(ctx){
  if (HERO.openT>0.5){ BUBBLES.length=0; return; }   // no heys from buried sidewalks
  const now=performance.now()/1000;
  const band=BAND.ROW, gy=groundY(band);
  for (let i=BUBBLES.length-1;i>=0;i--){
    const b=BUBBLES[i];
    const age=now-b.t0;
    if (age>b.dur){ BUBBLES.splice(i,1); continue; }
    const f=b.fig;
    const sx=projX(band,f.x), sy=gy+(f.gy-62)*CAM.z;
    if (sx<-80||sx>view.w+80) continue;
    const a=age<0.15?age/0.15 : age>b.dur-0.3 ? (b.dur-age)/0.3 : 1;
    ctx.save();
    ctx.globalAlpha=a;
    ctx.font='bold 12px Verdana, sans-serif';
    const w=ctx.measureText(b.txt).width;
    const bx=sx-w/2-9, by=sy-31, bw=w+18, bh=22;
    ctx.fillStyle='rgba(255,255,255,0.97)';
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=2.2; ctx.lineJoin='round';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(bx,by,bw,bh,10); else ctx.rect(bx,by,bw,bh);
    ctx.fill(); ctx.stroke();
    // tail
    ctx.beginPath(); ctx.moveTo(sx-5,by+bh-1); ctx.lineTo(sx,by+bh+8); ctx.lineTo(sx+6,by+bh-1);
    ctx.closePath(); ctx.fillStyle='#ffffff'; ctx.fill(); ctx.stroke();
    ctx.fillStyle='#ffffff'; ctx.fillRect(sx-5,by+bh-2.6,11,3.6);
    ctx.fillStyle=PAL.ink;
    ctx.fillText(b.txt, bx+9, by+15);
    ctx.restore();
  }
}
// chimney smoke + birds (ambient decoration)
function drawSmoke(ctx, rt){
  const band=BAND.ROW, gy=groundY(band);
  for (const h of WORLD.houses){
    if (!h.smoke) continue;
    if (hash01(h.id,44)<0.3) continue;   // not every chimney smokes
    const sx=projX(band,h.smoke[0]);
    if (sx<-100||sx>view.w+100) continue;
    const sy=gy+h.smoke[1]*CAM.z;
    ctx.fillStyle='rgba(220,212,198,0.4)';
    for (let i=0;i<4;i++){
      const t=((rt*0.16)+i*0.25+hash01(h.id,i)*0.2)%1;
      const px=sx+Math.sin((t*4+h.id)*1.8)*10*CAM.z*(0.5+t);
      const py=sy-t*66*CAM.z;
      const r=(4+t*9)*CAM.z;
      ctx.globalAlpha=0.35*(1-t);
      ctx.beginPath(); ctx.arc(px,py,r,0,7); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}
let BIRDS={t:-10, x:0, y:0};
function drawBirds(ctx, rt){
  if (rt-BIRDS.t>26){ BIRDS={t:rt, x:-100, y:80+Math.random()*160, n:2+Math.floor(Math.random()*3)}; }
  const age=rt-BIRDS.t;
  const bx=-100+age*90;
  if (bx>view.w+100) return;
  ctx.strokeStyle='rgba(58,47,38,0.75)'; ctx.lineWidth=1.6;
  for (let i=0;i<BIRDS.n;i++){
    const px=bx-i*26, py=BIRDS.y+Math.sin((rt*3+i))*4+i*7;
    const fl=Math.sin(rt*9+i*2)*3;
    ctx.beginPath();
    ctx.moveTo(px-6,py-fl); ctx.quadraticCurveTo(px,py+2,px,py);
    ctx.quadraticCurveTo(px,py+2,px+6,py-fl);
    ctx.stroke();
  }
}

const view={w:0,h:0,dpr:1};
let cv, cx2d;
function resize(){
  view.dpr=Math.min(window.devicePixelRatio||1, view.dprCap||2);
  view.w=window.innerWidth; view.h=window.innerHeight;
  cv.width=view.w*view.dpr; cv.height=view.h*view.dpr;
  cv.style.width=view.w+'px'; cv.style.height=view.h+'px';
}
function bindInput(){
  let lx=0, lt=0, vAcc=0;
  cv.addEventListener('pointerdown',e=>{
    CAM.dragging=true; CAM.velX=0; vAcc=0;
    lx=e.clientX; lt=performance.now();
    cv.classList.add('dragging'); cv.setPointerCapture(e.pointerId);
  });
  cv.addEventListener('pointerup',()=>{
    CAM.dragging=false; CAM.velX=vAcc;
    cv.classList.remove('dragging');
  });
  cv.addEventListener('pointermove',e=>{
    if (!CAM.dragging) return;
    const now=performance.now();
    const dx=e.clientX-lx, dtm=Math.max(8, now-lt);
    lx=e.clientX; lt=now;
    const dwu=-dx/(CAM.z*BAND.ROW.pf);
    // the edge resists, it doesn't wall
    const lo=camMinX(CAM.tz), hi=camMaxX(CAM.tz);
    let nx=CAM.tx+dwu;
    if (nx<lo) nx=lo-(lo-nx)*0.25;
    if (nx>hi) nx=hi+(nx-hi)*0.25;
    CAM.tx=nx;
    vAcc=vAcc*0.6 + (dwu*1000/dtm)*0.4;   // flick velocity, smoothed
  });
  cv.addEventListener('wheel',e=>{
    e.preventDefault();
    const oldZ=CAM.tz;
    CAM.tz=clamp(CAM.tz*Math.exp(-e.deltaY*0.0013), zMinDyn(), zMaxDyn());
    // zoom toward the cursor (ROW band anchor)
    const wx=(e.clientX-view.w*0.5)/(oldZ)+CAM.tx*BAND.ROW.pf;
    CAM.tx=clamp((wx-(e.clientX-view.w*0.5)/CAM.tz)/BAND.ROW.pf, camMinX(CAM.tz), camMaxX(CAM.tz));
  },{passive:false});
  window.addEventListener('resize', resize);
}
function updateHUD(){
  const d=CLOCK.derive();
  const h12=((d.hh+11)%12)+1, mm=d.mm<10?'0'+d.mm:d.mm;
  document.getElementById('d1').textContent=DOW[d.dow]+', '+MONTHS[d.month]+' '+d.dayInMonth;
  const yr=1999+((SEEDH>>>3)%5)+d.year;
  document.getElementById('d2').textContent=h12+':'+mm+' '+(d.hh>=12?'PM':'AM')+' · '+(d.month<4?'fall':'spring')+' semester · '+yr;
  document.body.classList.toggle('night', glowAlpha(CLOCK.hourFloat()%24)>0.6);
  updateNudge();
}

function parseSeed(){
  const m=location.hash.match(/s=([A-Za-z0-9_-]+)/);
  if (m) return m[1];
  const s=Math.random().toString(36).slice(2,8);
  history.replaceState(null,'','#s='+s);
  return s;
}
window.addEventListener('hashchange',()=>location.reload());
let _lastT=0;
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min(0.1,(ts-_lastT)/1000||0.016);
  _lastT=ts;
  const rt=ts/1000;
  TILES.bakedThisFrame=0;
  // clock
  CLOCK.frac+=dt*CLOCK.speed/15;
  while (CLOCK.frac>=1){ CLOCK.frac-=1; CLOCK.t++; }
  // camera easing (a long slow settle on boot, brisk afterward)
  const k=1-Math.exp(-dt*(CAM.settle>0?1.5:6));
  if (CAM.settle>0) CAM.settle-=dt;
  if (!CAM.dragging){
    // released momentum, then spring back inside bounds
    if (Math.abs(CAM.velX)>2){ CAM.tx+=CAM.velX*dt; CAM.velX*=Math.exp(-dt*3.2); }
    const cx=clamp(CAM.tx, camMinX(CAM.tz), camMaxX(CAM.tz));
    CAM.tx+=(cx-CAM.tx)*Math.min(1,dt*8);
    // once you lean in, the hero house is gently magnetic —
    // "zoom into the house" always lands the composed shot
    if (CAM.z>1.4 && HERO.h){
      const want=HERO.h.x/BAND.ROW.pf;
      if (Math.abs(want-CAM.tx)*BAND.ROW.pf*CAM.z<view.w*0.38)
        CAM.tx+=(want-CAM.tx)*Math.min(1,dt*1.5);
    }
  }
  CAM.tz=clamp(CAM.tz, zMinDyn(), zMaxDyn());
  CAM.x+=(CAM.tx-CAM.x)*k; CAM.z+=(CAM.tz-CAM.z)*k;
  CAM.yStage=camYStage();
  CAM.fade=smoothstep(1.25, 1.85, CAM.z);   // the foreground bands bow out
  figTick(dt, rt);
  specialsTick(dt, rt);
  audioTick(dt, rt);
  perfTick(dt);
  // ---- draw
  const ctx=cx2d;
  ctx.setTransform(view.dpr,0,0,view.dpr,0,0);
  const hour=CLOCK.hourFloat()%24;
  const sk=skyStops(hour);
  drawSky(ctx, sk, hour, rt);
  drawBirds(ctx, rt);
  stageHero();
  stageOthers();
  HIT.length=0;
  // hero house open/closed: a committed state with hysteresis, animated —
  // never the half-ghost of a fractional focus
  {
    const off=Math.abs(projX(BAND.ROW, HERO.h.x)-view.w*0.5);
    if (!HERO.open && CAM.z>1.55 && off<view.w*0.3) HERO.open=true;
    if (HERO.open && (CAM.z<1.32 || off>view.w*0.6)) HERO.open=false;
    HERO.openT+=((HERO.open?1:0)-HERO.openT)*Math.min(1,dt*5);
  }
  for (const b of BANDS){
    const fg=(b.id==='TOWN'||b.id==='RIVER');
    if (fg && CAM.fade>0.985) continue;   // theater flats, fully offstage
    if (fg){ ctx.save(); ctx.globalAlpha=1-CAM.fade; ctx.translate(0, CAM.fade*view.h*0.6); }
    drawBandTiles(ctx, b);
    if (b.id==='HILL') drawHillLife(ctx, rt);
    if (b.id==='TOWN') drawTownLife(ctx, rt);
    if (b.id==='RIVER') drawRiverLife(ctx, rt);
    if (fg) ctx.restore();
    if (b.id==='ROW'){
      const openT=HERO.openT;
      // world-space dynamic drawing for the hero house
      const wx=()=>ctx.setTransform(view.dpr*CAM.z,0,0,view.dpr*CAM.z,
        view.dpr*(view.w*0.5-CAM.x*b.pf*CAM.z), view.dpr*groundY(b));
      artForBucket(clamp(CAM.z,0.5,2.5));
      if (openT>0.02){ wx(); drawHeroShell(ctx, rt); }
      ctx.setTransform(view.dpr,0,0,view.dpr,0,0);
      drawHeroActors(ctx, rt, openT);
      if (openT<0.97){
        wx();
        ctx.globalAlpha=1-openT;
        drawFratHouse(ctx, WORLD.hero);
        ctx.globalAlpha=1;
      }
      artForBucket(1);
      ctx.setTransform(view.dpr,0,0,view.dpr,0,0);
      drawSmoke(ctx, rt);
      drawOthers(ctx, rt);
      drawParties(ctx, rt);
      drawFigures(ctx, rt);
      drawDog(ctx);
      drawGags(ctx, rt);
      drawSpecials(ctx, rt);
    }
  }
  drawWorldBubbles(ctx);
  // day tint (multiply), feathered off the sky so dusk doesn't double-dip
  if (sk.tint!=='#ffffff'){
    ctx.globalCompositeOperation='multiply';
    const horizon=groundY(BAND.RIDGE)-120*CAM.z;
    const tg=ctx.createLinearGradient(0,Math.max(0,horizon-140),0,Math.max(1,horizon+90));
    tg.addColorStop(0,'rgba(255,255,255,1)');
    tg.addColorStop(1,sk.tint);
    ctx.fillStyle=tg;
    if (HERO.openT>0.03 && glowAlpha(hour)>0.02){
      // the open dollhouse is a lantern — night falls around it, not on it.
      // the mask is the house's own silhouette, so nothing reads as a rectangle
      const gy=groundY(BAND.ROW), hx=HERO.h.x;
      const sil=()=>{
        ctx.moveTo(projX(BAND.ROW,hx-162), gy+66*CAM.z);
        ctx.lineTo(projX(BAND.ROW,hx-162), gy-200*CAM.z);
        ctx.lineTo(projX(BAND.ROW,hx-90),  gy-250*CAM.z);
        ctx.lineTo(projX(BAND.ROW,hx+90),  gy-250*CAM.z);
        ctx.lineTo(projX(BAND.ROW,hx+162), gy-200*CAM.z);
        ctx.lineTo(projX(BAND.ROW,hx+162), gy+66*CAM.z);
        ctx.closePath();
      };
      ctx.save();
      ctx.beginPath(); ctx.rect(0,0,view.w,view.h); sil();
      ctx.clip('evenodd');
      ctx.fillRect(0,0,view.w,view.h);
      ctx.restore();
      ctx.save();
      ctx.beginPath(); sil(); ctx.clip();
      ctx.globalAlpha=1-HERO.openT*0.75;   // the interior keeps a quarter of the night
      ctx.fillRect(0,0,view.w,view.h);
      ctx.restore();
      ctx.globalAlpha=1;
    } else {
      ctx.fillRect(0,0,view.w,view.h);
    }
    ctx.globalCompositeOperation='source-over';
  }
  if (HERO.openT>0.05){
    const ga2=glowAlpha(hour);
    if (ga2>0.02){
      ctx.save();
      ctx.setTransform(view.dpr*CAM.z,0,0,view.dpr*CAM.z,
        view.dpr*(view.w*0.5-CAM.x*BAND.ROW.pf*CAM.z), view.dpr*groundY(BAND.ROW));
      ctx.globalCompositeOperation='lighter';
      for (const r of HERO.rooms){
        if (r.outdoor) continue;
        ctx.fillStyle='rgba(255,186,104,'+(0.3*HERO.openT*ga2)+')';
        ctx.fillRect(r.x, r.floorY-r.h, r.w, r.h);
      }
      ctx.restore();
    }
  }
  drawGlows(ctx, hour, rt);
  drawBubbles(ctx);
  drawRain(ctx, rt);
  // soft vignette
  const vg=ctx.createRadialGradient(view.w/2,view.h/2,view.h*0.42,view.w/2,view.h/2,view.h*0.95);
  vg.addColorStop(0,'rgba(58,47,38,0)');
  vg.addColorStop(1,'rgba(58,47,38,0.10)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,view.w,view.h);
  dialDraw();
  updateHUD();
  DBG.frames++;
}

function newPerson(kind, orgKey, classYear, rnd){
  const male = kind!=='SOROR' && kind!=='COOK';
  const g=(n)=>hash01(PEOPLE.length*17.13, n*7.7);
  const first = kind==='COOK' ? COOK_NAMES[Math.floor(rnd()*COOK_NAMES.length)] : male? M_FIRST[Math.floor(rnd()*M_FIRST.length)] : F_FIRST[Math.floor(rnd()*F_FIRST.length)];
  const last = kind==='COOK' ? '' : SURNAMES[Math.floor(rnd()*SURNAMES.length)];
  const nick = (male && kind==='BROTHER' && rnd()<0.4) ? NICKNAMES[Math.floor(rnd()*NICKNAMES.length)] : null;
  const p={
    pid:PEOPLE.length, kind, orgKey, classYear,
    first, last, nick, name: nick||first,
    full: kind==='COOK' ? first : (nick? first+' “'+nick+'” '+last : first+' '+last),
    skin: SKINS[Math.floor(g(1)*SKINS.length)],
    hair: HAIRS[Math.floor(g(2)*HAIRS.length)],
    polo: PAL.polos[Math.floor(g(3)*PAL.polos.length)],
    hat: g(8)<0.2, female: !male,
    tag: null, mentions:0,
  };
  PEOPLE.push(p);
  return p;
}

}

function buildRosters(){
  for (const h of WORLD.houses){
    h.roster=[];
    const isHero=h.frat.hero;
    for (let cy=1;cy<=4;cy++){
      const n=isHero?7:5;
      for (let i=0;i<n;i++){
        const p=newPerson('BROTHER', h.frat.key, cy, RNG.name);
        h.roster.push(p.pid);
      }
    }
    // routine tags: hero house gets the full cast of characters
    const bros=h.roster.map(pid=>PEOPLE[pid]);
    const tagPool = isHero ? TAGS.slice() : ['napper','porchFixture','auxHog','pokerShark','gymRat'];
    let ti=0;
    for (const p of bros){
      if (hash01(p.pid,5)<(isHero?0.7:0.3) && ti<tagPool.length){
        p.tag=tagPool[ti++];
      }
    }
    // the boys' factions live in the tags: noodler/tapehead = stoner mystics,
    // movieNerd/riffKing = the Core society
    if (isHero){ h.cook = newPerson('COOK', h.frat.key, 0, RNG.name); }
  }
}

// ==== §7 POSE RIG ===========================================================
// One little body, many poses. All draw at ground anchor, y-up negative,
// scaled by caller. dir=±1. f = anim phase 0..1.
function rigCore(ctx, p, opts){
  opts=opts||{};
  // torso + head + hair; limbs are the pose's job
  const tor=opts.torsoAt||[0,-16];
  ctx.save();
  ctx.translate(tor[0], 0);
  if (p.female){
    ctx.fillStyle=p.polo;
    ctx.beginPath(); ctx.moveTo(-8,tor[1]); ctx.lineTo(8,tor[1]); ctx.lineTo(5,tor[1]-20); ctx.lineTo(-5,tor[1]-20); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.stroke();
  } else if (p.kind==='COOK'){
    ctx.fillStyle='#e8e2d2';
    ctx.beginPath(); ctx.moveTo(-9,tor[1]); ctx.lineTo(9,tor[1]); ctx.lineTo(8,tor[1]-21); ctx.lineTo(-8,tor[1]-21); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.stroke();
    ctx.fillStyle='#c05a4a'; ctx.fillRect(-6,tor[1]-8,12,6); // apron bib
  } else {
    ctx.fillStyle=p.polo;
    ctx.beginPath(); ctx.moveTo(-7,tor[1]); ctx.lineTo(7,tor[1]); ctx.lineTo(8,tor[1]-20); ctx.lineTo(-8,tor[1]-20); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fillRect(-5,tor[1]-22,10,3.5);   // the collar, popped
  }
  // head
  const hy=tor[1]-30;
  ctx.fillStyle=p.skin;
  ctx.beginPath(); ctx.arc(1,hy,10,0,7); ctx.fill();
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(1,hy,10,0,7); ctx.stroke();
  if (p.hat && !p.female && p.kind!=='COOK'){
    ctx.fillStyle='#5a6a52';
    ctx.beginPath(); ctx.arc(1,hy-4,9.6,Math.PI,0); ctx.fill();
    ctx.fillRect(1,hy-5.5,13,3);
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.arc(1,hy-4,9.6,Math.PI,0); ctx.stroke();
  } else if (p.female){
    ctx.fillStyle=p.hair;
    ctx.beginPath(); ctx.arc(1,hy-3,9.8,Math.PI*0.9,Math.PI*0.1); ctx.fill();
    ctx.fillRect(-9,hy-3,4,13);
  } else {
    ctx.fillStyle=p.hair;
    ctx.beginPath(); ctx.arc(1,hy-3.5,9.4,Math.PI*0.95,Math.PI*0.05); ctx.fill();
  }
  if (CAM.z>1.1){
    // the cartoon eye: white oval, pupil, smile
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.ellipse(4.5,hy-1.5,2.8,3.4,0,0,7); ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.1; ctx.stroke();
    ctx.fillStyle=PAL.ink;
    ctx.beginPath(); ctx.arc(5.4,hy-1,1.25,0,7); ctx.fill();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.arc(1.5,hy+4,3.2,0.5,2.6); ctx.stroke();
  }
  ctx.restore();
  return hy;
}
function legsStand(ctx, p, sway){
  ctx.strokeStyle=p.female?'#7a6a5a':PAL.khaki; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(-4+(sway||0),0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(4+(sway||0),0); ctx.stroke();
  ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.3;
  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(-4+(sway||0),0);
  ctx.moveTo(0,-16); ctx.lineTo(4+(sway||0),0); ctx.stroke();
}
function armsDown(ctx, p){
  ctx.strokeStyle=p.polo; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-5,-33); ctx.lineTo(-8,-20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,-33); ctx.lineTo(8,-20); ctx.stroke();
}

// ==== §13b WORLD BUBBLES & HOVER ===========================================
// generalized bubbles: anchor = {band, wx, wy} world point
const WBUB=[];
function sayAt(band, wx, wy, txt, opts){
  opts=opts||{};
  if (WBUB.length>7) WBUB.shift();
  WBUB.push({band, wx, wy, txt, t0:performance.now()/1000, dur:opts.dur||3.4, think:opts.think});
}
function drawWorldBubbles(ctx){
  const now=performance.now()/1000;
  const placed=[];
  for (let i=WBUB.length-1;i>=0;i--){
    const b=WBUB[i];
    const age=now-b.t0;
    if (age>b.dur){ WBUB.splice(i,1); continue; }
    if ((b.band==='TOWN'||b.band==='RIVER') && CAM.fade>0.3){ WBUB.splice(i,1); continue; }
    const band=BAND[b.band];
    const sx=projX(band,b.wx), sy=groundY(band)+b.wy*CAM.z;
    if (sx<-140||sx>view.w+140) continue;
    const a=age<0.18?age/0.18 : age>b.dur-0.35 ? (b.dur-age)/0.35 : 1;
    ctx.save();
    ctx.globalAlpha=a;
    ctx.font='bold 12px Verdana, sans-serif';
    const lines=wrapText(ctx, b.txt, 240);
    const bw=Math.max(...lines.map(l=>ctx.measureText(l).width))+20;
    const bh=lines.length*16+11;
    const bx=clamp(sx-bw/2, 8, view.w-bw-8);
    let by=sy-bh-14;
    // bubbles stack instead of colliding
    for (const r of placed){
      if (bx<r.x+r.w+6 && bx+bw>r.x-6 && by<r.y+r.h+4 && by+bh>r.y-4) by=r.y-bh-10;
    }
    placed.push({x:bx,y:by,w:bw,h:bh});
    ctx.fillStyle='rgba(255,255,255,0.97)';
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=2.2; ctx.lineJoin='round';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(bx,by,bw,bh,10); else ctx.rect(bx,by,bw,bh);
    ctx.fill(); ctx.stroke();
    if (b.think){
      ctx.fillStyle='rgba(255,255,255,0.97)';
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.arc(sx-3, by+bh+6, 3.2, 0, 7); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(sx, by+bh+11, 2, 0, 7); ctx.fill(); ctx.stroke();
    } else {
      const tx0=clamp(sx,bx+12,bx+bw-12);
      ctx.beginPath(); ctx.moveTo(tx0-5,by+bh-1); ctx.lineTo(tx0,by+bh+8); ctx.lineTo(tx0+6,by+bh-1);
      ctx.closePath(); ctx.fillStyle='#ffffff'; ctx.fill(); ctx.stroke();
      ctx.fillStyle='#ffffff'; ctx.fillRect(tx0-5,by+bh-2.6,11,3.6);
    }
    ctx.fillStyle=PAL.ink;
    lines.forEach((l,li)=> ctx.fillText(l, bx+10, by+16+li*16));
    ctx.restore();
  }
}
const _wrapCache=new Map();
function wrapText(ctx, txt, maxW){
  const key=txt+'|'+maxW;
  let r=_wrapCache.get(key);
  if (r) return r;
  const words=txt.split(' ');
  const lines=[]; let cur='';
  for (const w of words){
    const t=cur?cur+' '+w:w;
    if (ctx.measureText(t).width>maxW && cur){ lines.push(cur); cur=w; }
    else cur=t;
  }
  if (cur) lines.push(cur);
  if (_wrapCache.size>400) _wrapCache.clear();
  _wrapCache.set(key,r=lines);
  return r;
}
// hover
const HIT=[];
const HOVER={ cur:null, el:null };
function hoverInit(){
  const el=document.createElement('div');
  el.id='hovercard';
  document.body.appendChild(el);
  HOVER.el=el;
  window.addEventListener('mousemove', e=>{
    let best=null, bd=30*30;
    for (const h of HIT){
      const d=(h.sx-e.clientX)*(h.sx-e.clientX)+(h.sy-e.clientY)*(h.sy-e.clientY);
      if (d<bd){ bd=d; best=h; }
    }
    if (best){
      const p=PEOPLE[best.pid];
      el.innerHTML='<b>'+p.full+(p.kind==='COOK'?'':' '+classTag(p))+'</b><br><span>'+
        (p.kind==='COOK' ? 'runs this kitchen' : (WORLD.houses.find(x=>x.frat.key===p.orgKey)||{frat:{letters:p.sorLetters||p.orgLabel||''}}).frat.letters)+
        (p.tag||p.kind==='COOK' ? ' · known for: '+knownFor(p) : '')+'</span>';
      el.style.display='block';
      el.style.left=Math.min(view.w-240, e.clientX+14)+'px';
      el.style.top=(e.clientY-8)+'px';
      HOVER.cur=best.pid;
    } else { el.style.display='none'; HOVER.cur=null; }
  });
}

const HERO={ h:null, openT:0, rooms:[], staged:{}, lastBlock:-1 };

function drawHeroShell(ctx, t){
  const h=HERO.h, hx=h.x, W=300, L=hx-W/2;
  // ---- the earth cross-section -------------------------------------------
  // A full-width cut into the ground, so the basement reads as UNDERGROUND
  // instead of a ground floor sitting on the street. Fades in with the
  // cutaway; the street and everything on it is buried behind it.
  {
    const span=view.w*0.5/Math.max(0.4,CAM.z)+120;
    const eL=hx-span, eW=span*2;
    const deep=Math.max(96,(view.h-groundY(BAND.ROW))/Math.max(0.4,CAM.z)+30);
    ctx.save();
    ctx.globalAlpha=Math.min(1,HERO.openT*1.4);
    ctx.fillStyle='#4e3d2e';
    ctx.fillRect(eL, 8, eW, deep);
    ctx.fillStyle='#443426';
    ctx.fillRect(eL, 54, eW, deep-46);
    // wavy strata
    ctx.strokeStyle='rgba(30,22,14,0.3)'; ctx.lineWidth=1.8;
    for (const sy of [30, 66]){
      ctx.beginPath();
      for (let x=eL;x<=eL+eW;x+=34) ctx.lineTo(x, sy+vnoise(x*0.02, sy)*7);
      ctx.stroke();
    }
    // pebbles
    for (let i=0;i<30;i++){
      const px=eL+hash01(i,61)*eW, py=16+hash01(i,62)*(deep-30);
      ctx.fillStyle=i%3?'#5f4c39':'#3a2c20';
      ctx.beginPath(); ctx.ellipse(px,py,2.4+hash01(i,63)*2.6,1.8+hash01(i,64)*1.6,0,0,7); ctx.fill();
    }
    // the water line, dutifully serving the basement
    ctx.strokeStyle='#78828a'; ctx.lineWidth=4; ctx.lineCap='butt';
    ctx.beginPath(); ctx.moveTo(eL, 46); ctx.lineTo(L-6, 46); ctx.stroke();
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(eL,44); ctx.lineTo(L-6,44); ctx.moveTo(eL,48); ctx.lineTo(L-6,48); ctx.stroke();
    // the pledge class of '74 buried something. nobody remembers what.
    if (CAM.z>1.7){
      ctx.save(); ctx.translate(hx-262, 76); ctx.rotate(-0.06);
      ctx.fillStyle='#8a7a5a'; ctx.fillRect(-9,-6,18,12);
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=0.9; ctx.strokeRect(-9,-6,18,12);
      ctx.fillStyle='#f4ead6'; ctx.font='bold 4px Georgia'; ctx.textAlign='center';
      ctx.fillText('ΓΔ ’74', 0, 1.4); ctx.textAlign='left';
      ctx.restore();
    }
    // grass lip over the cut
    ctx.fillStyle=PAL.lawn;
    ctx.fillRect(eL, 2, eW, 8);
    ctx.fillStyle=PAL.lawnShade;
    ctx.fillRect(eL, 8, eW, 2.4);
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.moveTo(eL,2); ctx.lineTo(eL+eW,2); ctx.stroke();
    ctx.restore();
  }
  // solid interior backdrop — the dollhouse never shows lawn through its bones
  ctx.fillStyle='#9c8570';
  ctx.fillRect(L-4,-208,W+8,270);
  // shell walls
  ctx.fillStyle='#4a3a30';
  ctx.fillRect(L-6,-208,6,270);
  ctx.fillRect(hx+W/2,-208,6,270);
  // roof silhouette above the deck
  washPoly(ctx, [[L-18,-200],[L+58,-244],[hx+W/2-58,-244],[hx+W/2+18,-200]], PAL.roofDark, 771);
  wob(ctx, [[L-18,-200],[L+58,-244],[hx+W/2-58,-244],[hx+W/2+18,-200],[L-18,-200]], 772, {w:1.8});
  // rooms
  const BACKWIN={ tv:{wx:-108,cur:'#5f7355'}, kitchen:{wx:108,cur:'#b8875a'},
    bedA:{wx:-108,cur:'#5a6a8a'}, tapes:{wx:108,cur:'#8a3a5a'} };
  const nightF=glowAlpha(CLOCK.hourFloat()%24);
  for (const r of HERO.rooms){
    if (r.outdoor) continue;
    washRect(ctx, r.x, r.floorY-r.h, r.w, r.h, shade(r.wall,1.14), 810+r.x, {inset:0.8});
    // back-wall window — the far side of the house, sky through the glass
    const bw=BACKWIN[r.id];
    if (bw){
      const wx=hx+bw.wx, cy=r.floorY-r.h*0.45;
      ctx.fillStyle='#e6dcc4'; ctx.fillRect(wx-19, cy-24, 38, 48);
      ctx.fillStyle=hexLerp('#cfe0e8','#252c4a', nightF);
      ctx.fillRect(wx-15, cy-20, 30, 40);
      ctx.strokeStyle='rgba(244,234,214,0.6)'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(wx,cy-19); ctx.lineTo(wx,cy+19);
      ctx.moveTo(wx-14,cy); ctx.lineTo(wx+14,cy); ctx.stroke();
      wobRect(ctx, wx-19, cy-24, 38, 48, 812+r.x, {w:1.2});
      // curtains
      ctx.fillStyle=bw.cur;
      ctx.fillRect(wx-19, cy-24, 7, 48); ctx.fillRect(wx+12, cy-24, 7, 48);
      ctx.strokeStyle='rgba(30,20,14,0.3)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(wx-15.5,cy-22); ctx.lineTo(wx-15.5,cy+22);
      ctx.moveTo(wx+15.5,cy-22); ctx.lineTo(wx+15.5,cy+22); ctx.stroke();
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.moveTo(wx-22,cy-25); ctx.lineTo(wx+22,cy-25); ctx.stroke();
    }
    // baseboard
    ctx.fillStyle=shade(r.wall,0.78);
    ctx.fillRect(r.x, r.floorY-4, r.w, 4);
    // ceiling fixture: a bare bulb in the basement, modest domes upstairs
    const fx=r.x+r.w*0.5, fy0=r.floorY-r.h;
    if (r.id==='bar'){
      ctx.strokeStyle='#3a3430'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(fx,fy0); ctx.lineTo(fx,fy0+9); ctx.stroke();
      ctx.fillStyle=nightF>0.1?'#ffe9a8':'#d8d2c2';
      ctx.beginPath(); ctx.arc(fx,fy0+11.5,2.8,0,7); ctx.fill();
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=0.9; ctx.stroke();
    } else if (r.id!=='chapter'){
      ctx.fillStyle=nightF>0.1?'#ffe9a8':'#e6dcc4';
      ctx.beginPath(); ctx.arc(fx,fy0+2,4.6,0,Math.PI); ctx.fill();
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(fx,fy0+2,4.6,0,Math.PI); ctx.stroke();
    }
    // floor slab, load-bearing and proud of it
    ctx.fillStyle='#5a4a3c';
    ctx.fillRect(r.x-2, r.floorY, r.w+4, 5);
    wob(ctx, [[r.x-2,r.floorY],[r.x+r.w+2,r.floorY]], 820+r.x, {w:1.5});
    wob(ctx, [[r.x-2,r.floorY+5],[r.x+r.w+2,r.floorY+5]], 821+r.x, {w:1.1});
  }
  // chapter-room Monday blinds: RITUAL IN PROGRESS
  const d=CLOCK.derive();
  const chapterSecret = d.dow===0 && d.hour>=20.5;
  // props
  for (const r of HERO.rooms){
    if (r.outdoor && r.id!=='roof') continue;
    if (r.id==='chapter' && chapterSecret){
      ctx.save(); ctx.translate(r.x+r.w/2, r.floorY+ -22+22); PROPS.blinds(ctx); ctx.restore();
      jitterText(ctx,'RITUAL IN PROGRESS', r.x+r.w/2, r.floorY-44, 5.5, 833, {align:'center'});
      jitterText(ctx,'(nice try)', r.x+r.w/2, r.floorY-37, 4.5, 834, {align:'center', style:'italic'});
      continue;
    }
    for (const [fn,px,py,v] of r.props){
      ctx.save(); ctx.translate(px,py);
      PROPS[fn](ctx, v||0, t);
      ctx.restore();
    }
  }
  // ---- the side porch ------------------------------------------------------
  // In cutaway, the front porch went with the facade — so the porch lives at
  // the gable end, where the couch crew can still supervise the street.
  {
    const a=Math.min(1,HERO.openT*1.4);
    ctx.save();
    ctx.globalAlpha=a;
    const pL=hx-232, pR=hx-152;
    // shadow + piers
    ctx.fillStyle='rgba(40,28,18,0.3)';
    ctx.fillRect(pL+2, -6, pR-pL-4, 8);
    ctx.fillStyle='#8a7a62';
    ctx.fillRect(pL+8, -8, 7, 10); ctx.fillRect(pR-16, -8, 7, 10);
    // deck
    ctx.fillStyle='#ded2b4';
    ctx.fillRect(pL, -14, pR-pL, 7);
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.6;
    ctx.strokeRect(pL, -14, pR-pL, 7);
    // steps down at the far end
    ctx.fillStyle='#ded2b4';
    ctx.fillRect(pL-12, -8, 13, 4); ctx.fillRect(pL-7, -4, 8, 4);
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.1;
    ctx.strokeRect(pL-12, -8, 13, 4); ctx.strokeRect(pL-7, -4, 8, 4);
    // columns + little roof tied into the house wall
    for (const cx of [pL+7, pR-9]){
      ctx.fillStyle=PAL.colonnade;
      ctx.fillRect(cx-4, -96, 8, 82);
      ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.4;
      ctx.strokeRect(cx-4, -96, 8, 82);
    }
    ctx.fillStyle='#ded2b4';
    ctx.fillRect(pL-8, -106, pR-pL+14, 11);
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.6;
    ctx.strokeRect(pL-8, -106, pR-pL+14, 11);
    // railing
    ctx.strokeStyle='#b8a988'; ctx.lineWidth=1.6;
    for (let i=0;i<=6;i++){
      const px=pL+6+i*(pR-pL-12)/6;
      ctx.beginPath(); ctx.moveTo(px,-14); ctx.lineTo(px,-32); ctx.stroke();
    }
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(pL,-32); ctx.lineTo(pR,-32); ctx.stroke();
    // the couch, obviously
    ctx.save(); ctx.translate(hx-166,-14); PROPS.couch(ctx,1); ctx.restore();
    // the driveway hoop survives the cutaway too — H-O-R-S-E waits for no one
    const hpx=hx+205;
    ctx.strokeStyle=PAL.ink; ctx.lineWidth=2.4;

function heroBlock(){ // 6 blocks/day like the plan
  const hr=CLOCK.derive().hour;
  return hr<6?0:hr<9?1:hr<13?2:hr<18?3:hr<22?4:5;
}
function vigEligible(v, d){
  const hr=d.hour<6 ? d.hour+24 : d.hour;   // late night wraps
  if (v.dows && !v.dows.includes(d.dow)) return false;
  if (v.flag==='strike' && !(ACTS.strikeUntil>d.dayAbs)) return false;
  if (v.flag==='cupid'  && !(ACTS.cupidUntil>d.dayAbs)) return false;
  if (v.noStrike && ACTS.strikeUntil>d.dayAbs) return false;
  return hr>=v.when[0] && hr<v.when[1];
}
function stageHero(){
  const d=CLOCK.derive();
  const block=heroBlock()+d.dayAbs*6;
  if (block===HERO.lastBlock) return;
  HERO.lastBlock=block;
  HERO.staged={};
  const roster=HERO.h.roster.map(pid=>PEOPLE[pid]);
  const used=new Set();
  for (const room of HERO.rooms){
    if (room.id==='bar' && ACTS.strikeUntil>d.dayAbs) continue;   // dry week: basement dark
    const pool=VIGS.filter(v=>v.room===room.id && vigEligible(v,d));
    if (!pool.length) continue;
    // weighted deterministic pick
    let tw=0; for (const v of pool) tw+=v.wt||1;
    let roll=hash01(d.dayAbs, block, room.x, 1)*tw;
    let pick=pool[0];
    for (const v of pool){ roll-=(v.wt||1); if (roll<=0){ pick=v; break; } }
    if (hash01(d.dayAbs, block, room.x, 2) < 0.22 && room.id!=='porch') continue; // some rooms just sit empty — houses breathe
    // cast
    const cast=[];
    let ok=true;
    pick.cast.forEach((c,ci)=>{
      let p=null;
      if (pick.flag==='cupid' && ci<2){ p=PEOPLE[ci===0?ACTS.cupidA:ACTS.cupidB]; if(!p){ok=false;return;} }
      else if (c.cook && HERO.h.cook){ p=HERO.h.cook; }
      else {
        const tagged=roster.filter(x=>!used.has(x.pid) && c.tag && x.tag===c.tag);
        const anyone=roster.filter(x=>!used.has(x.pid) && !x.female);
        const from=tagged.length?tagged:anyone;
        if (!from.length){ ok=false; return; }
        p=from[Math.floor(hash01(d.dayAbs, block, room.x, 3+ci)*from.length)];
      }
      used.add(p.pid);
      cast.push(p.pid);
    });
    if (!ok) continue;
    HERO.staged[room.id]={ vig:pick, cast, t0:performance.now()/1000, fired:{} };
  }
}
function drawHeroActors(ctx, rt, openT){
  const band=BAND.ROW;
  for (const room of HERO.rooms){
    const st=HERO.staged[room.id];
    if (!st) continue;
    const interiorAlpha=room.outdoor?1:openT;
    if (interiorAlpha<=0.02) continue;
    // chapter secret: no actors visible
    const d=CLOCK.derive();
    if (room.id==='chapter' && d.dow===0 && d.hour>=20.5) continue;
    ctx.save();
    ctx.globalAlpha=interiorAlpha;
    // when the cutaway opens, porch actors sidestep to the side porch
    const sideT=room.id==='porch' ? smoothstep(0.3,0.8,openT) : 0;
    st.vig.cast.forEach((c,ci)=>{
      const p=PEOPLE[st.cast[ci]];
      if (!p) return;
      let ax=room.x + room.w/2 + c.dx;   // authored dx is relative to room center
      let fy=room.floorY;
      if (sideT>0){
        ax=lerp(ax, HERO.h.x-196 + c.dx*0.28, sideT);
        fy=lerp(fy, -14, sideT);
      }
      const sx=projX(band, ax);
      if (sx<-80||sx>view.w+80) return;
      const sy=groundY(band)+fy*CAM.z;
      ctx.save();
      ctx.translate(sx,sy);
      // 0.88: people fit their rooms; heads stop poking through ceilings
      ctx.scale(CAM.z*0.88*(c.face||1), CAM.z*0.88);
      const f=(rt*0.5 + ci*0.37 + hash01(p.pid)*0.9)%1;
      (POSES[c.pose]||POSES.stand)(ctx, p, f);
      ctx.restore();
      HIT.push({pid:p.pid, sx, sy:sy-42*CAM.z});
    });
    // vignette props draw IN FRONT of the cast — the poker table hides laps,
    // exactly like a dollhouse should
    (st.vig.props||[]).forEach(pr=>{
      const ax=room.x + room.w/2 + pr[1];
      const sx=projX(band, ax);
      if (sx<-120||sx>view.w+120) return;
      const sy=groundY(band)+(room.floorY+(pr[2]||0))*CAM.z;
      ctx.save();
      ctx.translate(sx,sy);
      ctx.scale(CAM.z,CAM.z);
      PROPS[pr[0]](ctx, pr[3]||0, rt);
      ctx.restore();
    });
    ctx.restore();
    // scripted bubbles (only when actually watching)
    if (interiorAlpha>0.35 && CAM.z>0.5){
      const loopLen=34;
      const el=(rt-st.t0)%loopLen;
      for (let si=0; si<(st.vig.script||[]).length; si++){
        const line=st.vig.script[si];
        const kk=Math.floor((rt-st.t0)/loopLen)+':'+si;
        if (el>=line.at && !st.fired[kk]){
          st.fired[kk]=1;
          const p=PEOPLE[st.cast[line.ci]];
          if (p){
            const variants=line.t;
            let txt=variants[Math.floor(hash01(p.pid, si, Math.floor(rt/loopLen))*variants.length)];
            txt=txt.replace('{n}', ''+(2+Math.floor(hash01(p.pid)*4)));
            const sideT2=room.id==='porch' ? smoothstep(0.3,0.8,openT) : 0;
            let ax=room.x+room.w/2+st.vig.cast[line.ci].dx;
            let fy=room.floorY;
            if (sideT2>0){
              ax=lerp(ax, HERO.h.x-196+st.vig.cast[line.ci].dx*0.28, sideT2);
              fy=lerp(fy, -14, sideT2);
            }
            sayAt('ROW', ax, fy-54, txt, {think:line.think, dur:4.2});
            p.mentions++;
          }
        }
      }
    }
  }
}
