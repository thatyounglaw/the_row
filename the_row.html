        'IFC called both presidents in about the prank war. They emerged forty minutes later with straight faces that lasted eleven steps.',
      ];
      evPush('PRANKPEACE', 2, [ha.lot.x, ha.lot.z], 'Envoys from '+ha.frat.name+' and '+hd.frat.name+' have been seen sharing a pitcher. The war is over.', { house: atk, lore: pickT(t, _txtCounter++) });
    }
  }
  // spontaneous sparks
  if (rh() < 0.004 && SIM.prankWars.length < 2){
    const live = WORLD.houses.filter(h=>!h.dark);
    if (live.length >= 2){
      const a = live[rhi(0,live.length-1)];
      let b = live[rhi(0,live.length-1)];
      if (a!==b) prankStart(a.frat.key, b.frat.key, null);
    }
  }
}

// ==== ôÏ13f SPECTACLES & THE GRAVE REGISTER =================================
function spectacleRolls(d){
  const doy = dayOfYear(d.dayAbs);
  const per = SIM.period;
  // LMI incident ã roughly every other year, on a fall or spring weekend
  if (isWeekend(d.dow) && rh() < 0.003 && per.party > 0.5){
    const live = SIM.parties.filter(p=>p.state==='PEAK');
    const h = live.length ? houseByKey(live[0].houseKey) : WORLD.houses.find(x=>!x.dark);
    if (h){
      evPush('LMI', 4, [520,-60],
        'A formation from LMI is marching down Row Street after taps. Nobody knows why. It is magnificent.',
        { house: h.frat.key, lore: 'Cadets came over the wall on a Friday night ã two dozen, in step, straight to the '+h.frat.name+' party. By midnight the lawn tug-of-war was forty a side and the commandantãs official report used the word ãregrettableã eleven times.' });
    }
  }
  // livestock at large ã spring term redneck season
  if (per.key==='SPRINGTERM' && rh() < 0.003){
    const live = WORLD.houses.filter(h=>!h.dark);
    const h = live[rhi(0,live.length-1)];
    evPush('LIVESTOCK', 4, [52,-142],
      'A cow is loose on the Colonnade. Campus security is in pursuit at a respectful trot.',
      { house: h.frat.key, lore: 'The '+h.frat.name+' redneck party featured a cow, briefly, until it un-featured itself. It toured the Colonnade, declined the chapel steps, and was recovered near Generals Field. It saw more of campus than most seniors.' });
  }
  // the legendary alumnus ã Homecoming
  if (per.key==='HOMECOMING' && rh() < 0.02 && !SIM._alumnusThisYear){
    SIM._alumnusThisYear = true;
    const live = WORLD.houses.filter(h=>!h.dark);
    const h = live[rhi(0,live.length-1)];
    h.stats.funding += 2000;
    evPush('ALUMNUS', 4, [h.lot.x, h.lot.z],
      'A '+h.frat.name+' alumnus of legend has arrived unannounced. The package store has been notified.',
      { house: h.frat.key, lore: 'A '+h.frat.name+' alumnus from the class of ã7'+rhi(1,9)+' appeared at Homecoming in a car nobody saw arrive, bought out the package store, told three stories that cannot be printed, settled the houseãs debts, and was gone by dawn.' });
  }
  if (doy===1) SIM._alumnusThisYear = false;
  // the flood ã early spring, the river takes its tax
  if (doy===195 && rh() < 0.3){
    SIM.floodUntilDay = d.dayAbs + rhi(4,9);
    evPush('FLOOD', 4, [150, 585],
      'The river is up and still rising. The pole houses are pulling their furniture to high ground, meaning the roof.',
      { lore: 'The river came up that March and took its usual tax: the bottom steps at the pole houses, one grill, and a canoe of unknown provenance. The brothers watched from the roofs, toasting the current like it was a parade.' });
    for (const r of WORLD.rentals){
      if (r.arch==='POLE' && r.leasedBy && rh()<0.25) r.patience -= 20;
    }
  }
  // mono season ã deep winter, the mixer circuit's revenge
  if (doy===150 && rh() < 0.35 && !SIM.monoUntilDay){
    SIM.monoUntilDay = d.dayAbs + 21;
    evPush('MONO', 3, [52,-142],
      'The infirmary has posted a sign. It reads, in its entirety: YOU KNOW WHY YOUãRE HERE.',
      { lore: 'Mono went through the mixer circuit like a rumor that winter. The infirmary filled, the parties thinned, and a generation learned the phrase ãkissing diseaseã from a pamphlet they did not keep.' });
  }
  if (SIM.monoUntilDay && d.dayAbs > SIM.monoUntilDay) SIM.monoUntilDay = 0;
  // honor hearing ã rare, and never funny
  if (rh() < 0.0006){
    const live = WORLD.houses.filter(h=>!h.dark && h.roster.length>6);
    if (live.length){
      const h = live[rhi(0,live.length-1)];
      const cleared = rh() < 0.55;
      evPush('HONOR', 4, [52,-184],
        'A single light is on in Founders Chapel tonight. An honor hearing is underway.',
        { house: h.frat.key, lore: cleared
          ? 'An accusation went to the Honor Council ã a '+h.frat.name+' junior, a disputed exam. The hearing ran past midnight and he walked out cleared. Nobody brought it up again; that was the whole point of the system.'
          : 'The Honor Council met, and by morning a '+h.frat.name+' junior had packed his room and gone. Nobody joked about it, then or later. Everyone had signed the same book, and everyone knew what it meant.' });
      if (!cleared){
        const jrs = h.roster.map(pid=>PEOPLE[pid]).filter(p=>p.classYear===3 && p.standing==='GOOD');
        if (jrs.length){ jrs[0].standing = 'EXPELLED'; h.roster = h.roster.filter(pid=>PEOPLE[pid].standing==='GOOD'); }
        h.stats.brotherhood = Math.max(20, h.stats.brotherhood - 4);
      }
    }
  }
  // the grave scandal ã rare; written straight; real consequences
  if (doy===61 && rh() < 0.10){ // Halloween season
    const live = WORLD.houses.filter(h=>!h.dark);
    if (live.length){
      const h = live[rhi(0,live.length-1)];
      h.stats.prestige = Math.max(5, h.stats.prestige - 14);
      evPush('GRAVE', 4, [h.lot.x, h.lot.z],
        'A photograph from the '+h.frat.name+' Halloween party has reached the Deanãs office, and the newspaper.',
        { house: h.frat.key, lore: 'A photograph from the '+h.frat.name+' Halloween party reached the Deanãs office, and then the paper. There was nothing to defend and nobody seriously tried. The house took its strike, several brothers took a hard look at the company they kept, and the campus spent a season talking about who it wanted to be.' });
      issueStrike(h, 'conduct the Deanãs letter called ãbeneath every tradition this college claimsã');
    }
  }
}

// ==== ôÏ13g WEATHER & SEASONS ================================================
SIM.weather = { state:'clear', untilDay: 0, forced: false };
function weatherDaily(d){
  if (SIM.weather.forced && d.dayAbs < SIM.weather.untilDay) return;
  SIM.weather.forced = false;
  const doy = dayOfYear(d.dayAbs);
  const winter = doy>90 && doy<180;
  const roll = rh();
  SIM.weather.state = roll < (winter?0.42:0.62) ? 'clear' : roll < 0.85 ? 'gray' : 'rain';
}
function weatherCrowdMult(){
  let m = 1;
  if (SIM.weather.state==='rain') m *= 0.7;
  if (SIM.monoUntilDay) m *= 0.72;
  return m;
}
function seasonCanopyTint(doy, base, t01){
  // 0 Sept ãÎ autumn ramp OctãNov, bare winter, spring green-up, summer full
  const auburn = [0xb5651d, 0xc17a2b, 0x9c4a1e, 0xc9a227][Math.floor(t01*4)%4];
  const bare = 0x6a5a44, fresh = 0x6fae5c;
  if (doy < 30) return base;
  if (doy < 60) return lerpColor(base, auburn, (doy-30)/30 * 0.85);
  if (doy < 90) return lerpColor(auburn, bare, (doy-60)/30);
  if (doy < 175) return bare;
  if (doy < 205) return lerpColor(bare, fresh, (doy-175)/30);
  if (doy < 240) return lerpColor(fresh, base, (doy-205)/35);
  return base;
}
let _lastSeasonDay = -1;
function seasonUpdate(){
  const d = CLOCK.derive();
  if (d.dayAbs === _lastSeasonDay || !WORLD.meshes.canopies) return;
  // repaint at most once per sim-day, and only every 3rd day for cheapness
  if (_lastSeasonDay >= 0 && Math.abs(d.dayAbs - _lastSeasonDay) < 3) return;
  _lastSeasonDay = d.dayAbs;
  const doy = dayOfYear(d.dayAbs);
  const cans = WORLD.meshes.canopies;
  const col = new THREE.Color();
  for (let i=0;i<WORLD.treeData.length;i++){
    const td = WORLD.treeData[i];
    col.setHex(seasonCanopyTint((doy + Math.floor(hash01(i)*14)) % DAYS_PER_YEAR, td.baseCol, hash01(i*3.3)));
    cans.setColorAt(i, col);
  }
  cans.instanceColor.needsUpdate = true;
}

// ==== ôÏ13h FANCY DRESS NIGHT ================================================
function fancyDressParties(baseDay){
  // every living house holds a formal pre-party; campus glows
  for (const h of WORLD.houses){
    if (h.dark) continue;
    SIM.parties.push({
      id:'fd'+baseDay+'_'+h.frat.key, houseKey: h.frat.key, lotId: h.lotId,
      porch: h.porch, door: h.porch, offCampus: false,
      venueName: 'the '+h.frat.name+' house', theme: 'Fancy Dress pre-party',
      t0: baseDay*1440 + 19*60, state:'SCHEDULED',
      peak: Math.round(35 + h.stats.social*0.5), crowd:0, maxCrowd:0,
      kegs: 2, incidents: [], legendary: false, resolved: false, copsCame: false, formal: true,
    });
  }
}
